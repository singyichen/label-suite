name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant runs on the same branch when a new commit is pushed (M-2)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum required permissions — override per-job if needed (L-2)
permissions:
  contents: read

# ─── Backend Jobs ─────────────────────────────────────────────────────────────
# All backend jobs are skipped when backend/pyproject.toml does not exist yet.

jobs:
  validate:
    name: Validate Project Structure
    runs-on: ubuntu-24.04
    outputs:
      backend-exists: ${{ steps.check.outputs.backend-exists }}
      frontend-exists: ${{ steps.check.outputs.frontend-exists }}
      prototype-exists: ${{ steps.check.outputs.prototype-exists }}
    steps:
      - uses: actions/checkout@v4
      - name: Check project structure
        id: check
        run: |
          echo "Checking project structure..."
          BACKEND_EXISTS=false
          FRONTEND_EXISTS=false
          PROTOTYPE_EXISTS=false

          if [ -f "backend/pyproject.toml" ]; then
            echo "✓ Backend exists - backend jobs will run"
            echo "backend-exists=true" >> $GITHUB_OUTPUT
            BACKEND_EXISTS=true
          else
            echo "ℹ Backend not yet implemented - backend jobs will be skipped"
            echo "backend-exists=false" >> $GITHUB_OUTPUT
          fi

          if [ -f "frontend/package.json" ]; then
            echo "✓ Frontend exists - frontend jobs will run"
            echo "frontend-exists=true" >> $GITHUB_OUTPUT
            FRONTEND_EXISTS=true
          else
            echo "ℹ Frontend not yet implemented - frontend jobs will be skipped"
            echo "frontend-exists=false" >> $GITHUB_OUTPUT
          fi

          if [ -f "design/prototype/package.json" ]; then
            echo "✓ Prototype exists - prototype jobs will run"
            echo "prototype-exists=true" >> $GITHUB_OUTPUT
            PROTOTYPE_EXISTS=true
          else
            echo "ℹ Prototype not yet implemented - prototype jobs will be skipped"
            echo "prototype-exists=false" >> $GITHUB_OUTPUT
          fi

          if [ "$BACKEND_EXISTS" = false ] && [ "$FRONTEND_EXISTS" = false ] && [ "$PROTOTYPE_EXISTS" = false ]; then
            echo "✓ Project structure validation complete. Early development phase: no backend/frontend/prototype code yet, all code jobs will be skipped."
          else
            echo "✓ Project structure validation complete. Additional CI jobs will now run and may pass or fail independently."
          fi

  backend-ruff:
    name: Backend — Ruff (Lint + Format)
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.backend-exists == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --dev --locked
      - name: Lint with Ruff
        run: uv run ruff check .
      - name: Format check with Ruff
        run: uv run ruff format --check .

  backend-type-check:
    name: Backend — Type Check (mypy)
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.backend-exists == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --dev --locked
      - name: Type check with mypy
        run: uv run mypy .

  backend-security:
    name: Backend — Security Audit (pip-audit)
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.backend-exists == 'true'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install production dependencies only
        run: uv sync --no-dev --locked
      - name: Security audit with pip-audit
        run: uv run pip-audit --desc --fail-on high

  backend-test:
    name: Backend — Tests (pytest)
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.backend-exists == 'true'
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: label_eval_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d label_eval_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/label_eval_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: "ci-test-only-not-a-real-secret"
      ENVIRONMENT: "test"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --dev --locked
      - name: Run tests with coverage
        run: uv run pytest --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --cov-fail-under=80 --junitxml=junit.xml
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            backend/junit.xml
            backend/coverage.xml
          if-no-files-found: warn

# ─── Frontend Jobs ────────────────────────────────────────────────────────────
# Skipped when frontend/package.json does not exist yet.

  frontend-lint:
    name: Frontend — Lint & Type Check & Build
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.frontend-exists == 'true'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

  # TODO: Playwright E2E tests will be added once frontend development begins

# ─── Prototype Jobs ───────────────────────────────────────────────────────────
# Skipped when design/prototype/package.json does not exist yet.

  prototype-typecheck:
    name: Prototype — Type Check (tsc)
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.prototype-exists == 'true'
    defaults:
      run:
        working-directory: design/prototype
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run typecheck

  prototype-playwright:
    name: Prototype — Playwright Tests
    runs-on: ubuntu-24.04
    needs: validate
    if: needs.validate.outputs.prototype-exists == 'true'
    defaults:
      run:
        working-directory: design/prototype
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prototype-playwright-results
          path: design/prototype/playwright-report/
          if-no-files-found: warn
