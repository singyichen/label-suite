<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:10px">
  
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">xs</div>
      <div class="mono" style="width:40px">4px</div>
      <div style="height:12px;width:4px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-xs</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">sm</div>
      <div class="mono" style="width:40px">8px</div>
      <div style="height:12px;width:8px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-sm</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">md</div>
      <div class="mono" style="width:40px">16px</div>
      <div style="height:12px;width:16px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-md</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">lg</div>
      <div class="mono" style="width:40px">24px</div>
      <div style="height:12px;width:24px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-lg</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">xl</div>
      <div class="mono" style="width:40px">32px</div>
      <div style="height:12px;width:32px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-xl</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">2xl</div>
      <div class="mono" style="width:40px">48px</div>
      <div style="height:12px;width:48px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-2xl</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="label-tiny" style="width:56px">3xl</div>
      <div class="mono" style="width:40px">64px</div>
      <div style="height:12px;width:64px;background:var(--color-primary);border-radius:2px"></div>
      <div class="meta">--space-3xl</div>
    </div>
</div>
</div></body></html>
