<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Cards & Panels</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div style="background:white;border:1px solid var(--color-border);border-radius:12px;padding:18px">
    <div style="font-family:var(--font-serif-display);font-size:20px;font-weight:600">Sentiment Review</div>
    <div class="meta" style="margin-top:4px">128 / 500 · Sequence Labeling</div>
    <div style="height:6px;background:var(--color-border-muted);border-radius:9999px;margin-top:14px;overflow:hidden">
      <div style="width:25.6%;height:100%;background:var(--color-primary)"></div>
    </div>
    <div class="meta" style="margin-top:8px;font-size:11px">Updated 3 min ago</div>
  </div>
  <div style="background:white;border-radius:16px;padding:20px;box-shadow:var(--shadow-card, 0 4px 24px rgba(99,102,241,0.10), 0 1px 4px rgba(0,0,0,0.06))">
    <div class="label-tiny">Login card</div>
    <div style="font-family:var(--font-serif-display);font-size:22px;font-weight:700;margin-top:4px">Sign in to your account</div>
    <div class="meta" style="margin-top:4px">Elevation · --shadow-card · radius-xl (16px)</div>
  </div>
</div>
<div class="meta" style="margin-top:12px;border-top:1px solid var(--color-border-muted);padding-top:8px">
  Default: flat white, 1px border, radius-lg · Shadow reserved for login, modals, dropdowns, toasts.
</div>
</div></body></html>
