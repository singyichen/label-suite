<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Primary Colors</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px">
  
    <div class="col">
      <div class="swatch" style="background:#6366F1;border-color:#6366F1"></div>
      <div style="font-weight:600;font-size:14px">Indigo 500</div>
      <div class="mono">#6366F1</div>
      <div class="mono" style="color:var(--color-text-muted)">--color-primary</div>
      <div class="meta">Brand / Primary</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:#818CF8;border-color:#818CF8"></div>
      <div style="font-weight:600;font-size:14px">Indigo 400</div>
      <div class="mono">#818CF8</div>
      <div class="mono" style="color:var(--color-text-muted)">--color-secondary</div>
      <div class="meta">Secondary</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:#10B981;border-color:#10B981"></div>
      <div style="font-weight:600;font-size:14px">Emerald 500</div>
      <div class="mono">#10B981</div>
      <div class="mono" style="color:var(--color-text-muted)">--color-cta</div>
      <div class="meta">Primary CTA</div>
    </div>
    <div class="col">
      <div class="swatch" style="background:#1E1B4B;border-color:#1E1B4B"></div>
      <div style="font-weight:600;font-size:14px">Indigo 950</div>
      <div class="mono">#1E1B4B</div>
      <div class="mono" style="color:var(--color-text-muted)">--color-ink</div>
      <div class="meta">Body ink</div>
    </div>
</div>
</div></body></html>
