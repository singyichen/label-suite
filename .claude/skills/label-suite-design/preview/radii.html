<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Corner Radii</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:16px">
  
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:96px;height:96px;background:var(--color-primary-soft-bg);border:2px solid var(--color-primary);border-radius:4px"></div>
      <div style="font-weight:600;font-size:14px">sm</div>
      <div class="mono">4px</div>
      <div class="meta">badges</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:96px;height:96px;background:var(--color-primary-soft-bg);border:2px solid var(--color-primary);border-radius:8px"></div>
      <div style="font-weight:600;font-size:14px">md</div>
      <div class="mono">8px</div>
      <div class="meta">buttons</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:96px;height:96px;background:var(--color-primary-soft-bg);border:2px solid var(--color-primary);border-radius:12px"></div>
      <div style="font-weight:600;font-size:14px">lg</div>
      <div class="mono">12px</div>
      <div class="meta">cards</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:96px;height:96px;background:var(--color-primary-soft-bg);border:2px solid var(--color-primary);border-radius:16px"></div>
      <div style="font-weight:600;font-size:14px">xl</div>
      <div class="mono">16px</div>
      <div class="meta">modals</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:96px;height:96px;background:var(--color-primary-soft-bg);border:2px solid var(--color-primary);border-radius:9999px"></div>
      <div style="font-weight:600;font-size:14px">full</div>
      <div class="mono">9999px</div>
      <div class="meta">pills</div>
    </div>
</div>
</div></body></html>
