<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Roles (bilingual)</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:10px">
  
    <div class="row" style="gap:14px">
      <span class="chip" style="background:#1E1B4B;color:white;min-width:120px;justify-content:center">Super Admin</span>
      <span class="chip" style="background:#1E1B4B;color:white;min-width:120px;justify-content:center">超級管理員</span>
      <div class="meta" style="flex:1">Manages platform + roles</div>
    </div>
    <div class="row" style="gap:14px">
      <span class="chip" style="background:#6366F1;color:white;min-width:120px;justify-content:center">Project Leader</span>
      <span class="chip" style="background:#6366F1;color:white;min-width:120px;justify-content:center">專案負責人</span>
      <div class="meta" style="flex:1">Creates + configures tasks</div>
    </div>
    <div class="row" style="gap:14px">
      <span class="chip" style="background:#10B981;color:white;min-width:120px;justify-content:center">Reviewer</span>
      <span class="chip" style="background:#10B981;color:white;min-width:120px;justify-content:center">審核員</span>
      <div class="meta" style="flex:1">Adjudicates IAA disputes</div>
    </div>
    <div class="row" style="gap:14px">
      <span class="chip" style="background:#EEF2FF;color:#6366F1;min-width:120px;justify-content:center">Annotator</span>
      <span class="chip" style="background:#EEF2FF;color:#6366F1;min-width:120px;justify-content:center">標記員</span>
      <div class="meta" style="flex:1">Default for new RAs</div>
    </div>
    <div class="row" style="gap:14px">
      <span class="chip" style="background:#F1F5F9;color:#64748B;min-width:120px;justify-content:center">User</span>
      <span class="chip" style="background:#F1F5F9;color:#64748B;min-width:120px;justify-content:center">使用者</span>
      <div class="meta" style="flex:1">Default role for signups</div>
    </div>
</div>
</div></body></html>
