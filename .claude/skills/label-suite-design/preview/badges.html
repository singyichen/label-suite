<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Badges & Status Pills</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:14px">
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="chip" style="background:var(--color-success-bg);color:var(--color-success)">● In Progress</span>
    <span class="chip" style="background:var(--color-warning-bg);color:var(--color-warning)">● Pending</span>
    <span class="chip" style="background:var(--color-info-bg);color:var(--color-info)">● Submitted</span>
    <span class="chip" style="background:var(--color-error-bg);color:var(--color-error)">● Failed</span>
    <span class="chip" style="background:var(--color-border-muted);color:var(--color-text-soft)">● Draft</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <span class="chip" style="background:var(--color-primary-soft-bg);color:var(--color-primary)">Annotator</span>
    <span class="chip" style="background:var(--color-primary-soft-bg);color:var(--color-primary)">Reviewer</span>
    <span class="chip" style="background:var(--color-primary-soft-bg);color:var(--color-primary)">Project Leader</span>
    <span class="chip" style="background:#1E1B4B;color:white">Super Admin</span>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <span class="chip" style="background:var(--color-ink);color:white;padding:2px 8px;font-size:11px">12</span>
    <span class="chip" style="background:var(--color-cta);color:white;padding:2px 8px;font-size:11px">NEW</span>
    <span class="chip" style="background:white;color:var(--color-text-soft);border:1px solid var(--color-border);font-size:11px">Sequence Labeling</span>
    <span class="chip" style="background:white;color:var(--color-text-soft);border:1px solid var(--color-border);font-size:11px">Dry Run</span>
  </div>
</div>
</div></body></html>
