<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Form Inputs</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:16px">
  <div>
    <label style="display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:var(--color-text-soft)">Email</label>
    <input value="chen@nlp.ntu.edu.tw" style="width:100%;padding:10px 14px;border:1px solid var(--color-border);border-radius:8px;font-family:var(--font-sans);font-size:14px;color:var(--color-ink)">
  </div>
  <div>
    <label style="display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:var(--color-text-soft)">Password</label>
    <input type="password" value="••••••••••" style="width:100%;padding:10px 14px;border:2px solid var(--color-primary);border-radius:8px;font-family:var(--font-sans);font-size:14px;box-shadow:0 0 0 3px rgba(99,102,241,0.12);outline:none">
    <div class="meta" style="font-size:11px;margin-top:4px;color:var(--color-primary)">focus state — ring rgba(99,102,241,0.12)</div>
  </div>
  <div>
    <label style="display:block;font-size:12px;font-weight:500;margin-bottom:6px;color:var(--color-error)">電子郵件</label>
    <input value="notanemail" style="width:100%;padding:10px 14px;border:1px solid var(--color-error);background:var(--color-error-bg);border-radius:8px;font-family:var(--font-sans);font-size:14px">
    <div style="font-size:11px;margin-top:4px;color:var(--color-error)">請輸入有效的電子郵件地址</div>
  </div>
</div>
</div></body></html>
