<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Semantic Colors</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:12px">
  
    <div style="display:flex;align-items:center;gap:16px;padding:12px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px">
      <div style="width:8px;height:40px;background:#B91C1C;border-radius:2px"></div>
      <div style="flex:1">
        <div style="color:#B91C1C;font-weight:600;font-size:14px">Error</div>
        <div class="meta" style="color:#B91C1C;opacity:0.7">Validation, destructive confirmations</div>
      </div>
      <div class="mono" style="color:#B91C1C">text #B91C1C</div>
      <div class="mono" style="color:#B91C1C">bg #FEF2F2</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;padding:12px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px">
      <div style="width:8px;height:40px;background:#15803D;border-radius:2px"></div>
      <div style="flex:1">
        <div style="color:#15803D;font-weight:600;font-size:14px">Success</div>
        <div class="meta" style="color:#15803D;opacity:0.7">Save confirmations, completion</div>
      </div>
      <div class="mono" style="color:#15803D">text #15803D</div>
      <div class="mono" style="color:#15803D">bg #F0FDF4</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;padding:12px 14px;background:#FEFCE8;border:1px solid #FEF08A;border-radius:8px">
      <div style="width:8px;height:40px;background:#A16207;border-radius:2px"></div>
      <div style="flex:1">
        <div style="color:#A16207;font-weight:600;font-size:14px">Warning</div>
        <div class="meta" style="color:#A16207;opacity:0.7">Caution, unsaved changes</div>
      </div>
      <div class="mono" style="color:#A16207">text #A16207</div>
      <div class="mono" style="color:#A16207">bg #FEFCE8</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;padding:12px 14px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px">
      <div style="width:8px;height:40px;background:#1D4ED8;border-radius:2px"></div>
      <div style="flex:1">
        <div style="color:#1D4ED8;font-weight:600;font-size:14px">Info</div>
        <div class="meta" style="color:#1D4ED8;opacity:0.7">Neutral notices, tips</div>
      </div>
      <div class="mono" style="color:#1D4ED8">text #1D4ED8</div>
      <div class="mono" style="color:#1D4ED8">bg #EFF6FF</div>
    </div>
</div>
</div></body></html>
