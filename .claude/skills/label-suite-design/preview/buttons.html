<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:16px">
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary">Sign in</button>
    <button class="btn btn-cta">Create Your First Task</button>
    <button class="btn btn-secondary">Continue with Google</button>
    <button class="btn btn-ghost">Cancel</button>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary" disabled style="opacity:.4;cursor:not-allowed">Disabled</button>
    <button class="btn btn-primary" style="opacity:0.7">
      <span style="display:inline-block;width:12px;height:12px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;margin-right:6px;vertical-align:-2px;animation:spin 0.7s linear infinite"></span>
      Loading
    </button>
    <button class="btn" style="background:var(--color-error);color:white">Delete task</button>
  </div>
  <div class="meta" style="border-top:1px solid var(--color-border-muted);padding-top:10px">
    Primary lifts translateY(-1px) on hover · 150ms · ease-standard · press: translateY(1px)
  </div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</div></body></html>
