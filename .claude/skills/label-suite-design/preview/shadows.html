<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadow System</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:8px">
  
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:100%;height:68px;background:white;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,0.05)"></div>
      <div style="font-weight:600;font-size:13px;margin-top:6px">sm</div>
      <div class="meta">--shadow-sm</div>
      <div class="meta" style="font-size:11px">subtle</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:100%;height:68px;background:white;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,0.10)"></div>
      <div style="font-weight:600;font-size:13px;margin-top:6px">md</div>
      <div class="meta">--shadow-md</div>
      <div class="meta" style="font-size:11px">dropdown</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:100%;height:68px;background:white;border-radius:12px;box-shadow:0 10px 15px rgba(0,0,0,0.10)"></div>
      <div style="font-weight:600;font-size:13px;margin-top:6px">lg</div>
      <div class="meta">--shadow-lg</div>
      <div class="meta" style="font-size:11px">modal</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:100%;height:68px;background:white;border-radius:12px;box-shadow:0 20px 25px rgba(0,0,0,0.15)"></div>
      <div style="font-weight:600;font-size:13px;margin-top:6px">xl</div>
      <div class="meta">--shadow-xl</div>
      <div class="meta" style="font-size:11px">toast</div>
    </div>
    <div class="col" style="align-items:center;gap:6px">
      <div style="width:100%;height:68px;background:white;border-radius:12px;box-shadow:0 4px 24px rgba(99,102,241,0.10), 0 1px 4px rgba(0,0,0,0.06)"></div>
      <div style="font-weight:600;font-size:13px;margin-top:6px">card</div>
      <div class="meta">--shadow-card</div>
      <div class="meta" style="font-size:11px">login card</div>
    </div>
</div>
</div></body></html>
