<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Alerts</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:10px">
  
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--color-error-bg);border:1px solid var(--color-error-border);border-radius:8px">
      <img src="../assets/icons/alert-circle.svg" style="width:18px;height:18px;color:var(--color-error);margin-top:2px">
      <div class="col" style="gap:2px">
        <div style="color:var(--color-error);font-size:14px;font-weight:500">帳號或密碼錯誤，請再試一次</div>
        <div style="color:var(--color-error);font-size:13px;opacity:0.8">Invalid email or password</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--color-success-bg);border:1px solid var(--color-success-border);border-radius:8px">
      <img src="../assets/icons/check.svg" style="width:18px;height:18px;color:var(--color-success);margin-top:2px">
      <div class="col" style="gap:2px">
        <div style="color:var(--color-success);font-size:14px;font-weight:500">任務已成功建立</div>
        <div style="color:var(--color-success);font-size:13px;opacity:0.8">Task created successfully</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--color-warning-bg);border:1px solid var(--color-warning-border);border-radius:8px">
      <img src="../assets/icons/alert-circle.svg" style="width:18px;height:18px;color:var(--color-warning);margin-top:2px">
      <div class="col" style="gap:2px">
        <div style="color:var(--color-warning);font-size:14px;font-weight:500">你有未儲存的變更</div>
        <div style="color:var(--color-warning);font-size:13px;opacity:0.8">You have unsaved changes</div>
      </div>
    </div>
    <div style="display:flex;gap:12px;align-items:flex-start;padding:12px 14px;background:var(--color-info-bg);border:1px solid var(--color-info-border);border-radius:8px">
      <img src="../assets/icons/info.svg" style="width:18px;height:18px;color:var(--color-info);margin-top:2px">
      <div class="col" style="gap:2px">
        <div style="color:var(--color-info);font-size:14px;font-weight:500">Dry Run 模式下不會儲存資料</div>
        <div style="color:var(--color-info);font-size:13px;opacity:0.8">Dry Run mode — data is not persisted</div>
      </div>
    </div>
</div>
</div></body></html>
