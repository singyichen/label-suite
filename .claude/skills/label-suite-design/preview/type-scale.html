<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div class="col" style="gap:16px">
  <div style="display:flex;align-items:baseline;gap:20px">
    <div class="label-tiny" style="width:60px">Display</div>
    <div style="font-family:var(--font-serif-display);font-size:48px;font-weight:700;line-height:1.2">Label Suite</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:20px">
    <div class="label-tiny" style="width:60px">H1 36</div>
    <div style="font-family:var(--font-serif-display);font-size:36px;font-weight:700;line-height:1.3">Track annotations</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:20px">

  <div style="display:flex;align-items:baseline;gap:20px">
    <div class="label-tiny" style="width:60px">H3 18</div>
    <div style="font-family:var(--font-sans);font-size:18px;font-weight:600">Recent projects</div>
  </div>

    <div class="label-tiny" style="width:60px">Body 16</div>

  </div>
  <div style="display:flex;align-items:baseline;gap:20px">
    <div class="label-tiny" style="width:60px">Caption 14</div>
    <div style="font-family:var(--font-sans);font-size:14px;color:var(--color-text-soft)">Updated 3 minutes ago</div>
  </div>
  <div style="display:flex;align-items:baseline;gap:20px">
    <div class="label-tiny" style="width:60px">Label 12</div>
    <div style="font-family:var(--font-sans);font-size:12px;font-weight:500">EMAIL ADDRESS</div>
  </div>
