<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Logo Marks</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head><body><div class="card">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
  <div style="background:var(--color-surface);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:100px">
    <img src="../assets/logo/logo-horizontal.svg" style="height:40px">
  </div>
  <div style="background:var(--color-ink);padding:20px;border-radius:8px;display:flex;align-items:center;justify-content:center;min-height:100px">
    <img src="../assets/logo/icon-colored.svg" style="height:56px">
  </div>
</div>
<div class="row" style="margin-top:16px;gap:24px;align-items:center">
  <img src="../assets/logo/icon.svg" style="width:20px;height:20px;color:var(--color-primary)">
  <img src="../assets/logo/icon.svg" style="width:28px;height:28px;color:var(--color-ink)">
  <img src="../assets/logo/icon.svg" style="width:40px;height:40px;color:var(--color-primary)">
  <div class="meta">Monochrome tag — stroke="currentColor", inherits from text color.</div>
</div>
</div></body></html>
