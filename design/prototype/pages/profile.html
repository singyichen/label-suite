<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人設定 — Label Suite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Crimson+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#6366F1',
            secondary: '#818CF8',
            cta:       '#10B981',
            surface:   '#F5F3FF',
            ink:       '#1E1B4B',
          },
          fontFamily: {
            heading: ['"Crimson Pro"', 'Noto Serif TC', 'serif'],
            body:    ['"Atkinson Hyperlegible"', 'Noto Sans TC', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Atkinson Hyperlegible', 'Noto Sans TC', sans-serif; }
    h1, h2, h3 { font-family: 'Crimson Pro', 'Noto Serif TC', serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

    /* Mobile: reserve space for fixed bottom tab bar */
    @media (max-width: 767px) {
      body { padding-bottom: 56px; }
    }

    /* Tooltip */
    .tooltip-wrap { position: relative; display: inline-flex; }
    .tooltip-wrap .tooltip {
      visibility: hidden; opacity: 0;
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #1E1B4B; color: #fff; font-size: 11px; white-space: nowrap;
      padding: 4px 8px; border-radius: 6px;
      transition: opacity 150ms ease;
      pointer-events: none; z-index: 500;
    }
    .tooltip-wrap .tooltip::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 4px solid transparent; border-top-color: #1E1B4B;
    }
    .tooltip-wrap:hover .tooltip,
    .tooltip-wrap:focus-within .tooltip { visibility: visible; opacity: 1; }

    /* Avatar upload hover overlay */
    .avatar-wrap:hover .avatar-overlay { opacity: 1; }
  </style>
</head>

<body class="bg-surface min-h-screen flex flex-col">

  <!-- ── Top Navbar ── -->
  <!-- Desktop: px-20 (80px) | Mobile: px-4 (16px) — from wireframe -->
  <header class="h-14 bg-white border-b border-slate-200 flex items-center px-4 md:px-20 shrink-0 z-[200]" role="banner">
    <div class="flex items-center gap-3 flex-1">
      <a href="dashboard.html" class="flex items-center gap-2.5 group focus:outline-none" aria-label="Label Suite — 回首頁">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center group-hover:bg-secondary transition-colors duration-200">
          <svg class="w-4 h-4 text-white" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <h1 class="text-lg font-bold text-ink leading-none">Label Suite</h1>
      </a>
    </div>

    <!-- Right: Language toggle + Avatar -->
    <div class="flex items-center gap-3">
      <button id="lang-toggle" onclick="toggleLang()"
              class="flex items-center gap-1.5 text-xs font-medium text-slate-500 hover:text-primary border border-slate-200 bg-white rounded-full px-3 py-1.5 cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
              aria-label="Switch language / 切換語言">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <span id="lang-label">EN</span>
      </button>
      <div class="w-8 h-8 rounded-full bg-primary flex items-center justify-center text-white text-xs font-bold select-none" aria-hidden="true">
        MC
      </div>
    </div>
  </header>

  <!-- ── App Shell ── -->
  <div class="flex flex-1 min-h-0">

    <!-- ── Sidebar (desktop only, 224px) ── -->
    <!-- wireframe: sidebar width 224, padding [16,12], gap 4 -->
    <aside class="hidden md:flex w-56 bg-white border-r border-slate-200 flex-col shrink-0 py-4 z-[200]">
      <nav class="flex flex-col gap-1 px-3" aria-label="主選單">

        <!-- Dashboard (inactive) -->
        <a href="dashboard.html"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm text-slate-500 hover:bg-surface hover:text-ink cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary"
           data-i18n-aria-label="aria-nav-dashboard">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span data-i18n="nav-dashboard">儀表板</span>
        </a>

        <div class="h-px bg-slate-100 my-1 mx-3" aria-hidden="true"></div>

        <!-- Profile Settings (active) -->
        <a href="#"
           class="flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium text-primary bg-surface cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary"
           aria-current="page" data-i18n-aria-label="aria-nav-profile">
          <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span data-i18n="nav-profile">個人設定</span>
        </a>

      </nav>
    </aside>

    <!-- ── Main Content ── -->
    <!-- Desktop: py-8 px-20 (32px/80px) | Mobile: p-4 (16px) — from wireframe -->
    <main class="flex-1 overflow-y-auto p-4 md:py-8 md:px-20" role="main">
      <!-- max-w-3xl per MASTER.md Pattern C -->
      <div class="max-w-3xl">

        <!-- Page heading — desktop gap 6, mobile gap 4 -->
        <div class="mb-4 md:mb-6">
          <!-- Desktop: font-size 24 | Mobile: font-size 20 — from wireframe -->
          <h2 class="text-xl md:text-2xl font-bold text-ink" data-i18n="page-title">個人設定</h2>
          <p class="text-sm text-slate-500 mt-1 leading-relaxed" data-i18n="page-desc">管理您的帳號資訊與顯示偏好。</p>
        </div>

        <!-- ── Toast (hidden by default) ── -->
        <div id="toast" role="status" aria-live="polite"
             class="hidden mb-5 flex items-center gap-2 text-sm rounded-lg px-4 py-3 border">
          <svg id="toast-icon" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"></svg>
          <span id="toast-text" class="flex-1"></span>
          <button type="button" onclick="document.getElementById('toast').classList.add('hidden')"
                  class="ml-2 shrink-0 opacity-60 hover:opacity-100 cursor-pointer transition-opacity duration-150 focus:outline-none focus:ring-2 focus:ring-current rounded"
                  aria-label="關閉通知" data-i18n-aria-label="aria-toast-close">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <!-- ── Profile Card ── -->
        <!-- Desktop: p-8 rounded-2xl (padding 32, radius 16) | Mobile: p-4 rounded-xl (padding 16, radius 12) -->
        <div class="bg-white border border-slate-200 rounded-xl md:rounded-2xl p-4 md:p-8 flex flex-col gap-5 md:gap-6">

          <!-- Avatar section -->
          <!-- Desktop: gap-5 (20px), avatar 80px | Mobile: gap-4 (16px), avatar 64px -->
          <div class="flex items-center gap-4 md:gap-5">
            <div class="relative avatar-wrap cursor-pointer group shrink-0"
                 onclick="document.getElementById('avatar-input').click()"
                 role="button" tabindex="0"
                 aria-label="上傳頭像" data-i18n-aria-label="aria-avatar"
                 aria-describedby="avatar-error"
                 onkeydown="if(event.key==='Enter'||event.key===' ')document.getElementById('avatar-input').click()">
              <!-- Avatar: w-16 h-16 mobile (64px), w-20 h-20 desktop (80px) -->
              <div id="avatar-preview"
                   class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-primary flex items-center justify-center text-white text-xl md:text-2xl font-bold select-none overflow-hidden"
                   aria-hidden="true">
                MC
              </div>
              <!-- Hover overlay (wireframe: semi-transparent dark + upload icon) -->
              <div class="avatar-overlay absolute inset-0 rounded-full bg-black/50 flex items-center justify-center opacity-0 transition-opacity duration-200">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <input id="avatar-input" type="file" accept="image/jpeg,image/png,image/webp" class="hidden"
                     aria-label="選擇頭像圖片" onchange="previewAvatar(event)" />
            </div>
            <div>
              <p class="text-sm font-medium text-ink" data-i18n="avatar-label">個人頭像</p>
              <p class="text-xs text-slate-500 mt-0.5" data-i18n="avatar-hint">JPG、PNG 或 WebP，最大 5 MB</p>
              <p id="avatar-error" class="hidden text-xs text-red-500 mt-1" role="alert"></p>
            </div>
          </div>

          <div class="h-px bg-slate-100" aria-hidden="true"></div>

          <!-- Form fields -->
          <!-- Desktop: gap-5 (20px) | Mobile: gap-4 (16px) — from wireframe -->
          <div class="flex flex-col gap-4 md:gap-5">

            <!-- Display Name -->
            <div class="flex flex-col gap-1.5">
              <label for="display-name" class="text-sm font-medium text-ink" data-i18n="label-name">顯示名稱</label>
              <input id="display-name" type="text" value="Mandy Chen"
                     maxlength="50"
                     class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm text-ink bg-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors duration-200"
                     data-i18n-placeholder="placeholder-name"
                     aria-describedby="name-hint"
                     onblur="validateName(this)" />
              <p id="name-hint" class="text-xs text-slate-500" data-i18n="hint-name">最多 50 個字元</p>
              <p id="name-error" class="hidden text-xs text-red-500" role="alert" data-i18n="error-name-empty">顯示名稱不得為空白。</p>
            </div>

            <!-- Email (read-only) -->
            <div class="flex flex-col gap-1.5">
              <div class="flex items-center gap-1.5">
                <label for="email" class="text-sm font-medium text-ink" data-i18n="label-email">Email</label>
                <div class="tooltip-wrap" tabindex="0" aria-describedby="email-tooltip-text">
                  <svg class="w-3.5 h-3.5 text-slate-400 cursor-default" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>
                  </svg>
                  <span id="email-tooltip-text" class="tooltip" data-i18n="tooltip-email">Email 由 SSO 帳號管理，無法在此修改。</span>
                </div>
              </div>
              <!-- wireframe: fill #F8FAFC (readonly bg), border #E2E8F0 -->
              <input id="email" type="email" value="mandy.chen@example.edu" readonly
                     class="w-full border border-slate-100 rounded-lg px-3 py-2.5 text-sm text-slate-500 bg-slate-50 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-slate-300"
                     aria-readonly="true" />
            </div>

            <!-- Role (read-only badge) -->
            <div class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-ink" data-i18n="label-role">角色</span>
              <div class="flex items-center gap-2 flex-wrap">
                <!-- wireframe: role_badge = cornerRadius 9999, fill #EEF2FF, border #6366F1 -->
                <span id="role-badge"
                      class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium bg-indigo-50 text-primary border border-primary/30">
                  <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                  </svg>
                  <span data-i18n="role-admin">管理員</span>
                </span>
                <span class="text-xs text-slate-500" data-i18n="role-hint">角色由系統管理員指派。</span>
              </div>
            </div>

            <!-- Language Preference -->
            <div class="flex flex-col gap-1.5">
              <span class="text-sm font-medium text-ink" data-i18n="label-lang">介面語言</span>
              <!-- wireframe: lang_toggle = fill #F1F5F9, cornerRadius 8, padding 4, gap 4 -->
              <div class="flex items-center gap-1 p-1 bg-slate-100 rounded-lg w-fit" role="tablist" aria-label="介面語言">
                <button id="lang-zh" type="button" onclick="setLangPref('zh-TW')"
                        class="px-4 py-1.5 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1"
                        role="tab" aria-selected="true" title="繁體中文 (Traditional Chinese)">
                  ZH
                </button>
                <button id="lang-en" type="button" onclick="setLangPref('en')"
                        class="px-4 py-1.5 rounded-md text-sm font-medium cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-1"
                        role="tab" aria-selected="false" title="English">
                  EN
                </button>
              </div>
              <p class="text-xs text-slate-500" data-i18n="hint-lang">切換後立即套用，並儲存至帳號設定。</p>
            </div>

          </div>

          <div class="h-px bg-slate-100" aria-hidden="true"></div>

          <!-- Save section -->
          <!-- Desktop: space-between row (time left, btn right)
               Mobile: vertical stack (time on top, full-width btn below) — from wireframe -->
          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
            <p class="text-xs text-slate-400" data-i18n="last-saved">上次儲存：2026-03-27 14:32</p>
            <!-- Mobile: w-full h-11 (44px) | Desktop: w-auto — from wireframe -->
            <button type="button" onclick="saveProfile()"
                    id="save-btn"
                    class="flex items-center justify-center gap-2 bg-cta hover:opacity-90 hover:-translate-y-px text-white text-sm font-medium rounded-lg px-5 h-11 md:h-auto md:py-2.5 cursor-pointer transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-cta focus:ring-offset-2 w-full md:w-auto"
                    aria-label="儲存個人設定" data-i18n-aria-label="aria-save-btn">
              <svg id="save-icon" class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
              </svg>
              <span data-i18n="btn-save">儲存變更</span>
            </button>
          </div>

        </div>
        <!-- /Profile Card -->

      </div>
    </main>

  </div>
  <!-- /App Shell -->


  <!-- ── Bottom Tab Bar (mobile only, height 56px) ── -->
  <!-- wireframe: justifyContent space_around, border-top #E2E8F0 -->
  <nav class="md:hidden fixed bottom-0 left-0 right-0 h-14 bg-white border-t border-slate-200 flex items-stretch z-[200]"
       aria-label="底部導覽">
    <!-- Dashboard tab (inactive) -->
    <a href="dashboard.html"
       class="flex-1 flex flex-col items-center justify-center gap-0.5 text-slate-500 hover:text-primary transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary"
       data-i18n-aria-label="aria-nav-dashboard">
      <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span class="text-xs" data-i18n="nav-dashboard">儀表板</span>
    </a>
    <!-- Profile tab (active) -->
    <a href="#"
       class="flex-1 flex flex-col items-center justify-center gap-0.5 text-primary font-medium transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary"
       aria-current="page" data-i18n-aria-label="aria-nav-profile">
      <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span class="text-xs font-medium" data-i18n="nav-profile">個人設定</span>
    </a>
  </nav>


  <!-- ── i18n + Logic ── -->
  <script>
    const STRINGS = {
      'zh-TW': {
        'page-title':      '個人設定',
        'page-desc':       '管理您的帳號資訊與顯示偏好。',
        'nav-dashboard':   '儀表板',
        'nav-profile':     '個人設定',
        'avatar-label':    '個人頭像',
        'avatar-hint':     'JPG、PNG 或 WebP，最大 5 MB',
        'label-name':      '顯示名稱',
        'placeholder-name':'輸入顯示名稱',
        'hint-name':       '最多 50 個字元',
        'error-name-empty':'顯示名稱不得為空白。',
        'label-email':     'Email',
        'tooltip-email':   'Email 由 SSO 帳號管理，無法在此修改。',
        'label-role':      '角色',
        'role-admin':      '管理員',
        'role-hint':       '角色由系統管理員指派。',
        'label-lang':      '介面語言',
        'hint-lang':       '切換後立即套用，並儲存至帳號設定。',
        'last-saved':      '上次儲存：2026-03-27 14:32',
        'btn-save':        '儲存變更',
        'toast-success':   '個人設定已儲存。',
        'toast-error':     '儲存失敗，請稍後再試。',
        'lang-label':      'EN',
        'page-doc-title':  '個人設定 — Label Suite',
        'aria-avatar':          '上傳頭像',
        'aria-save-btn':        '儲存個人設定',
        'aria-nav-dashboard':   '前往儀表板',
        'aria-nav-profile':     '目前頁面：個人設定',
        'error-avatar-size':    '檔案大小不得超過 5 MB。',
        'error-avatar-type':    '僅支援 JPG、PNG 或 WebP 格式。',
        'avatar-preview-alt':   '頭像預覽',
        'aria-toast-close':     '關閉通知',
        'aria-save-loading':    '儲存中…',
      },
      'en': {
        'page-title':      'Profile Settings',
        'page-desc':       'Manage your account information and display preferences.',
        'nav-dashboard':   'Dashboard',
        'nav-profile':     'Profile Settings',
        'avatar-label':    'Profile Picture',
        'avatar-hint':     'JPG, PNG, or WebP, max 5 MB',
        'label-name':      'Display Name',
        'placeholder-name':'Enter display name',
        'hint-name':       'Up to 50 characters',
        'error-name-empty':'Display name cannot be empty.',
        'label-email':     'Email',
        'tooltip-email':   'Email is managed by your SSO account and cannot be changed here.',
        'label-role':      'Role',
        'role-admin':      'Admin',
        'role-hint':       'Role is assigned by the system administrator.',
        'label-lang':      'Interface Language',
        'hint-lang':       'Applied immediately and saved to your account.',
        'last-saved':      'Last saved: 2026-03-27 14:32',
        'btn-save':        'Save Changes',
        'toast-success':   'Profile settings saved.',
        'toast-error':     'Save failed. Please try again.',
        'lang-label':      'ZH',
        'page-doc-title':  'Profile Settings — Label Suite',
        'aria-avatar':          'Upload profile picture',
        'aria-save-btn':        'Save profile settings',
        'aria-nav-dashboard':   'Go to Dashboard',
        'aria-nav-profile':     'Current page: Profile Settings',
        'error-avatar-size':    'File size must not exceed 5 MB.',
        'error-avatar-type':    'Only JPG, PNG, or WebP formats are supported.',
        'avatar-preview-alt':   'Avatar preview',
        'aria-toast-close':     'Dismiss notification',
        'aria-save-loading':    'Saving…',
      },
    };

    const STORAGE_KEY = 'labelsuite-lang';
    let currentLang = localStorage.getItem(STORAGE_KEY) || 'zh-TW';
    let pendingLang  = currentLang;

    // ── Language application ──────────────────────────────────────
    function applyLang(lang) {
      if (!STRINGS[lang]) lang = 'zh-TW';
      currentLang = lang;
      localStorage.setItem(STORAGE_KEY, lang);
      const s = STRINGS[lang];

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (s[key] !== undefined) el.textContent = s[key];
      });
      document.querySelectorAll('[data-i18n-aria-label]').forEach(el => {
        const key = el.getAttribute('data-i18n-aria-label');
        if (s[key] !== undefined) el.setAttribute('aria-label', s[key]);
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (s[key] !== undefined) el.setAttribute('placeholder', s[key]);
      });

      document.getElementById('lang-label').textContent = s['lang-label'];
      document.documentElement.lang = lang;
      document.title = s['page-doc-title'];

      updateLangToggle(lang);
    }

    function toggleLang() {
      const next = currentLang === 'zh-TW' ? 'en' : 'zh-TW';
      applyLang(next);
      pendingLang = next;
    }

    // ── Language preference toggle (in form) ──────────────────────
    function setLangPref(lang) {
      pendingLang = lang;
      applyLang(lang);
    }

    function updateLangToggle(lang) {
      const zhBtn = document.getElementById('lang-zh');
      const enBtn = document.getElementById('lang-en');
      const activeClasses   = ['bg-white', 'text-ink', 'shadow-sm'];
      const inactiveClasses = ['text-slate-500', 'hover:text-ink'];

      [zhBtn, enBtn].forEach(btn => {
        btn.classList.remove(...activeClasses, ...inactiveClasses);
      });

      const [selectedBtn, unselectedBtn] = lang === 'zh-TW' ? [zhBtn, enBtn] : [enBtn, zhBtn];
      selectedBtn.classList.add(...activeClasses);
      selectedBtn.setAttribute('aria-selected', 'true');
      unselectedBtn.classList.add(...inactiveClasses);
      unselectedBtn.setAttribute('aria-selected', 'false');
    }

    // ── Avatar upload & preview ───────────────────────────────────
    function previewAvatar(event) {
      const file = event.target.files[0];
      if (!file) return;

      const errEl = document.getElementById('avatar-error');
      errEl.classList.add('hidden');

      const allowed = ['image/jpeg', 'image/png', 'image/webp'];
      if (!allowed.includes(file.type)) {
        errEl.textContent = STRINGS[currentLang]['error-avatar-type'];
        errEl.classList.remove('hidden');
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        errEl.textContent = STRINGS[currentLang]['error-avatar-size'];
        errEl.classList.remove('hidden');
        return;
      }

      const objectUrl = URL.createObjectURL(file);
      const preview = document.getElementById('avatar-preview');
      preview.innerHTML = '';
      const img = document.createElement('img');
      img.src = objectUrl;
      img.alt = STRINGS[currentLang]['avatar-preview-alt'];
      img.className = 'w-full h-full object-cover';
      img.onload = () => URL.revokeObjectURL(objectUrl);
      preview.appendChild(img);
    }

    // ── Form validation ───────────────────────────────────────────
    function validateName(input) {
      const errEl = document.getElementById('name-error');
      if (!input.value.trim()) {
        errEl.classList.remove('hidden');
        input.classList.add('border-red-400', 'focus:ring-red-400');
        return false;
      }
      errEl.classList.add('hidden');
      input.classList.remove('border-red-400', 'focus:ring-red-400');
      return true;
    }

    // ── Save ──────────────────────────────────────────────────────
    function saveProfile() {
      const nameInput = document.getElementById('display-name');
      if (!validateName(nameInput)) {
        nameInput.focus();
        return;
      }

      const btn = document.getElementById('save-btn');
      const s = STRINGS[currentLang];
      btn.disabled = true;
      btn.setAttribute('aria-busy', 'true');
      btn.setAttribute('aria-label', s['aria-save-loading'] || '儲存中…');
      btn.classList.add('opacity-70', 'cursor-not-allowed');
      document.getElementById('save-icon').innerHTML = `
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/>
        </path>`;

      setTimeout(() => {
        btn.disabled = false;
        btn.setAttribute('aria-busy', 'false');
        btn.setAttribute('aria-label', s['aria-save-btn']);
        btn.classList.remove('opacity-70', 'cursor-not-allowed');
        document.getElementById('save-icon').innerHTML = `
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/>
          <polyline points="7 3 7 8 15 8"/>`;
        showToast('success');
      }, 900);
    }

    function showToast(type) {
      const toast    = document.getElementById('toast');
      const toastTxt  = document.getElementById('toast-text');
      const toastIcon = document.getElementById('toast-icon');
      const s = STRINGS[currentLang];

      toast.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'text-green-700',
                                       'bg-red-50',   'border-red-200',   'text-red-700');
      if (type === 'success') {
        toast.classList.add('bg-green-50', 'border-green-200', 'text-green-700');
        toastTxt.textContent = s['toast-success'];
        toastIcon.innerHTML = `<polyline points="20 6 9 17 4 12"/>`;
      } else {
        toast.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
        toastTxt.textContent = s['toast-error'];
        toastIcon.innerHTML = `<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>`;
      }
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 4000);
    }

    // ── Init ──────────────────────────────────────────────────────
    applyLang(currentLang);
  </script>
</body>
</html>
