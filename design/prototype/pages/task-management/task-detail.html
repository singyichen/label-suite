  function bindEvents() {
    var modeRadios = document.querySelectorAll('input[name="samplingMode"]');
    var valueInput = document.getElementById('samplingValue');
    var isolationToggle = document.getElementById('isolationToggle');
    var samplingEditBtn = document.getElementById('samplingEditBtn');
    var samplingSaveBtn = document.getElementById('samplingSaveBtn');
    var samplingCancelBtn = document.getElementById('samplingCancelBtn');
    var resampleBtn = document.getElementById('resampleBtn');
    var overviewEditBtn = document.getElementById('overviewEditBtn');
    var overviewSaveBtn = document.getElementById('overviewSaveBtn');
    var overviewCancelBtn = document.getElementById('overviewCancelBtn');
    var guidelineEditBtn = document.getElementById('guidelineEditBtn');
    var guidelineSaveBtn = document.getElementById('guidelineSaveBtn');
    var guidelineCancelBtn = document.getElementById('guidelineCancelBtn');
    var guidelineUploadZone = document.getElementById('guidelineUploadZone');
    var editGuidelineFileInput = document.getElementById('editGuidelineFileInput');
    var editGuidelineTextInput = document.getElementById('editGuidelineTextInput');
    var editForceGuidelineToggle = document.getElementById('editForceGuidelineToggle');
    var settingsEditBtn = document.getElementById('settingsEditBtn');
    var settingsSaveBtn = document.getElementById('settingsSaveBtn');
    var settingsCancelBtn = document.getElementById('settingsCancelBtn');
    var settingsApplyTemplateBtn = document.getElementById('settingsApplyTemplateBtn');
    var settingsUploadConfigBtn = document.getElementById('settingsUploadConfigBtn');
    var settingsConfigFileInput = document.getElementById('settingsConfigFileInput');
    var settingsCodeEditor = document.getElementById('settingsCodeEditor');
    var settingsSaveCodeBtn = document.getElementById('settingsSaveCodeBtn');
    var settingsFormatYamlBtn = document.getElementById('settingsFormatYamlBtn');
    var settingsFormatJsonBtn = document.getElementById('settingsFormatJsonBtn');
    var editTaskNameInput = document.getElementById('editTaskNameInput');
    var editTaskTypeSelect = document.getElementById('editTaskTypeSelect');
    var editDatasetFileInput = document.getElementById('editDatasetFileInput');
    var tabOverview = document.getElementById('tabOverview');
    var tabAnnotationProgress = document.getElementById('tabAnnotationProgress');
    var tabWorkLog = document.getElementById('tabWorkLog');
    var tabMemberManagement = document.getElementById('tabMemberManagement');

    tabOverview.addEventListener('click', function() {
      setTabByRole('overview');
      renderTabs();
      trackEvent('prototype_tab_switched', { tab: 'overview' });
    });

    tabAnnotationProgress.addEventListener('click', function() {
      var allowed = setTabByRole('annotation-progress');
      if (!allowed) return;
      renderTabs();
      renderAnnotationProgress();
      trackEvent('prototype_tab_switched', { tab: 'annotation-progress' });
    });

    tabWorkLog.addEventListener('click', function() {
      var allowed = setTabByRole('work-log');
      if (!allowed) return;
      renderTabs();
      renderWorkLog();
      trackEvent('prototype_tab_switched', { tab: 'work-log' });
    });

    tabMemberManagement.addEventListener('click', function() {
      var allowed = setTabByRole('member-management');
      renderTabs();
      if (!allowed) return;
      renderMemberManagement();
      trackEvent('prototype_tab_switched', { tab: 'member-management' });
    });

    if (overviewEditBtn) {
      overviewEditBtn.addEventListener('click', function() {
        startOverviewEdit();
      });
    }

    if (overviewSaveBtn) {
      overviewSaveBtn.addEventListener('click', function() {
        saveOverviewEdit();
      });
    }

    if (overviewCancelBtn) {
      overviewCancelBtn.addEventListener('click', function() {
        cancelOverviewEdit(false);
      });
    }

    if (samplingEditBtn) {
      samplingEditBtn.addEventListener('click', function() {
        startSamplingEdit();
      });
    }

    if (samplingSaveBtn) {
      samplingSaveBtn.addEventListener('click', function() {
        saveSamplingEdit();
      });
    }

    if (samplingCancelBtn) {
      samplingCancelBtn.addEventListener('click', function() {
        cancelSamplingEdit(false);
      });
    }

    if (guidelineEditBtn) {
      guidelineEditBtn.addEventListener('click', function() {
        startGuidelineEdit();
      });
    }

    if (guidelineSaveBtn) {
      guidelineSaveBtn.addEventListener('click', function() {
        saveGuidelineEdit();
      });
    }

    if (guidelineCancelBtn) {
      guidelineCancelBtn.addEventListener('click', function() {
        cancelGuidelineEdit(false);
      });
    }

    if (guidelineUploadZone && editGuidelineFileInput) {
      guidelineUploadZone.addEventListener('click', function() {
        if (!state.guidelineEditMode) return;
        editGuidelineFileInput.click();
      });
      guidelineUploadZone.addEventListener('keydown', function(event) {
        if (!state.guidelineEditMode) return;
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          editGuidelineFileInput.click();
        }
      });
    }

    if (editGuidelineFileInput) {
      editGuidelineFileInput.addEventListener('change', function() {
        if (!this.files || !this.files.length) return;
        addGuidelineDraftFiles(this.files);
        this.value = '';
      });
    }

    if (editGuidelineTextInput) {
      editGuidelineTextInput.addEventListener('input', function(event) {
        if (!state.guidelineDraft) return;
        state.guidelineDraft.guidelineText = event.target.value;
        markGuidelineDirty();
      });
    }

    if (editForceGuidelineToggle) {
      editForceGuidelineToggle.addEventListener('change', function(event) {
        if (!state.guidelineDraft) return;
        state.guidelineDraft.forceGuideline = event.target.checked;
        markGuidelineDirty();
      });
    }

    if (settingsEditBtn) {
      settingsEditBtn.addEventListener('click', function() {
        startSettingsEdit();
      });
    }

    if (settingsSaveBtn) {
      settingsSaveBtn.addEventListener('click', function() {
        saveSettingsEdit();
      });
    }

    if (settingsCancelBtn) {
      settingsCancelBtn.addEventListener('click', function() {
        cancelSettingsEdit(false);
      });
    }

    if (settingsApplyTemplateBtn) {
      settingsApplyTemplateBtn.addEventListener('click', function() {
        applySettingsTemplate();
      });
    }

    if (settingsUploadConfigBtn && settingsConfigFileInput) {
      settingsUploadConfigBtn.addEventListener('click', function() {
        settingsConfigFileInput.click();
      });
    }

    if (settingsConfigFileInput) {
      settingsConfigFileInput.addEventListener('change', function() {
        if (!this.files || !this.files[0]) return;
        loadSettingsConfigFile(this.files[0]);
        this.value = '';
      });
    }

    if (settingsFormatYamlBtn) {
      settingsFormatYamlBtn.addEventListener('click', function() {
        setSettingsCodeFormat('yaml');
      });
    }

    if (settingsFormatJsonBtn) {
      settingsFormatJsonBtn.addEventListener('click', function() {
        setSettingsCodeFormat('json');
      });
    }

    if (settingsCodeEditor) {
      settingsCodeEditor.addEventListener('input', function() {
        if (!state.settingsDraft) return;
        markSettingsCodeDirty();
        setSettingsCodeError('');
        markSettingsDirty();
      });
    }

    if (settingsSaveCodeBtn) {
      settingsSaveCodeBtn.addEventListener('click', function() {
        saveSettingsCodeToVisual(true);
      });
    }

    if (editTaskNameInput) {
      editTaskNameInput.addEventListener('input', function() {
        if (state.overviewDraft && state.lang === 'zh') state.overviewDraft.taskNameZh = editTaskNameInput.value;
        if (state.overviewDraft && state.lang === 'en') state.overviewDraft.taskNameEn = editTaskNameInput.value;
        setOverviewEditError('');
        markOverviewDirty();
      });
    }

    if (editTaskTypeSelect) {
      editTaskTypeSelect.addEventListener('change', function() {
        if (state.overviewDraft) state.overviewDraft.taskTypeKey = editTaskTypeSelect.value;
        markOverviewDirty();
      });
    }

    if (editDatasetFileInput) {
      editDatasetFileInput.addEventListener('change', function() {
        if (!state.overviewDraft || !this.files || !this.files[0]) return;
        state.overviewDraft.datasetSourceZh = this.files[0].name;
        state.overviewDraft.datasetSourceEn = this.files[0].name;
        fillOverviewEditForm();
        markOverviewDirty();
        this.value = '';
      });
    }

    if (modeRadios.length && valueInput) {
      modeRadios.forEach(function(modeRadio) {
        modeRadio.addEventListener('change', function(e) {
          if (!e.target.checked) return;
          if (!state.samplingEditMode || !state.samplingDraft) return;
          state.samplingDraft.samplingMode = e.target.value;
          if (state.samplingDraft.samplingMode === 'by_percentage') {
            state.samplingDraft.samplingValue = Math.max(1, Math.min(99, state.samplingDraft.samplingValue));
            valueInput.max = '99';
          } else {
            state.samplingDraft.samplingValue = Math.max(1, Math.min(TASK_DATA.datasetTotal - 1, state.samplingDraft.samplingValue));
            valueInput.removeAttribute('max');
          }
          valueInput.value = String(state.samplingDraft.samplingValue);
          markSamplingDirty();
          renderSamplingState();
        });
      });

      valueInput.addEventListener('input', function(e) {
        if (!state.samplingEditMode || !state.samplingDraft) return;
        state.samplingDraft.samplingValue = Number(e.target.value || 0);
        markSamplingDirty();
        renderSamplingState();
      });
    }

    if (resampleBtn) {
      resampleBtn.addEventListener('click', function() {
        if (!state.samplingEditMode || !state.samplingDraft || !isSamplingEditable()) return;
        state.samplingDraft.randomSeed = Math.floor(Math.random() * 900000 + 100000);
        markSamplingDirty();
        showToast(t('toastResampled'));
        trackEvent('prototype_resample_clicked');
        renderSamplingState();
      });
    }

    if (isolationToggle) {
      isolationToggle.addEventListener('change', function(e) {
        if (!state.samplingEditMode || !state.samplingDraft) return;
        state.samplingDraft.isolationEnabled = Boolean(e.target.checked);
        state.samplingDraft.isolationLastActor = (I18N[state.lang].userName || I18N.zh.userName)[state.taskRole] || 'User';
        state.samplingDraft.isolationLastUpdated = '2026-04-21 10:03';
        markSamplingDirty();
        renderSamplingState();
      });
    }

    document.getElementById('publishActionRow').addEventListener('click', function(e) {
      if (e.target.id === 'publishDryRunBtn') {
        trackEvent('prototype_cta_clicked', { cta: 'publish_dry_run' });
        if (!TASK_DATA.isolationEnabled && !state.isolationConfirmed) {
          openRiskModal('publishDryRun');
          return;
        }
        publishDryRun();
      }

      if (e.target.id === 'publishOfficialRunBtn') {
        trackEvent('prototype_cta_clicked', { cta: 'publish_official_run' });
        if (!TASK_DATA.isolationEnabled && !state.isolationConfirmed) {
          openRiskModal('publishOfficialRun');
          return;
        }
        publishOfficialRun();
      }
    });

    document.getElementById('riskCancelBtn').addEventListener('click', function() {
      closeRiskModal();
    });

    document.getElementById('riskConfirmBtn').addEventListener('click', function() {
      state.isolationConfirmed = true;
      trackEvent('prototype_isolation_risk_confirmed');
      var action = state.pendingAction;
      closeRiskModal();
      if (action === 'publishDryRun') publishDryRun();
      if (action === 'publishOfficialRun') publishOfficialRun();
    });

    document.getElementById('riskModal').addEventListener('click', function(e) {
      if (e.target.id === 'riskModal') {
        closeRiskModal();
      }
    });

    document.getElementById('memberActionCancelBtn').addEventListener('click', function() {
      closeMemberActionModal();
    });

    document.getElementById('memberActionConfirmBtn').addEventListener('click', function() {
      executeMemberAction();
    });

    document.getElementById('memberActionModal').addEventListener('click', function(e) {
      if (e.target.id === 'memberActionModal') {
        closeMemberActionModal();
      }
    });

    document.getElementById('exportJsonBtn').addEventListener('click', function() {
      if (TASK_DATA.status === 'draft') return;
      TASK_DATA.lastExportAt = '2026-04-21 10:15';
      TASK_DATA.lastExportStage = TASK_DATA.status.indexOf('official') >= 0 ? 'Official' : 'Dry';
      showToast(t('toastExportJson'));
      trackEvent('prototype_cta_clicked', { cta: 'export_json' });
      trackEvent('prototype_export_success', { export_format: 'json', run_stage: TASK_DATA.lastExportStage.toLowerCase() });
      renderExport();
    });

    document.getElementById('exportJsonMinBtn').addEventListener('click', function() {
      if (TASK_DATA.status === 'draft') return;
      TASK_DATA.lastExportAt = '2026-04-21 10:16';
      TASK_DATA.lastExportStage = TASK_DATA.status.indexOf('official') >= 0 ? 'Official' : 'Dry';
      showToast(t('toastExportJsonMin'));
      trackEvent('prototype_cta_clicked', { cta: 'export_json_min' });
      trackEvent('prototype_export_success', { export_format: 'json-min', run_stage: TASK_DATA.lastExportStage.toLowerCase() });
      renderExport();
    });

    document.getElementById('progressStageDryBtn').addEventListener('click', function() {
      state.progressStage = 'dry';
      renderAnnotationProgress();
      trackEvent('prototype_progress_stage_switched', { run_stage: 'dry' });
    });

    document.getElementById('progressStageOfficialBtn').addEventListener('click', function() {
      state.progressStage = 'official';
      renderAnnotationProgress();
      trackEvent('prototype_progress_stage_switched', { run_stage: 'official' });
    });

    document.getElementById('memberProgressSort').addEventListener('change', function(e) {
      state.progressSort = e.target.value;
      renderAnnotationProgress();
      trackEvent('prototype_progress_sort_changed', { sort_by: state.progressSort });
    });

    document.getElementById('progressBackToOverviewBtn').addEventListener('click', function() {
      setTabByRole('overview');
      renderTabs();
      trackEvent('prototype_tab_switched', { tab: 'overview', source: 'progress_empty_state_cta' });
    });

    document.getElementById('workLogBackToOverviewBtn').addEventListener('click', function() {
      setTabByRole('overview');
      renderTabs();
      trackEvent('prototype_tab_switched', { tab: 'overview', source: 'work_log_empty_state_cta' });
    });

    document.getElementById('workLogDateFrom').addEventListener('change', function(e) {
      state.workLogDateFrom = e.target.value || '';
      renderWorkLog();
      trackEvent('prototype_work_log_filter_changed', { filter: 'date_from' });
    });

    document.getElementById('workLogDateTo').addEventListener('change', function(e) {
      state.workLogDateTo = e.target.value || '';
      renderWorkLog();
      trackEvent('prototype_work_log_filter_changed', { filter: 'date_to' });
    });

    document.getElementById('workLogStageSelect').addEventListener('change', function(e) {
      state.workLogStage = e.target.value || 'all';
      renderWorkLog();
      trackEvent('prototype_work_log_filter_changed', { filter: 'run_stage', value: state.workLogStage });
    });

    document.getElementById('workLogMemberSelect').addEventListener('change', function(e) {
      state.workLogMember = e.target.value || 'all';
      renderWorkLog();
      trackEvent('prototype_work_log_filter_changed', { filter: 'member', value: state.workLogMember });
    });

    var langToggle = document.getElementById('langToggle');
    var mobileLangToggle = document.getElementById('mobileLangToggle');

    function onLangToggle() {
      var next = state.lang === 'zh' ? 'en' : 'zh';
      applyLang(next);
      trackEvent('prototype_lang_switched', { to_lang: next });
    }

    if (langToggle) langToggle.addEventListener('click', onLangToggle);
    if (mobileLangToggle) mobileLangToggle.addEventListener('click', onLangToggle);
  }

  function showOverviewWithSkeleton() {
    var skeleton = document.getElementById('loadingSkeleton');
    var overviewPanel = document.getElementById('overviewPanel');
    var annotationProgressPanel = document.getElementById('annotationProgressPanel');
    var workLogPanel = document.getElementById('workLogPanel');
    var memberManagementPanel = document.getElementById('memberManagementPanel');

    skeleton.classList.remove('hidden');
    overviewPanel.classList.add('hidden');
    annotationProgressPanel.classList.add('hidden');
    workLogPanel.classList.add('hidden');
    memberManagementPanel.classList.add('hidden');

    window.setTimeout(function() {
      state.showSkeleton = false;
      skeleton.classList.add('hidden');
      renderTabs();
      renderOverview();
      renderMemberManagement();
      renderAnnotationProgress();
      renderWorkLog();
    }, 560);
  }

  function getTrackingContext() {
    return {
      task_role: state.taskRole,
      task_status: TASK_DATA.status,
      tab: state.activeTab,
      lang: state.lang,
    };
  }

  function init() {
    parseRole();

    state.lang = window.LabelSuiteSharedSidebar
      ? window.LabelSuiteSharedSidebar.getStoredLang()
      : 'zh';

    loadAllTabPanels()
      .then(function(loaded) {
        if (!loaded) {
          renderPanelLoadError();
          return;
        }

        applyLang(state.lang);
        bindEvents();
        showOverviewWithSkeleton();

        if (window.LabelSuiteAnalytics) {
          window.LabelSuiteAnalytics.init({ page: 'task-detail-overview' });
          window.LabelSuiteAnalytics.trackPageView('task-detail-overview', getTrackingContext);
        }
      })
      .catch(function() {
        renderPanelLoadError();
      });
  }

  init();
</script>
</body>
</html>
