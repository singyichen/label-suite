<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 任務詳情</title>
  <link rel="stylesheet" href="../../assets/tokens.css" />
  <style>
    :root {
      --navbar-mobile-height: 84px;
      --navbar-mobile-top-height: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: var(--font-sans);
      background: var(--color-surface);
      color: var(--color-ink);
      line-height: 1.8;
      min-height: 100vh;
      display: flex;
      flex-direction: row;
    }
    html[lang="en"] body { line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    button, input, select { font: inherit; }
    button, input[type="checkbox"], select { cursor: pointer; }
    .hidden { display: none !important; }

    main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .layout { max-width: 1200px; width: 100%; margin: 0 auto; padding: var(--space-lg); }

    .navbar {
      width: 240px;
      height: 100vh;
      background: var(--color-white);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: var(--space-lg) var(--space-md);
      position: sticky;
      top: 0;
      z-index: 200;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .brand-section {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--color-border);
    }
    .navbar-brand { display: flex; align-items: center; gap: var(--space-sm); }
    .navbar-logo {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .navbar-logo svg { width: 20px; height: 20px; }
    .navbar-wordmark {
      font-family: var(--font-serif-display);
      font-weight: 700;
      font-size: 16px;
      color: var(--color-ink);
      line-height: 1;
    }
    .brand-section .lang-toggle { margin-left: auto; }
    .navbar-center {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-bottom: var(--space-xl);
      flex: 1;
    }
    .nav-link {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-ink-muted);
      transition: color var(--dur-fast), background var(--dur-fast);
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
    }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; color: currentColor; }
    .nav-link:hover { color: var(--color-ink); background: var(--color-slate-50); }
    .nav-link.active { color: var(--color-primary); background: var(--color-surface); font-weight: 600; }
    .nav-link.active .nav-icon { color: var(--color-primary); }
    .nav-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-lg);
      margin-top: auto;
    }
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-white);
      color: var(--color-ink);
      font-size: 13px;
      font-weight: 500;
      transition: border-color var(--dur-fast), background var(--dur-fast);
    }
    .lang-toggle:hover { border-color: var(--color-primary); background: var(--color-primary-soft-bg); }
    .user-chip { display: flex; align-items: center; gap: 10px; padding: 12px; width: 100%; }
    .user-chip-profile {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      text-decoration: none;
      color: inherit;
      transition: opacity var(--dur-fast);
    }
    .user-chip-profile:hover { opacity: 0.75; }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: var(--color-primary);
      font-weight: 700;
      font-size: 14px;
      border: 2px solid rgba(99,102,241,0.16);
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      display: block;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-role { display: block; font-size: 11px; color: var(--color-ink-muted); line-height: 1.3; }
    .logout-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--color-ink-muted);
      flex-shrink: 0;
      transition: color var(--dur-fast), background var(--dur-fast);
    }
    .logout-btn:hover { color: var(--color-error); background: var(--color-error-soft-bg); }
    .mobile-top-logout {
      display: none;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-white);
      color: var(--color-ink-muted);
      transition: color var(--dur-fast), border-color var(--dur-fast), background var(--dur-fast);
    }
    .mobile-top-logout:hover { color: var(--color-error); border-color: var(--color-error-soft-border); background: var(--color-error-soft-bg); }
    .mobile-user-name {
      display: none;
      margin-left: auto;
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-ink);
    }
    .mobile-lang-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 10px;
      background: var(--color-white);
      color: var(--color-ink);
      font-size: 12px;
      font-weight: 600;
      transition: border-color var(--dur-fast), background var(--dur-fast);
    }
    .mobile-lang-toggle:hover { border-color: var(--color-primary); background: var(--color-primary-soft-bg); }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
      flex-wrap: wrap;
    }
    .page-main-title {
      font-family: var(--font-serif-display);
      font-size: 28px;
      line-height: 1.3;
      font-weight: 700;
      color: var(--color-ink);
      margin: 0 0 4px;
    }
    .page-main-subtitle {
      font-size: 14px;
      color: var(--color-text-soft);
      margin: 0;
    }

    .admin-tabs {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      margin-bottom: var(--space-lg);
    }
    .admin-tab {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text-soft);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      transition: color var(--dur-fast), border-color var(--dur-fast);
      text-decoration: none;
      display: inline-block;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
    }
    .admin-tab:hover { color: var(--color-primary); }
    .admin-tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); font-weight: 600; }

    .skeleton-stack {
      display: grid;
      gap: var(--space-md);
    }
    .skeleton-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-white);
      padding: var(--space-lg);
    }
    .skeleton-line {
      border-radius: var(--radius-sm);
      background: #E2E8F0;
      animation: pulse var(--dur-normal) var(--ease-standard) infinite alternate;
    }
    .skeleton-line.title { width: 220px; height: 20px; margin-bottom: 14px; }
    .skeleton-line.body { width: 100%; height: 12px; margin-bottom: 10px; }
    .skeleton-line.body.short { width: 65%; }

    @keyframes pulse {
      0% { opacity: 0.55; }
      100% { opacity: 0.95; }
    }

    .panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-white);
      padding: var(--space-lg);
      margin-bottom: var(--space-md);
    }
    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: var(--space-md);
    }
    .panel-subtitle {
      font-size: 12px;
      color: var(--color-text-soft);
      margin: -8px 0 10px;
    }

    .kv-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 16px;
    }
    .kv-item {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 12px;
      background: var(--color-white);
      min-width: 0;
    }
    .kv-key {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .kv-value {
      display: block;
      font-size: 14px;
      color: var(--color-ink);
      line-height: 1.5;
      word-break: break-word;
    }
    .mono { font-family: var(--font-mono); font-size: 12px; }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      padding: 2px 8px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .badge-draft { color: #4B5563; background: #F9FAFB; border-color: #E5E7EB; }
    .badge-dry-run { color: #6B7280; background: #F3F4F6; border-color: #D1D5DB; }
    .badge-iaa { color: var(--color-warning); background: var(--color-warning-bg); border-color: var(--color-warning-border); }
    .badge-official { color: var(--color-info); background: var(--color-info-bg); border-color: var(--color-info-border); }
    .badge-completed { color: var(--color-success); background: var(--color-success-bg); border-color: var(--color-success-border); }
    .badge-isolated { color: var(--color-success); background: var(--color-success-bg); border-color: var(--color-success-border); }
    .badge-non-isolated { color: var(--color-error); background: var(--color-error-bg); border-color: var(--color-error-border); }
    .badge-member-active { color: #5B21B6; background: #EDE9FE; border-color: #DDD6FE; }
    .badge-member-disabled { color: #6B7280; background: #F3F4F6; border-color: #D1D5DB; }
    .badge-run-dry { color: #6B7280; background: #F3F4F6; border-color: #D1D5DB; }
    .badge-run-official { color: #5B21B6; background: #EDE9FE; border-color: #DDD6FE; }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }
    .status-hint {
      font-size: 13px;
      color: var(--color-text-soft);
      margin-top: 6px;
    }

    .action-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      border: 1px solid transparent;
      font-size: 14px;
      font-weight: 600;
      transition: background var(--dur-fast), color var(--dur-fast), opacity var(--dur-fast), border-color var(--dur-fast), transform var(--dur-fast);
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-primary { color: var(--color-white); background: var(--color-primary); border-color: var(--color-primary); }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-cta { color: var(--color-white); background: var(--color-cta); border-color: var(--color-cta); }
    .btn-cta:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary { color: var(--color-ink); background: var(--color-white); border-color: var(--color-border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--color-primary); color: var(--color-primary); }

    .sampling-panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 14px;
      background: var(--color-slate-50);
      margin-bottom: var(--space-md);
    }
    .sampling-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: 10px;
    }
    .sampling-grid {
      display: grid;
      grid-template-columns: 180px 140px 1fr;
      gap: 10px;
      align-items: end;
    }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .input-select,
    .input-number {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-white);
      color: var(--color-ink);
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
    }
    .input-select:focus,
    .input-number:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }
    .input-number.error,
    .input-select.error {
      border-color: var(--color-error);
    }
    .inline-help {
      margin-top: 8px;
      font-size: 12px;
      color: var(--color-text-soft);
    }
    .inline-error {
      margin-top: 8px;
      font-size: 12px;
      color: var(--color-error);
      display: none;
    }
    .inline-error.show { display: block; }

    .summary-box {
      border: 1px solid var(--color-border);
      background: var(--color-white);
      border-radius: var(--radius-md);
      padding: 12px;
    }
    .summary-box p { font-size: 13px; color: var(--color-text-soft); margin: 0 0 4px; }
    .summary-box strong { color: var(--color-ink); font-size: 14px; }

    .isolation-wrap {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 12px;
      background: var(--color-white);
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toggle-meta {
      min-width: 0;
    }
    .toggle-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-ink);
      margin-bottom: 2px;
    }
    .toggle-desc {
      font-size: 12px;
      color: var(--color-text-soft);
    }
    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-full);
      background: var(--color-border);
      transition: background var(--dur-fast);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: var(--color-white);
      transition: transform var(--dur-fast);
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--color-cta); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }

    .risk-warning {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-warning-border);
      background: var(--color-warning-bg);
      color: var(--color-warning);
      font-size: 12px;
    }

    .export-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }
    .export-meta {
      font-size: 13px;
      color: var(--color-text-soft);
      line-height: 1.6;
    }
    .export-empty {
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
      padding: 14px;
      font-size: 13px;
      color: var(--color-text-soft);
      margin-top: 10px;
    }
    .stage-filter-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .stage-toggle {
      display: inline-flex;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 2px;
      background: var(--color-white);
      gap: 2px;
    }
    .stage-btn {
      border: none;
      background: transparent;
      color: var(--color-text-soft);
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      transition: background var(--dur-fast), color var(--dur-fast);
    }
    .stage-btn:hover { color: var(--color-primary); }
    .stage-btn.active {
      background: var(--color-primary-soft-bg);
      color: var(--color-primary);
    }
    .progress-metric-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .progress-metric-item {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 12px;
      background: var(--color-white);
      min-width: 0;
    }
    .progress-metric-key {
      display: block;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-ink-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .progress-metric-value {
      display: block;
      color: var(--color-ink);
      font-size: 17px;
      line-height: 1.3;
      font-weight: 700;
      white-space: nowrap;
    }
    .sort-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 10px;
    }
    .sort-label {
      font-size: 12px;
      color: var(--color-ink-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .sort-select {
      width: 200px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 7px 10px;
      background: var(--color-white);
      font-size: 13px;
      color: var(--color-ink);
    }
    .progress-inline-track {
      width: 140px;
      height: 8px;
      border-radius: var(--radius-full);
      background: var(--color-border-muted);
      overflow: hidden;
      position: relative;
    }
    .progress-inline-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      background: var(--color-primary);
      border-radius: inherit;
    }
    .quality-flag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
      white-space: nowrap;
    }
    .quality-good {
      color: var(--color-success);
      background: var(--color-success-bg);
      border-color: var(--color-success-border);
    }
    .quality-watch {
      color: var(--color-warning);
      background: var(--color-warning-bg);
      border-color: var(--color-warning-border);
    }
    .quality-risk {
      color: var(--color-error);
      background: var(--color-error-bg);
      border-color: var(--color-error-border);
    }
    .stage-split-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .stage-split-card {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-white);
      padding: 12px;
    }
    .stage-split-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: 8px;
    }
    .stage-split-meta {
      font-size: 13px;
      color: var(--color-text-soft);
      margin-top: 8px;
    }
    .stage-split-track {
      width: 100%;
      height: 10px;
      border-radius: var(--radius-full);
      background: var(--color-border-muted);
      overflow: hidden;
      position: relative;
    }
    .stage-split-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      border-radius: inherit;
    }
    .stage-split-fill.dry { background: var(--color-primary); }
    .stage-split-fill.official { background: var(--color-cta); }
    .progress-empty-state {
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-slate-50);
      padding: 20px;
      text-align: center;
      margin-top: 10px;
    }
    .progress-empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--color-ink);
      margin-bottom: 10px;
    }
    .worklog-filter-grid {
      display: grid;

      color: var(--color-text-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .annotation-preview-empty {
      font-size: 13px;
      color: var(--color-text-soft);
    }
    .s2-code-panel {
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-white);
      padding: 12px;
    }
    .s2-code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .settings-code-format {
      display: flex;
      gap: 6px;
    }
    .settings-code-format .btn {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
    }
    .settings-code-format .btn.active {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: var(--color-primary-soft-bg);
    }
    .code-editor {
      width: 100%;
      min-height: 300px;
      padding: 12px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      outline: none;
      resize: vertical;
      font-family: var(--font-mono);
      font-size: 13px;
      background: #1E1B4B;
      color: #E2E8F0;
    }
    .code-editor:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .code-error-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border: 1px solid rgba(185, 28, 28, 0.26);
      border-radius: var(--radius-md);
      color: var(--color-error);
      background: rgba(185, 28, 28, 0.06);
      font-size: 12px;
      margin-top: 8px;
    }
    .code-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .yaml-preview-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--color-text-soft);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .kv-dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 10px 16px;
      align-items: baseline;
    }
    #settingsConfigDynamicRows { display: contents; }
    .kv-dl-row { display: contents; }
    .kv-dl-key {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      padding-top: 1px;
    }
    .kv-dl-value {
      font-size: 14px;
      color: var(--color-ink);
      line-height: 1.5;
      word-break: break-word;
    }

    .status-stepper-wrap {
      overflow-x: auto;
      margin-bottom: var(--space-md);
    }
    .status-stepper {
      display: flex;
      align-items: flex-start;
      min-width: 520px;
    }
    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .step-node {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      background: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color var(--dur-fast), background var(--dur-fast), box-shadow var(--dur-fast);
    }
    .step-node::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: transparent;
      transition: background var(--dur-fast);
    }
    .step-label-wrap {
      font-size: 11px;
      color: var(--color-ink-muted);
      white-space: nowrap;
      text-align: center;
      line-height: 1.3;
      transition: color var(--dur-fast), font-weight var(--dur-fast);
    }
    .step-connector {
      flex: 1;
      height: 2px;
      background: var(--color-border);
      margin-top: 10px;
      min-width: 24px;
      transition: background var(--dur-fast);
    }
    .step.step-done .step-node { border-color: var(--color-primary); background: var(--color-primary); }
    .step.step-done .step-node::after { background: var(--color-white); }
    .step.step-done .step-label-wrap { color: var(--color-primary); }
    .step-connector.connector-done { background: var(--color-primary); }
    .step.step-current .step-node {
      border-color: var(--color-primary);
      background: var(--color-primary-soft-bg);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.14);
    }
    .step.step-current .step-node::after { background: var(--color-primary); }
    .step.step-current .step-label-wrap { color: var(--color-primary); font-weight: 700; }

    .exec-control-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-md);
      flex-wrap: wrap;
      margin-bottom: var(--space-md);
    }
    .exec-info { flex: 1; min-width: 0; }
    .exec-badges { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
    .exec-isolation-audit { font-size: 11px; }
    .exec-actions { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

    .panel-divider {
      border: none;
      border-top: 1px solid var(--color-border-muted);
      margin: var(--space-md) 0;
    }
    .sub-panel-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: var(--space-sm);
    }

    .sampling-fields {
      display: grid;
      grid-template-columns: 160px 140px 1fr;
      gap: 10px;
      align-items: end;
      margin-bottom: var(--space-md);
    }
    .sampling-mode-inline {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      min-height: 40px;
      align-items: center;
      padding: 8px 0;
    }
    .sampling-mode-inline label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-ink);
    }
    .sampling-mode-inline input[type="radio"] {
      accent-color: var(--color-primary);
      margin: 0;
    }
    .sampling-mode-inline input[type="radio"]:disabled + span {
      color: var(--color-text-soft);
    }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .strategy-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 9px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-white);
      min-height: 40px;
      justify-content: center;
    }
    .strategy-text { font-size: 13px; color: var(--color-text-soft); }
    .strategy-seed { font-size: 11px; color: var(--color-ink-muted); }

    .data-split-viz { margin-bottom: var(--space-sm); }
    .split-bar {
      display: flex;
      height: 28px;
      border-radius: var(--radius-md);
      overflow: hidden;
      margin-bottom: 10px;
    }
    .split-seg {
      min-width: 0;
      transition: width var(--dur-normal) var(--ease-standard);
    }
    .split-dry { background: var(--color-primary); }
    .split-official { background: var(--color-cta); }
    .split-legend { display: flex; gap: var(--space-md); flex-wrap: wrap; }
    .split-legend-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .split-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .split-dot-dry { background: var(--color-primary); }
    .split-dot-official { background: var(--color-cta); }
    .split-legend-key { color: var(--color-text-soft); }
    .split-legend-value { color: var(--color-ink); font-weight: 600; }

    .sampling-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .export-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-bottom: var(--space-sm);
    }
    .export-actions { display: flex; gap: 8px; }

    @media (max-width: 768px) {
      .overview-info-row { grid-template-columns: 1fr; }
      .overview-edit-grid { grid-template-columns: 1fr; }
      .settings-editor-layout { grid-template-columns: 1fr; }
      .sampling-fields { grid-template-columns: 1fr; }
      .exec-control-row { flex-direction: column; }
      .exec-actions { align-items: flex-start; }
    }
  </style>
</head>

  function appendPanelPartial(path) {
    return fetch(path, { cache: 'no-store' })
      .then(function(response) {
        if (!response.ok) {
          throw new Error('Failed to load panel partial: ' + path);
        }
        return response.text();
      })
      .then(function(html) {
        var mount = document.getElementById('tabPanelMount');
        if (!mount) return;
        var wrapper = document.createElement('div');
        wrapper.innerHTML = html.trim();
        while (wrapper.firstChild) {
          mount.appendChild(wrapper.firstChild);
        }
      });
  }

  function loadAllTabPanels() {
    var mount = document.getElementById('tabPanelMount');
    if (!mount) return Promise.resolve(false);
    mount.innerHTML = '';

    var order = ['overview', 'annotation-progress', 'work-log', 'member-management'];
    return order.reduce(function(promise, tabName) {
      return promise.then(function() {
        return appendPanelPartial(TAB_PANEL_PATHS[tabName]);
      });
    }, Promise.resolve()).then(function() {
      return true;
    });
  }

  function getSampleCountFromData(data) {
    if (data.samplingMode === 'by_percentage') {
      return Math.floor(TASK_DATA.datasetTotal * data.samplingValue / 100);
    }
    return data.samplingValue;
  }

  function getSampleCount() {
    return getSampleCountFromData(TASK_DATA);
  }

  function validateSamplingData(data) {
    var sampleCount = getSampleCountFromData(data);

    if (data.samplingMode === 'by_percentage') {
      if (data.samplingValue < 1 || data.samplingValue > 99) {
        return { valid: false, message: t('samplingErrorPercent') };
      }
      if (sampleCount < 1) {
        return { valid: false, message: t('samplingErrorFloor') };
      }
    } else {
      if (data.samplingValue < 1 || data.samplingValue >= TASK_DATA.datasetTotal) {
        return { valid: false, message: t('samplingErrorCount') };
      }
    }

    if (TASK_DATA.datasetTotal - sampleCount < 1) {
      return { valid: false, message: t('samplingErrorReserve') };
    }

    return { valid: true, message: '' };
  }

  function validateSampling() {
    return validateSamplingData(TASK_DATA);
  }

  function getSamplingRenderData() {
    if (state.samplingEditMode && state.samplingDraft) {
      return state.samplingDraft;
    }
    return TASK_DATA;
  }

  function renderSamplingSummaryState() {
    var sampleCount = getSampleCount();
    var reserveCount = Math.max(TASK_DATA.datasetTotal - sampleCount, 0);
    var samplingModeText = TASK_DATA.samplingMode === 'by_percentage' ? t('samplingModePercent') : t('samplingModeCount');
    var samplingValueText = TASK_DATA.samplingMode === 'by_percentage'
      ? interpolate(t('samplingValuePercentTpl'), { value: TASK_DATA.samplingValue, count: sampleCount })
      : interpolate(t('samplingValueCountTpl'), { value: TASK_DATA.samplingValue });
    var splitSummaryText = interpolate(t('splitSummaryTpl'), {
      sample: sampleCount + ' / ' + TASK_DATA.datasetTotal,
      reserve: reserveCount + ' / ' + TASK_DATA.datasetTotal,
    });

    setText('valueSamplingModeControl', samplingModeText);
    setText('valueSamplingValueControl', samplingValueText);
    setText('valueSamplingStrategyControl', interpolate(t('samplingStrategySummaryTpl'), {
      strategy: TASK_DATA.samplingStrategy,
      seed: TASK_DATA.randomSeed,
    }));
    setText('valueSplitControl', splitSummaryText);
    setText('valueIsolationControl', TASK_DATA.isolationEnabled ? t('isolationOn') : t('isolationOff'));
    setText(
      'valueIsolationAuditControl',
      interpolate(t('isolationAuditTpl'), {
        actor: TASK_DATA.isolationLastActor,
        time: TASK_DATA.isolationLastUpdated,
      })
    );
  }

  function renderSamplingState() {
    var data = getSamplingRenderData();
    var sampleCount = getSampleCountFromData(data);
    var reserveCount = Math.max(TASK_DATA.datasetTotal - sampleCount, 0);

    setText('sampleUsageValue', sampleCount + ' / ' + TASK_DATA.datasetTotal);
    setText('officialReserveValue', reserveCount + ' / ' + TASK_DATA.datasetTotal);

    var total = TASK_DATA.datasetTotal;
    var dryPct = total > 0 ? sampleCount / total * 100 : 0;
    var dryEl = document.getElementById('splitDryBar');
    var offEl = document.getElementById('splitOfficialBar');
    if (dryEl && offEl) {
      var dw = Math.max(0.5, Math.min(99.5, dryPct));
      dryEl.style.width = dw.toFixed(1) + '%';
      offEl.style.width = (100 - dw).toFixed(1) + '%';
    }
    setText('samplingStrategyText', data.samplingStrategy + ' (fallback: random(seed))');
    setText('samplingSeedText', 'random_seed: ' + data.randomSeed);

    var modeRadios = document.querySelectorAll('input[name="samplingMode"]');
    modeRadios.forEach(function(node) {
      node.checked = node.value === data.samplingMode;
    });

    var samplingInput = document.getElementById('samplingValue');
    var samplingError = document.getElementById('samplingError');
    if (samplingInput) {
      samplingInput.value = String(data.samplingValue);
      if (data.samplingMode === 'by_percentage') samplingInput.max = '99';
      else samplingInput.removeAttribute('max');
    }
    var result = validateSamplingData(data);

    if (samplingInput && samplingError && !result.valid) {
      samplingInput.classList.add('error');
      samplingError.textContent = result.message;
      samplingError.classList.add('show');
    } else if (samplingInput && samplingError) {
      samplingInput.classList.remove('error');
      samplingError.textContent = '';
      samplingError.classList.remove('show');
    }

    var editAllowed = isSamplingEditable();
    var editing = state.samplingEditMode;
    var editable = editAllowed && editing;
    var isolationToggle = document.getElementById('isolationToggle');
    var risk = document.getElementById('isolationRiskMsg');
    modeRadios.forEach(function(node) {
      node.disabled = !editable;
    });
    if (samplingInput) samplingInput.disabled = !editable;
    if (isolationToggle) {
      isolationToggle.checked = Boolean(data.isolationEnabled);
      isolationToggle.disabled = !editable;
    }
    if (risk) risk.classList.toggle('hidden', Boolean(data.isolationEnabled));
    var resampleBtn = document.getElementById('resampleBtn');
    if (resampleBtn) resampleBtn.disabled = !editable;
    setText('resampleHint', editable ? t('resampleHintDraft') : t('resampleHintLocked'));
  }

  function updateStatusStepper() {
    var ORDER = ['draft', 'dry_run_in_progress', 'waiting_iaa_confirmation', 'official_run_in_progress', 'completed'];

  function cloneObject(obj) {
    return JSON.parse(JSON.stringify(obj));
  }

  function getSettingsSchema(taskTypeKey) {
    return SETTINGS_REGISTRY[taskTypeKey] || null;
  }

  function getDefaultSettingsTemplateForLang(taskTypeKey, lang) {
    var schema = getSettingsSchema(taskTypeKey);
    if (!schema) return {};
    if (schema.defaultTemplateI18n && schema.defaultTemplateI18n[lang]) return cloneObject(schema.defaultTemplateI18n[lang]);
    return cloneObject(schema.defaultTemplate || {});
  }

  function settingsToYaml(obj, indent) {
    var pad = Array((indent || 0) + 1).join(' ');
    if (obj === null) return 'null';
    if (typeof obj === 'boolean' || typeof obj === 'number') return String(obj);
    if (typeof obj === 'string') return obj;
    if (Array.isArray(obj)) {
      return obj.map(function(item) {
        if (item && typeof item === 'object' && !Array.isArray(item)) {
          var lines = [];
          Object.keys(item).forEach(function(k, idx) {
            var v = item[k];
            if (idx === 0) lines.push('- ' + k + ': ' + settingsToYaml(v, (indent || 0) + 2));
            else lines.push('  ' + k + ': ' + settingsToYaml(v, (indent || 0) + 2));
          });
          return lines.map(function(line) { return pad + line; }).join('\n');
        }
        return pad + '- ' + settingsToYaml(item, (indent || 0) + 2);
      }).join('\n');
    }
    var lines = [];
    Object.keys(obj).forEach(function(key) {
      var val = obj[key];
      if (val && typeof val === 'object') {
        if (Array.isArray(val) && val.length === 0) {
          lines.push(pad + key + ': []');
        } else {
          lines.push(pad + key + ':');
          lines.push(settingsToYaml(val, (indent || 0) + 2));
        }
      } else {
        lines.push(pad + key + ': ' + settingsToYaml(val, (indent || 0) + 2));
      }
    });
    return lines.join('\n');
  }

  function settingsConfigToCode() {
    if (!state.settingsDraft) return '';
    if (state.settingsDraft.codeFormat === 'json') return JSON.stringify(state.settingsDraft.configData, null, 2);
    return settingsToYaml(state.settingsDraft.configData);
  }

  function settingsYamlParseScalar(raw) {
    var val = String(raw || '').trim();
    if (val === '') return '';
    if (val === '[]') return [];
    if (val === '{}') return {};
    if (val[0] === '[' && val[val.length - 1] === ']') {
      var inner = val.slice(1, -1).trim();
      if (!inner) return [];
      return inner.split(',').map(function(part) {
        return settingsYamlParseScalar(part.trim());
      });
    }
    if (val === 'true') return true;
    if (val === 'false') return false;
    if (/^-?\d+(\.\d+)?$/.test(val)) return Number(val);
    if ((val[0] === '"' && val[val.length - 1] === '"') || (val[0] === "'" && val[val.length - 1] === "'")) {
      if (val[0] === "'") return val.slice(1, -1);
      return JSON.parse(val);
    }
    return val;
  }

  function settingsYamlIndentOf(line) {
    return line.length - line.replace(/^\s+/, '').length;
  }

  function settingsYamlSplitKeyVal(text) {
    var idx = text.indexOf(':');
    if (idx < 0) return null;
    return { key: text.slice(0, idx).trim(), value: text.slice(idx + 1).trim() };
  }

  function parseSettingsYamlSubset(text) {
    var lines = String(text || '').replace(/\r/g, '').split('\n');
    var i = 0;

    function skipEmpty() {
      while (i < lines.length && !lines[i].trim()) i += 1;
    }

    function parseBlock(expectedIndent) {
      var map = {};
      while (i < lines.length) {
        var line = lines[i];
        if (!line.trim()) { i += 1; continue; }
        var indent = settingsYamlIndentOf(line);
        if (indent < expectedIndent) break;
        if (indent > expectedIndent) throw new Error('Invalid YAML indentation');
        var kv = settingsYamlSplitKeyVal(line.trim());
        if (!kv || !kv.key) throw new Error('Invalid YAML line');
        i += 1;
        if (kv.value) {
          map[kv.key] = settingsYamlParseScalar(kv.value);
          continue;
        }
        skipEmpty();
        if (i >= lines.length) { map[kv.key] = ''; continue; }
        var next = lines[i];
        var nextIndent = settingsYamlIndentOf(next);
        if (nextIndent <= indent) { map[kv.key] = ''; continue; }
        map[kv.key] = parseNested(nextIndent);
      }
      return map;
    }

    function parseNested(expectedIndent) {
      var start = i;
      while (start < lines.length && !lines[start].trim()) start += 1;
      if (start >= lines.length) return '';
      var first = lines[start];
      if (settingsYamlIndentOf(first) !== expectedIndent) throw new Error('Invalid YAML nesting');
      if (first.trim().indexOf('- ') === 0) {
        var outArr = [];
        i = start;
        while (i < lines.length) {
          var line = lines[i];
          if (!line.trim()) { i += 1; continue; }
          var indent = settingsYamlIndentOf(line);
          if (indent < expectedIndent) break;
          if (indent > expectedIndent) throw new Error('Invalid array indentation');
          var itemText = line.trim().slice(2).trim();
          i += 1;
          if (!itemText) { outArr.push(''); continue; }
          var itemKv = settingsYamlSplitKeyVal(itemText);
          if (!itemKv) {
            outArr.push(settingsYamlParseScalar(itemText));
            continue;
          }
          var obj = {};
          obj[itemKv.key] = settingsYamlParseScalar(itemKv.value);
          while (i < lines.length) {
            var sub = lines[i];
            if (!sub.trim()) { i += 1; continue; }
            var subIndent = settingsYamlIndentOf(sub);
            if (subIndent <= expectedIndent) break;
            if (subIndent !== expectedIndent + 2) throw new Error('Invalid object indentation');
            var subKv = settingsYamlSplitKeyVal(sub.trim());
            if (!subKv) throw new Error('Invalid object line');
            obj[subKv.key] = settingsYamlParseScalar(subKv.value);
            i += 1;
          }
          outArr.push(obj);
        }
        return outArr;
      }
      return parseBlock(expectedIndent);
    }

    skipEmpty();
    return parseBlock(0);
  }

  function settingsParseCode(raw, codeFormat) {
    var content = String(raw || '').trim();
    if (!content) return {};
    if (codeFormat === 'json' || content.startsWith('{') || content.startsWith('[')) return JSON.parse(content);
    return parseSettingsYamlSubset(content);
  }

  function createSettingsDraft() {
    var code = (TASK_DATA.configContent || '').trim();
    var codeFormat = code.startsWith('{') ? 'json' : 'yaml';
    var schema = getSettingsSchema(TASK_DATA.taskTypeKey);
    var parsed = {};
    try {
      parsed = settingsParseCode(code, codeFormat);
    } catch (error) {
      parsed = {};
    }
    var defaults = getDefaultSettingsTemplateForLang(TASK_DATA.taskTypeKey, state.lang);
    var merged = cloneObject(defaults);
    Object.keys(parsed || {}).forEach(function(key) { merged[key] = parsed[key]; });
    if (schema) {
      schema.fields.forEach(function(field) {
        if (merged[field.key] === undefined && field.defaultValue !== undefined) merged[field.key] = field.defaultValue;
        if (field.type === 'tag-list' && !Array.isArray(merged[field.key])) merged[field.key] = [];
        if (field.type === 'entity-list' && !Array.isArray(merged[field.key])) merged[field.key] = [];
        if (field.type === 'boolean' && typeof merged[field.key] !== 'boolean') merged[field.key] = !!merged[field.key];
      });
    }
    return {
      taskTypeKey: TASK_DATA.taskTypeKey,
      configData: merged,
      codeFormat: codeFormat,
      uploadedConfigName: TASK_DATA.configFileName || '',
    };
  }

  function buildSettingsTagInput(field) {
    var tags = Array.isArray(state.settingsDraft.configData[field.key]) ? state.settingsDraft.configData[field.key].slice() : [];
    state.settingsDraft.configData[field.key] = tags;
    var isComposing = false;
    var wrap = document.createElement('div');
    wrap.className = 'tag-input-wrap';

    function render() {
      while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
      tags.forEach(function(tag, idx) {
        var pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.appendChild(document.createTextNode(tag));
        var removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'tag-pill-remove';
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', 'Remove');
        removeBtn.addEventListener('click', function() {
          tags.splice(idx, 1);
          render();
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });
        pill.appendChild(removeBtn);
        wrap.appendChild(pill);
      });

      var input = document.createElement('input');
      input.type = 'text';
      input.className = 'tag-new-input';
      input.placeholder = field['hint_' + state.lang] || '';
      input.addEventListener('compositionstart', function() { isComposing = true; });
      input.addEventListener('compositionend', function() { isComposing = false; });
      input.addEventListener('keydown', function(event) {
        if (event.key !== 'Enter' && event.key !== ',') return;
        if (event.isComposing || isComposing || event.keyCode === 229) return;
        event.preventDefault();
        var value = input.value.trim();
        if (!value) return;
        input.value = '';
        if (tags.indexOf(value) !== -1) return;
        tags.push(value);
        render();
        setTimeout(function() {
          var nextInput = wrap.querySelector('.tag-new-input');
          if (nextInput) nextInput.focus();
        }, 0);
        markSettingsDirty();
        renderSettingsAnnotationPreview();
        if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
      });
      wrap.appendChild(input);
    }

    render();
    return wrap;
  }

  function buildSettingsEntityList(field) {
    var entities = Array.isArray(state.settingsDraft.configData[field.key]) ? state.settingsDraft.configData[field.key] : [];
    state.settingsDraft.configData[field.key] = entities;
    var wrap = document.createElement('div');

    function render() {
      while (wrap.firstChild) wrap.removeChild(wrap.firstChild);
      entities.forEach(function(ent, idx) {
        var row = document.createElement('div');
        row.className = 'entity-row';
        var dot = document.createElement('div');
        dot.className = 'entity-color-dot';
        dot.style.background = ent.color || SETTINGS_ENTITY_COLORS[idx % SETTINGS_ENTITY_COLORS.length];

        var input = document.createElement('input');
        input.type = 'text';
        input.className = 'entity-name-input';
        input.value = ent.name || '';
        input.placeholder = state.lang === 'zh' ? '實體名稱，如 PER' : 'Entity name, e.g. PER';
        input.addEventListener('input', function() {
          entities[idx].name = input.value;
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });

        var removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'entity-remove-btn';
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', 'Remove');
        removeBtn.addEventListener('click', function() {
          entities.splice(idx, 1);
          render();
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });

        row.appendChild(dot);
        row.appendChild(input);
        row.appendChild(removeBtn);
        wrap.appendChild(row);
      });

      var addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'add-row-btn';
      addBtn.textContent = t('settingsAddEntity');
      addBtn.addEventListener('click', function() {
        entities.push({ name: '', color: SETTINGS_ENTITY_COLORS[entities.length % SETTINGS_ENTITY_COLORS.length] });
        render();
        markSettingsDirty();
        renderSettingsAnnotationPreview();
        if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
      });
      wrap.appendChild(addBtn);
    }

    render();
    return wrap;
  }

  function renderSettingsSchemaFields() {
    var container = document.getElementById('settingsSchemaFields');
    if (!container || !state.settingsDraft) return;
    while (container.firstChild) container.removeChild(container.firstChild);
    var schema = getSettingsSchema(TASK_DATA.taskTypeKey);
    if (!schema) return;

    schema.fields.forEach(function(field) {
      var wrap = document.createElement('div');
      wrap.className = 'field-group';
      wrap.style.marginBottom = '10px';

      var label = document.createElement('label');
      label.className = 'field-label';
      label.textContent = field[state.lang] || field.zh;
      if (field.required) {
        var req = document.createElement('span');
        req.className = 'required';
        req.textContent = '*';
        label.appendChild(req);
      }
      wrap.appendChild(label);

      if (field.type === 'tag-list') {
        wrap.appendChild(buildSettingsTagInput(field));
        if (field['hint_' + state.lang]) {
          var hint = document.createElement('div');
          hint.className = 'field-hint';
          hint.textContent = field['hint_' + state.lang];
          wrap.appendChild(hint);
        }
      } else if (field.type === 'entity-list') {
        wrap.appendChild(buildSettingsEntityList(field));
      } else if (field.type === 'boolean') {
        var chkLabel = document.createElement('label');
        chkLabel.className = 'settings-checkbox-row';
        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = !!(state.settingsDraft.configData[field.key] !== undefined ? state.settingsDraft.configData[field.key] : field.defaultValue);
        var textNode = document.createTextNode(checkbox.checked ? t('settingsEnabled') : t('settingsDisabled'));
        checkbox.addEventListener('change', function() {
          state.settingsDraft.configData[field.key] = checkbox.checked;
          textNode.nodeValue = checkbox.checked ? t('settingsEnabled') : t('settingsDisabled');
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });
        chkLabel.appendChild(checkbox);
        chkLabel.appendChild(textNode);
        wrap.appendChild(chkLabel);
      } else if (field.type === 'select') {
        var select = document.createElement('select');
        select.className = 'input-select';
        var currentValue = state.settingsDraft.configData[field.key] !== undefined ? state.settingsDraft.configData[field.key] : field.defaultValue;
        field.options.forEach(function(optionValue) {
          var option = document.createElement('option');
          option.value = optionValue;
          option.textContent = optionValue;
          if (optionValue === currentValue) option.selected = true;
          select.appendChild(option);
        });
        select.addEventListener('change', function() {
          state.settingsDraft.configData[field.key] = select.value;
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });
        wrap.appendChild(select);
      } else if (field.type === 'textarea') {
        var textarea = document.createElement('textarea');
        textarea.className = 'input-textarea';
        textarea.placeholder = field['placeholder_' + state.lang] || field.placeholder_zh || '';
        textarea.value = state.settingsDraft.configData[field.key] || '';
        textarea.addEventListener('input', function() {
          state.settingsDraft.configData[field.key] = textarea.value;
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });
        wrap.appendChild(textarea);
      } else {
        var input = document.createElement('input');
        input.type = 'text';
        input.className = 'input-number';
        input.value = state.settingsDraft.configData[field.key] || '';
        input.addEventListener('input', function() {
          state.settingsDraft.configData[field.key] = input.value;
          markSettingsDirty();
          renderSettingsAnnotationPreview();
          if (!state.settingsCodeDraftDirty) renderSettingsCodeFromConfig();
        });
        wrap.appendChild(input);
      }

      container.appendChild(wrap);
    });
  }

  function renderSettingsAnnotationPreview() {
    var preview = document.getElementById('settingsAnnotationPreview');
    if (!preview || !state.settingsDraft) return;
    while (preview.firstChild) preview.removeChild(preview.firstChild);
    var taskType = TASK_DATA.taskTypeKey;
    var config = state.settingsDraft.configData || {};
    var titleText = t('settingsPreviewTaskChooseLabel');
    var options = [];

    if (taskType === 'sequence_labeling') {
      titleText = t('settingsPreviewTaskEntity');
      options = Array.isArray(config.entities) ? config.entities.filter(function(ent) { return ent && ent.name && ent.name.trim(); }).map(function(ent) {
        return { text: ent.name.trim(), color: ent.color || null };
      }) : [];
    } else if (taskType === 'relation_extraction') {
      titleText = t('settingsPreviewTaskRelation');
      options = Array.isArray(config.relation_types) ? config.relation_types.filter(function(tag) { return tag && tag.trim(); }).map(function(tag) {
        return { text: tag.trim(), color: null };
      }) : [];
    } else if (taskType === 'single_sentence_scoring_regression') {
      titleText = t('settingsPreviewTaskScore');
      var range = String(config.scoring_range || '1-5');
      var parts = range.split('-');
      var start = parseInt(parts[0], 10);
      var end = parseInt(parts[1], 10);
      if (!isNaN(start) && !isNaN(end) && end >= start) {
        for (var score = start; score <= end; score += 1) options.push({ text: String(score), color: null });
      }
    } else {
      options = Array.isArray(config.labels) ? config.labels.filter(function(tag) { return tag && tag.trim(); }).map(function(tag) {
        return { text: tag.trim(), color: null };
      }) : [];
    }

    if (taskType === 'sentence_pairs') {
      var pairWrap = document.createElement('div');
      pairWrap.className = 'annotation-preview-pair';
      var labelA = document.createElement('div');
      labelA.className = 'annotation-preview-pair-label';
      labelA.textContent = t('settingsPreviewSentenceALabel');
      var sampleA = document.createElement('div');
      sampleA.className = 'annotation-preview-sample';
      sampleA.textContent = t('settingsPreviewSampleSentenceA');
      var labelB = document.createElement('div');
      labelB.className = 'annotation-preview-pair-label';
      labelB.textContent = t('settingsPreviewSentenceBLabel');
      var sampleB = document.createElement('div');
      sampleB.className = 'annotation-preview-sample';
      sampleB.textContent = t('settingsPreviewSampleSentenceB');
      pairWrap.appendChild(labelA);
      pairWrap.appendChild(sampleA);
      pairWrap.appendChild(labelB);
      pairWrap.appendChild(sampleB);
      preview.appendChild(pairWrap);
    } else {
      var sampleKey = 'settingsPreviewSampleSentence';
      if (taskType === 'single_sentence_scoring_regression') sampleKey = 'settingsPreviewSampleSentenceScoring';
      else if (taskType === 'sequence_labeling') sampleKey = 'settingsPreviewSampleSentenceSequence';
      else if (taskType === 'relation_extraction') sampleKey = 'settingsPreviewSampleSentenceRelation';
      var sample = document.createElement('div');
      sample.className = 'annotation-preview-sample';
      sample.textContent = t(sampleKey);
      preview.appendChild(sample);
    }

    var divider = document.createElement('div');
    divider.className = 'annotation-preview-divider';
    preview.appendChild(divider);

    var title = document.createElement('div');
    title.className = 'annotation-preview-task-title';
    title.textContent = titleText;
    preview.appendChild(title);

    var optionsWrap = document.createElement('div');
    optionsWrap.className = 'annotation-preview-options';
    preview.appendChild(optionsWrap);

    if (!options.length) {
      var empty = document.createElement('div');
      empty.className = 'annotation-preview-empty';
      empty.textContent = t('settingsPreviewEmpty');
      optionsWrap.appendChild(empty);
      return;
    }

    var singleSelect = taskType === 'single_sentence_scoring_regression' || taskType === 'sentence_pairs' || (taskType === 'single_sentence_classification' && !config.allow_multiple);
    options.forEach(function(option) {
      var row = document.createElement('label');
      row.className = 'annotation-preview-option';
      var checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      if (singleSelect) {
        checkbox.addEventListener('change', function() {
          if (!checkbox.checked) return;
          optionsWrap.querySelectorAll('input[type=\"checkbox\"]').forEach(function(cb) {
            if (cb !== checkbox) cb.checked = false;
          });
        });
      }
      row.appendChild(checkbox);
      if (option.color) {
        var color = document.createElement('span');
        color.className = 'annotation-preview-color';
        color.style.background = option.color;
        row.appendChild(color);
      }
      var text = document.createElement('span');
      text.textContent = option.text;
      row.appendChild(text);
      optionsWrap.appendChild(row);
    });
  }

  function applySettingsTemplate() {
    if (!state.settingsDraft) return;
    state.settingsDraft.configData = getDefaultSettingsTemplateForLang(TASK_DATA.taskTypeKey, state.lang);
    state.settingsDraft.uploadedConfigName = '';
    renderSettingsSchemaFields();
    state.settingsCodeDraftDirty = false;
    renderSettingsCodeFromConfig();
    setSettingsEditError('');
    setSettingsCodeError('');
    renderSettingsAnnotationPreview();
    markSettingsDirty();
  }

  function setSettingsCodeFormat(fmt) {
    if (!state.settingsDraft || state.settingsCodeDraftDirty) return;
    state.settingsDraft.codeFormat = fmt === 'json' ? 'json' : 'yaml';
    renderSettingsCodeFromConfig();
  }

  function loadSettingsConfigFile(file) {
    var fileName = file.name || '';
    var name = fileName.toLowerCase();
    var ext = name.slice(name.lastIndexOf('.'));
    if (['.yaml', '.yml', '.json'].indexOf(ext) === -1) {
      setSettingsEditError(t('settingsConfigFormatError'));
      return;
    }
    var reader = new FileReader();
    reader.onload = function() {
      if (!state.settingsDraft) return;
      state.settingsDraft.codeFormat = ext === '.json' ? 'json' : 'yaml';
      state.settingsDraft.uploadedConfigName = fileName;
      var editor = document.getElementById('settingsCodeEditor');
      if (editor) editor.value = String(reader.result || '');
      markSettingsCodeDirty();
      setSettingsCodeError('');
      setSettingsEditError('');
      showToast(t('settingsConfigLoaded'));
      markSettingsDirty();
    };
    reader.onerror = function() {
      setSettingsEditError(t('settingsConfigReadError'));
    };
    reader.readAsText(file);
  }

  function saveSettingsCodeToVisual(showSuccessToast) {
    if (!state.settingsDraft) return false;
    var schema = getSettingsSchema(TASK_DATA.taskTypeKey);
    if (!schema) return false;
    var editor = document.getElementById('settingsCodeEditor');
    var parsed;
    try {
      parsed = settingsParseCode(editor ? editor.value : '', state.settingsDraft.codeFormat);
    } catch (error) {
      setSettingsCodeError(error.message || t('settingsCodeInvalid'));
      return false;
    }
    if (!parsed || typeof parsed !== 'object' || Array.isArray(parsed)) {
      setSettingsCodeError(t('settingsCodeInvalid'));
      return false;
    }
    var merged = {};
    Object.keys(parsed).forEach(function(key) { merged[key] = parsed[key]; });
    schema.fields.forEach(function(field) {
      if (merged[field.key] === undefined && field.defaultValue !== undefined) merged[field.key] = field.defaultValue;
      if (field.type === 'tag-list' && !Array.isArray(merged[field.key])) merged[field.key] = [];
      if (field.type === 'entity-list' && !Array.isArray(merged[field.key])) merged[field.key] = [];
      if (field.type === 'boolean' && typeof merged[field.key] !== 'boolean') merged[field.key] = !!merged[field.key];
    });
    state.settingsDraft.configData = merged;
    state.settingsCodeDraftDirty = false;
    var saveCodeBtn = document.getElementById('settingsSaveCodeBtn');
    if (saveCodeBtn) saveCodeBtn.disabled = true;
    setSettingsCodeError('');
    renderSettingsSchemaFields();
    renderSettingsAnnotationPreview();
    markSettingsDirty();
    updateSettingsMainSaveState();
    if (showSuccessToast) showToast(t('settingsCodeSaved'));
    return true;
  }

  function validateSettingsRequiredFields() {
    var schema = getSettingsSchema(TASK_DATA.taskTypeKey);
    if (!schema || !state.settingsDraft) return false;
    var config = state.settingsDraft.configData || {};
    var ok = true;
    schema.fields.forEach(function(field) {
      if (!field.required) return;
      var val = config[field.key];
      if (field.type === 'tag-list') {
        if (!val || !Array.isArray(val) || !val.length) ok = false;
      } else if (field.type === 'entity-list') {
        if (!val || !Array.isArray(val) || !val.length || val.some(function(ent) { return !ent.name || !ent.name.trim(); })) ok = false;
      } else if (field.type === 'textarea' || field.type === 'text' || field.type === 'select') {
        if (val === undefined || val === null || (typeof val === 'string' && !val.trim())) ok = false;
      } else if (field.type === 'boolean') {
        if (val === undefined || val === null) ok = false;
      }
    });
    return ok;
  }

  function fillSettingsEditForm() {
    if (!state.settingsDraft) return;
    updateSettingsTemplateButtonLabel();
    renderSettingsSchemaFields();
    renderSettingsAnnotationPreview();
    renderSettingsCodeFromConfig();
    setSettingsEditError('');
  }

  function renderSettingsEditState() {
    var editable = isSettingsEditable();
    var editBtn = document.getElementById('settingsEditBtn');
    var saveBtn = document.getElementById('settingsSaveBtn');
    var cancelBtn = document.getElementById('settingsCancelBtn');
    var form = document.getElementById('settingsEditForm');
    var view = document.getElementById('settingsConfigView');
    var hint = document.getElementById('settingsReadonlyHint');

    if (!editBtn || !saveBtn || !cancelBtn || !form || !view || !hint) return;
    editBtn.disabled = !editable;
    editBtn.classList.toggle('hidden', state.settingsEditMode);
    saveBtn.classList.toggle('hidden', !state.settingsEditMode);
    cancelBtn.classList.toggle('hidden', !state.settingsEditMode);
    form.classList.toggle('hidden', !state.settingsEditMode);
    view.classList.toggle('hidden', state.settingsEditMode);

    if (state.settingsEditMode) {
      hint.classList.add('hidden');
      hint.textContent = '';
      fillSettingsEditForm();
      return;
    }

    if (!editable && state.taskRole !== 'project_leader') {
      hint.classList.remove('hidden');
      hint.textContent = t('settingsReadonlyRoleOnly');
      return;
    }
    if (!editable) {
      hint.classList.remove('hidden');
      hint.textContent = t('settingsReadonlyDraftOnly');
      return;
    }
    hint.classList.add('hidden');
    hint.textContent = '';
  }

  function startSettingsEdit() {
    if (!isSettingsEditable()) return;
    state.settingsEditMode = true;
    state.settingsDirty = false;
    state.settingsCodeDraftDirty = false;
    state.settingsDraft = createSettingsDraft();
    renderSettingsEditState();
    trackEvent('prototype_settings_edit_started');
  }

  function cancelSettingsEdit(force) {
    if (!state.settingsEditMode) return true;
    if (!force && state.settingsDirty && !window.confirm(t('settingsLeaveConfirm'))) return false;
    state.settingsEditMode = false;
    state.settingsDirty = false;
    state.settingsCodeDraftDirty = false;
    state.settingsDraft = null;
    renderSettingsEditState();
    return true;
  }

  function saveSettingsEdit() {
    if (!isSettingsEditable() || !state.settingsDraft) return;
    if (state.settingsCodeDraftDirty) {
      setSettingsCodeError(t('settingsCodeUnsaved'));
      setSettingsEditError(t('settingsCodeUnsaved'));
      return;
    }
    if (!validateSettingsRequiredFields()) {
      setSettingsEditError(t('settingsSchemaRequired'));
      return;
    }
    TASK_DATA.configContent = settingsConfigToCode();
    TASK_DATA.configFileName = state.settingsDraft.uploadedConfigName || '';
    TASK_DATA.updatedAt = new Date().toISOString().slice(0, 16).replace('T', ' ');
    state.settingsEditMode = false;
    state.settingsDirty = false;
    state.settingsCodeDraftDirty = false;
    state.settingsDraft = null;
    showToast(t('settingsSaveSuccess'));
    renderOverview();
    trackEvent('prototype_settings_edit_saved');
  }

  function getSettingsSummary() {
    var code = (TASK_DATA.configContent || '').trim();
    var codeFormat = code.startsWith('{') ? 'json' : 'yaml';
    var parsed = {};
    try {
      parsed = settingsParseCode(code, codeFormat) || {};
    } catch (error) {
      parsed = {};
    }
    var schema = getSettingsSchema(TASK_DATA.taskTypeKey);
    var summaryRows = [];
    if (schema && Array.isArray(schema.fields)) {
      schema.fields.forEach(function(field) {
        var rawValue = parsed[field.key];
        if (rawValue === undefined && field.defaultValue !== undefined) rawValue = field.defaultValue;
        var text = '-';
        if (field.type === 'tag-list') {
          var tags = Array.isArray(rawValue) ? rawValue.filter(function(item) { return String(item || '').trim(); }) : [];
          text = tags.length ? tags.join(', ') : '-';
        } else if (field.type === 'entity-list') {
          var names = Array.isArray(rawValue) ? rawValue.map(function(entity) {
            if (entity && typeof entity === 'object') return String(entity.name || '').trim();
            return String(entity || '').trim();
          }).filter(function(name) { return name; }) : [];
          text = names.length ? names.join(', ') : '-';
        } else if (field.type === 'boolean') {
          text = rawValue ? t('yes') : t('no');
        } else if (field.type === 'select' || field.type === 'textarea') {
          text = String(rawValue || '').trim() || '-';
        } else {
          text = String(rawValue || '').trim() || '-';
        }
        summaryRows.push({
          label: field[state.lang] || field.zh || field.key,
          value: text,
          required: Boolean(field.required),
        });
      });
    }

    return {
      configFileName: TASK_DATA.configFileName || '',
      taskTypeLabel: getTaskTypeLabel(TASK_DATA.taskTypeKey),
      summaryRows: summaryRows,
    };
  }

  function renderSettingsSummaryRows(rows) {
    var container = document.getElementById('settingsConfigDynamicRows');
    if (!container) return;
    container.innerHTML = '';
    (rows || []).forEach(function(row) {
      var rowNode = document.createElement('div');

  function openMemberActionModal(action) {
    state.pendingMemberAction = action;
    setText('memberActionModalTitle', action.title);
    setText('memberActionModalBody', action.message);
    var modal = document.getElementById('memberActionModal');
    modal.classList.add('show');
    modal.setAttribute('aria-hidden', 'false');

    state.pendingMemberAction = null;
    var modal = document.getElementById('memberActionModal');
    modal.classList.remove('show');
    modal.setAttribute('aria-hidden', 'true');
  }

  function executeMemberAction() {
    var action = state.pendingMemberAction;
    if (!action) return;
    var target = TASK_MEMBERS[action.index];
    if (!target) {
      closeMemberActionModal();
      return;
    }

    if (action.type === 'remove') {
      TASK_MEMBERS.splice(action.index, 1);
    } else if (action.type === 'disable') {
      target.status = 'disabled';
    } else if (action.type === 'enable') {
      target.status = 'active';
    }
    showToast(t('toastMemberUpdated'));
    trackEvent('prototype_member_action_confirmed', { action_type: action.type, member_email: target.email || '' });
    closeMemberActionModal();
    renderMemberTable();
    renderCandidateTable();
  }

  function getProgressStageData() {
    return state.progressStage === 'official' ? ANNOTATION_PROGRESS.official : ANNOTATION_PROGRESS.dry;
  }

  function getProgressRate(completed, total) {
    if (!total) return 0;
    return Math.max(0, Math.min(100, Math.round((completed / total) * 100)));
  }

  function getQualityLabel(quality) {
    if (quality === 'risk') return t('qualityRisk');
    if (quality === 'watch') return t('qualityWatch');
    return t('qualityGood');
  }

  function getQualityClass(quality) {
    if (quality === 'risk') return 'quality-flag quality-risk';
    if (quality === 'watch') return 'quality-flag quality-watch';
    return 'quality-flag quality-good';
  }

  function formatProgressSpeed(speed) {
    return speed > 0 ? speed.toFixed(1) + ' ' + t('progressSpeedUnit') : '-';
  }

  function getSortedProgressMembers(members) {
    var cloned = members.slice();
    if (state.progressSort === 'speed_desc') {
      cloned.sort(function(a, b) { return b.avgSpeed - a.avgSpeed; });
      return cloned;
    }
    if (state.progressSort === 'submitted_desc') {
      cloned.sort(function(a, b) { return Date.parse(b.lastSubmitted) - Date.parse(a.lastSubmitted); });
      return cloned;
    }
    cloned.sort(function(a, b) { return b.completed - a.completed; });
    return cloned;
  }

    var isDry = state.progressStage === 'dry';
    var dryBtn = document.getElementById('progressStageDryBtn');
    var officialBtn = document.getElementById('progressStageOfficialBtn');
    dryBtn.classList.toggle('active', isDry);
    officialBtn.classList.toggle('active', !isDry);
  }

    var stageData = getProgressStageData();

    setText('progressMetricRateValue', rate + '%');
    setText('progressMetricSpeedValue', formatProgressSpeed(stageData.avgSpeed));
    setText('progressMetricEtaValue', state.lang === 'zh' ? stageData.remainingEta : stageData.remainingEtaEn);
  }

      roleBadge.textContent = getTaskRoleLabel(role);
      tdRole.appendChild(roleBadge);
      tr.appendChild(tdRole);

      tr.appendChild(tdWithText(String(member.completed)));
      tr.appendChild(tdWithText(String(member.pending)));
      tr.appendChild(tdWithText(String(total)));

      var barTrack = document.createElement('div');
      barTrack.className = 'progress-inline-track';
      var barFill = document.createElement('div');
      barFill.className = 'progress-inline-fill';
      barFill.style.width = rate + '%';

      tr.appendChild(tdBar);

      tr.appendChild(tdWithText(member.lastSubmitted));

      var tdQuality = document.createElement('td');
      var qualityFlag = document.createElement('span');
      qualityFlag.className = getQualityClass(member.quality);
      qualityFlag.textContent = getQualityLabel(member.quality);
      tdQuality.appendChild(qualityFlag);
      tr.appendChild(tdQuality);

  function getWorkLogStageLabel(stage) {
    return stage === 'official' ? t('workLogStageOfficial') : t('workLogStageDry');
  }

  function getWorkLogStageBadgeClass(stage) {
    return stage === 'official' ? 'badge-run-official' : 'badge-run-dry';
  }

  function getCurrentUserEmail() {
    return ROLE_SELF_EMAIL[state.taskRole] || ROLE_SELF_EMAIL.project_leader;
  }

  function getFilteredWorkLogEntries() {
    return WORK_LOG_ENTRIES.filter(function(entry) {
      if (state.workLogDateFrom && entry.date < state.workLogDateFrom) return false;
      if (state.workLogDateTo && entry.date > state.workLogDateTo) return false;
      if (state.workLogStage !== 'all' && entry.stage !== state.workLogStage) return false;

      if (state.taskRole === 'reviewer') {
        return entry.memberEmail === getCurrentUserEmail();
      }
      if (state.workLogMember !== 'all' && entry.memberEmail !== state.workLogMember) {
        return false;
      }
      return true;
    });
  }

  function formatWorkLogDuration(hours) {
    return interpolate(t('workLogDurationTpl'), { hours: hours.toFixed(1) });
  }

  function formatWorkLogSpeedByEntry(entry) {
    var speed = entry.durationHours > 0 ? entry.completedCount / entry.durationHours : 0;
    return speed.toFixed(1) + ' ' + t('workLogSpeedUnit');
  }

  function getTaskRoleByEmail(email) {
    var target = TASK_MEMBERS.find(function(member) { return member.email === email; });
    return target && target.taskRole ? target.taskRole : 'annotator';
  }

    var memberWrap = document.getElementById('workLogMemberFilterWrap');
    var memberSelect = document.getElementById('workLogMemberSelect');

    memberWrap.classList.toggle('hidden', state.taskRole !== 'project_leader');

  function renderWorkLogSummary(entries) {
    var totalHours = entries.reduce(function(sum, entry) { return sum + entry.durationHours; }, 0);
    var totalCompleted = entries.reduce(function(sum, entry) { return sum + entry.completedCount; }, 0);
    var weightedSpeed = totalHours > 0 ? totalCompleted / totalHours : 0;

    setText('workLogSummaryHoursValue', totalHours.toFixed(1) + ' ' + t('workLogHoursUnit'));
    setText('workLogSummaryCompletedValue', String(totalCompleted));
    setText(
      'workLogSummarySpeedValue',
      (weightedSpeed > 0 ? weightedSpeed.toFixed(1) : '0.0') + ' ' + t('workLogSpeedUnit')
    );
  }

  function renderWorkLogAlerts(entries) {
    var list = document.getElementById('workLogAlertList');
    while (list.firstChild) list.removeChild(list.firstChild);

    var anomalies = entries.filter(function(entry) {
      var speed = entry.durationHours > 0 ? entry.completedCount / entry.durationHours : 0;
      return speed > 24 || speed < 9;
    });

    if (!anomalies.length) {
      var none = document.createElement('li');
      none.className = 'status-hint';
      none.textContent = t('workLogAlertNone');
      list.appendChild(none);
      return;
    }

    anomalies.forEach(function(entry) {
      var speed = entry.durationHours > 0 ? entry.completedCount / entry.durationHours : 0;
      var li = document.createElement('li');
      li.className = 'anomaly-item';

      var icon = document.createElement('img');
      icon.src = '../../assets/icons/alert-circle.svg';
      icon.alt = '';
      icon.setAttribute('aria-hidden', 'true');
      li.appendChild(icon);

      var message = speed > 24 ? t('workLogAnomalyFast') : t('workLogAnomalySlow');
      li.appendChild(document.createTextNode(interpolate(message, {
        date: entry.date,
        member: entry.memberName,
        speed: speed.toFixed(1) + ' ' + t('workLogSpeedUnit'),
      })));
      list.appendChild(li);
    });
  }

    renderWorkLogAlerts(entries);
    renderWorkLogEmptyState(entries);

  function showToast(message, isError) {

    var msg = document.getElementById('toastMsg');
    msg.textContent = message;
    toast.classList.toggle('error', Boolean(isError));
    toast.classList.add('show');

    if (toastTimer) {
      clearTimeout(toastTimer);
    }
    toastTimer = setTimeout(function() {
      toast.classList.remove('show');

      task_role: state.taskRole,
