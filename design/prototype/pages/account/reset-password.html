<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 重設密碼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --color-primary:        #6366F1;
      --color-primary-light:  #EEF2FF;
      --color-cta:            #10B981;
      --color-cta-hover:      #059669;
      --color-background:     #F5F3FF;
      --color-surface:        #FFFFFF;
      --color-border:         #E2E8F0;
      --color-border-focus:   #6366F1;
      --color-text:           #1E1B4B;
      --color-text-muted:     #94A3B8;
      --color-error:          #B91C1C;
      --color-error-bg:       #FEF2F2;
      --color-error-border:   #FECACA;
      --color-success:        #15803D;
      --color-success-bg:     #F0FDF4;
      --color-success-border: #BBF7D0;
      --color-link:           #6366F1;
      --radius-md:            8px;
      --radius-lg:            12px;
      --shadow-card:          0 4px 24px rgba(99,102,241,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      height: 64px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .navbar-wordmark {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--color-text);
      line-height: 1;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .lang-toggle svg { flex-shrink: 0; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Card Header ────────────────────────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .card-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-text);
      line-height: 1.2;
    }
    .card-subtitle {
      font-size: 15px;
      color: var(--color-text-muted);
      line-height: 1.5;
      text-align: center;
    }

    /* ── Token Error Panel ──────────────────────────────────────── */
    .token-error-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      text-align: center;
    }
    .token-error-panel.visible { display: flex; }
    .token-error-icon {
      width: 40px;
      height: 40px;
      background: #FEE2E2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .token-error-msg {
      font-size: 14px;
      color: var(--color-error);
      line-height: 1.6;
    }
    .token-error-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 20px;
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-error);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .token-error-action:hover {
      background: #FEE2E2;
      border-color: var(--color-error);
    }
    .token-error-action:focus-visible {
      outline: 2px solid var(--color-error);
      outline-offset: 2px;
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--color-text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-wrapper input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0 40px 0 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .input-wrapper input::placeholder { color: var(--color-text-muted); }
    .input-wrapper input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrapper input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(185,28,28,0.08);
    }
    .field-error {
      font-size: 12px;
      color: var(--color-error);
      display: none;
    }
    .field-error.visible { display: block; }

    .eye-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .eye-toggle:hover { color: var(--color-text); }
    .eye-toggle:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 1px;
    }

    /* ── Submit Button ──────────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-cta);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--color-cta-hover); box-shadow: 0 2px 8px rgba(16,185,129,0.25); }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .submit-btn:focus-visible { outline: 2px solid var(--color-cta); outline-offset: 2px; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Success Panel ──────────────────────────────────────────── */
    .success-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      text-align: center;
    }
    .success-panel.visible { display: flex; }
    .success-panel-icon {
      width: 40px;
      height: 40px;
      background: #D1FAE5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .success-panel-msg {
      font-size: 14px;
      color: var(--color-success);
      line-height: 1.6;
    }
    .success-panel-back {
      font-size: 13px;
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .success-panel-back:hover { text-decoration: underline; }

    /* ── Back row ───────────────────────────────────────────────── */
    .back-row {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }
    .back-row a {
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .back-row a:hover { text-decoration: underline; }

    /* ── Prototype State Toggle ─────────────────────────────────── */
    .proto-toggle-bar {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(30,27,75,0.92);
      border-radius: 20px;
      padding: 8px 16px;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    .proto-toggle-bar span {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      line-height: 28px;
      white-space: nowrap;
    }
    .proto-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 12px;
      border: none;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .proto-btn.active  { background: #6366F1; color: #fff; }
    .proto-btn.inactive { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); }
    .proto-btn.inactive:hover { background: rgba(255,255,255,0.2); }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar-logo { width: 28px; height: 28px; border-radius: 7px; }
      .navbar-wordmark { font-size: 16px; }
      .main { padding: 24px 16px; align-items: flex-start; }
      .card { padding: 28px 20px 24px; border-radius: var(--radius-lg); }
      .card-logo { width: 52px; height: 52px; border-radius: 13px; }
      .proto-toggle-bar { bottom: 8px; padding: 6px 12px; }
    }

    /* ── Accessibility ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar" role="banner">
    <a class="navbar-brand" href="#" aria-label="Label Suite 首頁">
      <svg class="navbar-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="#6366F1"/>
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
              transform="translate(4,4) scale(0.75)"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="10.25" y1="10.25" x2="10.26" y2="10.26"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="navbar-wordmark">Label Suite</span>
    </a>
    <button class="lang-toggle" id="langToggle" data-testid="lang-toggle" aria-label="切換語言" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="langLabel" data-testid="lang-label">ZH</span>
    </button>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main class="main" role="main">
    <div class="card" role="region" aria-label="重設密碼">

      <!-- Card Header -->
      <div class="card-header">
        <svg class="card-logo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="56" height="56" rx="14" fill="#6366F1"/>
          <path d="M36.59 22.41l-12.17 12.17a2 2 0 0 1-2.83 0L10 22V10h12l14.59 12.41a2 2 0 0 1 0 2z"
                transform="translate(4,4) scale(0.857)"
                stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="20" cy="20" r="1.5" fill="white"/>
        </svg>
        <h1 class="card-title" id="cardTitle">重設密碼</h1>
        <p class="card-subtitle" id="cardSubtitle">設定新密碼以完成重設</p>
      </div>

      <!-- Token Error Panel (invalid / expired / missing token) -->
      <div class="token-error-panel" id="tokenErrorPanel" role="alert">
        <div class="token-error-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#B91C1C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <p class="token-error-msg" id="tokenErrorMsg">此連結已過期，請重新申請。</p>
        <a href="./forgot-password.html" class="token-error-action" id="tokenErrorAction" data-testid="reapply-link">重新申請</a>
      </div>

      <!-- Reset Password Form (valid token state) -->
      <div id="formSection">
        <form class="form" id="resetForm" novalidate>

          <!-- New Password field -->
          <div class="field">
            <label for="newPassword" id="newPasswordLabel">新密碼</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input
                type="password"
                id="newPassword"
                name="new_password"
                data-testid="new-password-input"
                placeholder="••••••••"
                autocomplete="new-password"
                aria-describedby="newPasswordError"
              />
              <button type="button" class="eye-toggle" id="eyeToggleNew" aria-label="顯示密碼">
                <svg id="eyeOffNew" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg id="eyeOnNew" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="newPasswordError" data-testid="new-password-error" role="alert"></span>
          </div>

          <!-- Confirm Password field -->
          <div class="field">
            <label for="confirmPassword" id="confirmPasswordLabel">確認新密碼</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input
                type="password"
                id="confirmPassword"
                name="confirm_password"
                data-testid="confirm-password-input"
                placeholder="••••••••"
                autocomplete="new-password"
                aria-describedby="confirmPasswordError"
              />
              <button type="button" class="eye-toggle" id="eyeToggleConfirm" aria-label="顯示確認密碼">
                <svg id="eyeOffConfirm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
                <svg id="eyeOnConfirm" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="confirmPasswordError" data-testid="confirm-password-error" role="alert"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submitBtn" data-testid="update-password-btn">
            <span id="submitBtnText">更新密碼</span>
          </button>

          <!-- Back row -->
          <p class="back-row">
            <a href="./login.html" id="backLink" data-testid="back-to-login-link">← 返回登入</a>
          </p>
        </form>
      </div>

      <!-- Success Panel (shown after successful reset) -->
      <div class="success-panel" id="successPanel" role="alert" aria-live="polite">
        <div class="success-panel-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#15803D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <p class="success-panel-msg" id="successMsg">
          密碼重設成功，請重新登入。
        </p>
        <a href="./login.html" class="success-panel-back" id="successBackLink">前往登入</a>
      </div>

    </div>
  </main>

  <!-- ── Prototype State Toggle Bar ─────────────────────────────── -->
  <div class="proto-toggle-bar" role="group" aria-label="原型狀態切換">
    <span>原型狀態：</span>
    <button class="proto-btn active" id="btnValid" onclick="showState('valid')" type="button">有效 token</button>
    <button class="proto-btn inactive" id="btnExpired" onclick="showState('expired')" type="button">已過期</button>
    <button class="proto-btn inactive" id="btnUsed" onclick="showState('used')" type="button">已使用</button>
  </div>

  <script src="../shared/sidebar.js"></script>
  <script src="../../assets/analytics.js"></script>
  <script>
    window.LabelSuiteAnalytics.init({
      page: 'reset-password',
    });
    /* ── i18n ──────────────────────────────────────────────────── */
    const i18n = {
      zh: {
        pageTitle:              'Label Suite — 重設密碼',
        langLabel:              'ZH',
        cardTitle:              '重設密碼',
        cardSubtitleValid:      '設定新密碼以完成重設',
        cardSubtitleTokenError: '連結無效',
        newPasswordLabel:       '新密碼',
        confirmPasswordLabel:   '確認新密碼',
        passwordPlaceholder:    '••••••••',
        submitBtnText:          '更新密碼',
        backLink:               '← 返回登入',
        newPasswordRequired:    '請輸入新密碼',
        confirmPasswordRequired: '請輸入確認密碼',
        passwordMismatch:       '密碼不一致',
        tokenExpiredMsg:        '此連結已過期，請重新申請。',
        tokenUsedMsg:           '此連結已使用，請重新申請。',
        tokenErrorAction:       '重新申請',
        successMsg:             '密碼重設成功，請重新登入。',
        successBackLink:        '前往登入',
        cardRegion:             '重設密碼',
        navAriaLabel:           'Label Suite 首頁',
        langToggleAria:         '切換語言',
        eyeShow:                '顯示密碼',
        eyeHide:                '隱藏密碼',
      },
      en: {
        pageTitle:              'Label Suite — Reset Password',
        langLabel:              'EN',
        cardTitle:              'Reset Password',
        cardSubtitleValid:      'Set a new password to complete your reset',
        cardSubtitleTokenError: 'Invalid link',
        newPasswordLabel:       'New Password',
        confirmPasswordLabel:   'Confirm New Password',
        passwordPlaceholder:    '••••••••',
        submitBtnText:          'Update Password',
        backLink:               '← Back to Login',
        newPasswordRequired:    'Please enter a new password',
        confirmPasswordRequired: 'Please confirm your password',
        passwordMismatch:       'Passwords do not match',
        tokenExpiredMsg:        'This link has expired. Please request a new one.',
        tokenUsedMsg:           'This link has already been used. Please request a new one.',
        tokenErrorAction:       'Request New Link',
        successMsg:             'Password reset successfully. Please sign in.',
        successBackLink:        'Go to Login',
        cardRegion:             'Reset Password',
        navAriaLabel:           'Label Suite home',
        langToggleAria:         'Switch language',
        eyeShow:                'Show password',
        eyeHide:                'Hide password',
      },
    };

    let lang  = window.LabelSuiteSharedSidebar.getStoredLang();
    let state = 'valid'; // 'valid' | 'expired' | 'used'
    const getTrackingContext = () => ({ lang, state });

    function applyLang(l) {
      const nextLang = l === 'en' ? 'en' : 'zh';
      const t = i18n[nextLang];
      lang = nextLang;
      window.LabelSuiteSharedSidebar.setStoredLang(nextLang);
      document.documentElement.lang = nextLang === 'zh' ? 'zh-TW' : 'en';
      const langCode = nextLang === 'zh' ? 'ZH' : 'EN';
      const langLabelEl = document.getElementById('langLabel');
      if (langLabelEl) langLabelEl.textContent = langCode;
      const langToggleEl = document.getElementById('langToggle');
      if (langToggleEl) langToggleEl.setAttribute('aria-label', t.langToggleAria);
      document.title = t.pageTitle;
      document.getElementById('cardTitle').textContent          = t.cardTitle;
      document.getElementById('cardSubtitle').textContent       = state === 'valid' ? t.cardSubtitleValid : t.cardSubtitleTokenError;
      document.getElementById('newPasswordLabel').textContent   = t.newPasswordLabel;
      document.getElementById('confirmPasswordLabel').textContent = t.confirmPasswordLabel;
      document.getElementById('newPassword').placeholder        = t.passwordPlaceholder;
      document.getElementById('confirmPassword').placeholder    = t.passwordPlaceholder;
      const btnText = document.getElementById('submitBtnText');
      if (btnText) btnText.textContent = t.submitBtnText;
      document.getElementById('backLink').textContent           = t.backLink;
      document.getElementById('successMsg').textContent         = t.successMsg;
      document.getElementById('successBackLink').textContent    = t.successBackLink;
      document.getElementById('tokenErrorAction').textContent   = t.tokenErrorAction;
      document.getElementById('tokenErrorMsg').textContent      = state === 'used' ? t.tokenUsedMsg : t.tokenExpiredMsg;
      document.querySelector('.navbar-brand').setAttribute('aria-label', t.navAriaLabel);
      document.querySelector('[role="region"]').setAttribute('aria-label', t.cardRegion);
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      const previousLang = lang;
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLang(lang);
      clearErrors();
      window.LabelSuiteAnalytics.track('prototype_lang_switched', {
        source: 'reset_password_lang_toggle',
        from_lang: previousLang,
        to_lang: lang,
        state,
      });
    });

    /* ── Prototype State Switcher ──────────────────────────────── */
    function showState(s) {
      const previousState = state;
      state = s;

      // Reset form/panels
      document.getElementById('formSection').style.display  = '';
      document.getElementById('successPanel').classList.remove('visible');
      document.getElementById('tokenErrorPanel').classList.remove('visible');
      document.getElementById('resetForm').reset();
      clearErrors();

      // Reset submit button
      const btn = document.getElementById('submitBtn');
      btn.disabled  = false;
      btn.innerHTML = `<span id="submitBtnText">${i18n[lang].submitBtnText}</span>`;

      if (s === 'valid') {
        // show form
      } else {
        // hide form, show token error
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('tokenErrorPanel').classList.add('visible');
      }

      applyLang(lang);

      // update toggle button styles
      ['valid', 'expired', 'used'].forEach(k => {
        const el = document.getElementById('btn' + k.charAt(0).toUpperCase() + k.slice(1));
        if (el) {
          el.className = 'proto-btn ' + (k === s ? 'active' : 'inactive');
        }
      });

      if (previousState !== s) {
        window.LabelSuiteAnalytics.track('prototype_reset_password_state_switched', {
          ...getTrackingContext(),
          from_state: previousState,
          to_state: s,
        });
      }
    }

    /* ── Eye Toggle ────────────────────────────────────────────── */
    function makeEyeToggle(inputId, toggleId, offId, onId) {
      document.getElementById(toggleId).addEventListener('click', () => {
        const input   = document.getElementById(inputId);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        document.getElementById(offId).style.display = isHidden ? 'none' : '';
        document.getElementById(onId).style.display  = isHidden ? '' : 'none';
        document.getElementById(toggleId).setAttribute(
          'aria-label',
          isHidden ? i18n[lang].eyeHide : i18n[lang].eyeShow
        );
      });
    }
    makeEyeToggle('newPassword', 'eyeToggleNew', 'eyeOffNew', 'eyeOnNew');
    makeEyeToggle('confirmPassword', 'eyeToggleConfirm', 'eyeOffConfirm', 'eyeOnConfirm');

    /* ── Validation ────────────────────────────────────────────── */
    function setFieldError(fieldId, errorId, msg) {
      document.getElementById(fieldId).classList.add('error');
      const err = document.getElementById(errorId);
      err.textContent = msg;
      err.classList.add('visible');
    }
    function clearFieldError(fieldId, errorId) {
      document.getElementById(fieldId).classList.remove('error');
      document.getElementById(errorId).classList.remove('visible');
    }
    function clearErrors() {
      clearFieldError('newPassword', 'newPasswordError');
      clearFieldError('confirmPassword', 'confirmPasswordError');
    }

    document.getElementById('newPassword').addEventListener('input', () => {
      clearFieldError('newPassword', 'newPasswordError');
    });
    document.getElementById('confirmPassword').addEventListener('input', () => {
      clearFieldError('confirmPassword', 'confirmPasswordError');
    });

    /* ── Form Submit ───────────────────────────────────────────── */
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const newPw   = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;
      const t       = i18n[lang];
      let hasError  = false;

      if (!newPw) {
        setFieldError('newPassword', 'newPasswordError', t.newPasswordRequired);
        hasError = true;
      }
      if (!confirm) {
        setFieldError('confirmPassword', 'confirmPasswordError', t.confirmPasswordRequired);
        hasError = true;
      }
      if (!hasError && newPw !== confirm) {
        setFieldError('confirmPassword', 'confirmPasswordError', t.passwordMismatch);
        hasError = true;
      }
      if (hasError) {
        window.LabelSuiteAnalytics.track('prototype_reset_password_failed_validation', {
          ...getTrackingContext(),
        });
        return;
      }

      window.LabelSuiteAnalytics.track('prototype_reset_password_attempted', {
        ...getTrackingContext(),
      });

      // Loading state
      const btn = document.getElementById('submitBtn');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner" aria-label="載入中"></span>';

      // Simulate API call (prototype always succeeds)
      await new Promise(r => setTimeout(r, 1200));

      // Show success panel
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successPanel').classList.add('visible');
      applyLang(lang);
      window.LabelSuiteAnalytics.track('prototype_reset_password_succeeded', {
        ...getTrackingContext(),
      });
    });

    /* ── Init ──────────────────────────────────────────────────── */
    window.LabelSuiteAnalytics.bindClickTracks(
      [
        { id: 'backLink', eventName: 'prototype_navigate_login_clicked', extra: { source: 'form_section' } },
        { id: 'successBackLink', eventName: 'prototype_navigate_login_clicked', extra: { source: 'success_panel' } },
        { id: 'tokenErrorAction', eventName: 'prototype_reset_password_reapply_clicked' },
      ],
      getTrackingContext
    );
    showState('valid');
    applyLang(window.LabelSuiteSharedSidebar.getStoredLang());
    window.LabelSuiteAnalytics.trackPageView('reset-password', getTrackingContext);
  </script>
</body>
</html>
