<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 登入</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --color-primary:    #6366F1;
      --color-primary-light: #EEF2FF;
      --color-cta:        #10B981;
      --color-cta-hover:  #059669;
      --color-background: #F5F3FF;
      --color-surface:    #FFFFFF;
      --color-border:     #E2E8F0;
      --color-border-focus: #6366F1;
      --color-text:       #1E1B4B;
      --color-text-muted: #94A3B8;
      --color-error:      #B91C1C;
      --color-error-bg:   #FEF2F2;
      --color-error-border: #FECACA;
      --color-link:       #6366F1;
      --radius-md:        8px;
      --radius-lg:        12px;
      --shadow-card:      0 4px 24px rgba(99, 102, 241, 0.10), 0 1px 4px rgba(0,0,0,0.06);
      --color-role-bg:    #F8F7FF;
      --color-role-border: #C7D2FE;
      --color-role-active: #6366F1;
      --color-role-active-bg: #EEF2FF;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      height: 64px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
    }
    .navbar-wordmark {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--color-text);
      line-height: 1;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .lang-toggle svg { flex-shrink: 0; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Card Header ────────────────────────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .card-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      flex-shrink: 0;
    }
    .card-title {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-text);
      line-height: 1.2;
    }
    .card-subtitle {
      font-size: 15px;
      color: var(--color-text-muted);
      line-height: 1.4;
    }

    /* ── Error Banner ───────────────────────────────────────────── */
    .error-banner {
      display: none;
      align-items: flex-start;
      gap: 8px;
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--color-error);
      line-height: 1.4;
    }
    .error-banner.visible { display: flex; }
    .error-banner svg { flex-shrink: 0; margin-top: 1px; }

    /* ── Google SSO Button ──────────────────────────────────────── */
    .sso-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 11px 16px;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .sso-btn:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.08);
    }

    /* ── Divider ────────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--color-text-muted);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
    }
    .forgot-link {
      font-size: 13px;
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .forgot-link:hover { text-decoration: underline; }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--color-text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-wrapper input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0 40px 0 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .input-wrapper input::placeholder { color: var(--color-text-muted); }
    .input-wrapper input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrapper input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(185,28,28,0.08);
    }
    .field-error {
      font-size: 12px;
      color: var(--color-error);
      display: none;
    }
    .field-error.visible { display: block; }

    .eye-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .eye-toggle:hover { color: var(--color-text); }
    .eye-toggle:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 1px;
    }

    /* ── Login Button ───────────────────────────────────────────── */
    .login-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-cta);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .login-btn:hover { background: var(--color-cta-hover); box-shadow: 0 2px 8px rgba(16,185,129,0.25); }
    .login-btn:active { transform: translateY(1px); }
    .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .login-btn:focus-visible { outline: 2px solid var(--color-cta); outline-offset: 2px; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Register Link ──────────────────────────────────────────── */
    .register-row {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }
    .register-row a {
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .register-row a:hover { text-decoration: underline; }

    /* ── Role Selector ─────────────────────────────────────────── */
    .role-section {
      margin-bottom: 20px;
    }
    .role-section-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .role-section-label::before,
    .role-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .role-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      border: 1.5px solid var(--color-role-border);
      border-radius: var(--radius-md);
      background: var(--color-role-bg);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--color-text);
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      text-align: center;
      line-height: 1.3;
    }
    .role-btn:hover {
      border-color: var(--color-role-active);
      background: var(--color-role-active-bg);
    }
    .role-btn.selected {
      border-color: var(--color-role-active);
      background: var(--color-role-active-bg);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      color: var(--color-role-active);
    }
    .role-btn .role-emoji {
      font-size: 20px;
      line-height: 1;
    }
    .role-error {
      font-size: 12px;
      color: var(--color-error);
      display: none;
      margin-top: 4px;
    }
    .role-error.visible { display: block; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar-logo { width: 28px; height: 28px; border-radius: 7px; }
      .navbar-wordmark { font-size: 16px; }
      .main { padding: 24px 16px; align-items: flex-start; }
      .card { padding: 28px 20px 24px; border-radius: var(--radius-lg); }
      .card-logo { width: 52px; height: 52px; border-radius: 13px; }
    }

    /* ── Accessibility ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar" role="banner">
    <a class="navbar-brand" href="#" aria-label="Label Suite 首頁">
      <!-- Logo 32×32 -->
      <svg class="navbar-logo" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="32" height="32" rx="8" fill="#6366F1"/>
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
              transform="translate(4,4) scale(0.75)"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="10.25" y1="10.25" x2="10.26" y2="10.26"
              stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="navbar-wordmark">Label Suite</span>
    </a>
    <button class="lang-toggle" id="langToggle" data-testid="lang-toggle" aria-label="切換語言" type="button">
      <!-- Globe icon -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="langLabel" data-testid="lang-label">ZH | EN</span>
    </button>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main class="main" role="main">
    <div class="card" role="region" aria-label="登入">

      <!-- Card Header -->
      <div class="card-header">
        <!-- Logo 56×56 -->
        <svg class="card-logo" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="56" height="56" rx="14" fill="#6366F1"/>
          <path d="M36.59 22.41l-12.17 12.17a2 2 0 0 1-2.83 0L10 22V10h12l14.59 12.41a2 2 0 0 1 0 2z"
                transform="translate(4,4) scale(0.857)"
                stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="20" cy="20" r="1.5" fill="white"/>
        </svg>
        <h1 class="card-title">Label Suite</h1>
        <p class="card-subtitle" id="subtitle">登入你的帳號</p>
      </div>

      <!-- Error Banner -->
      <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorMsg">帳號或密碼錯誤，請再試一次</span>
      </div>

      <!-- Role Selector (prototype only) -->
      <div class="role-section" id="roleSection">
        <p class="role-section-label" id="roleSectionLabel">Prototype — 選擇登入角色</p>
        <div class="role-grid" id="roleGrid" role="group" aria-labelledby="roleSectionLabel">
          <!-- buttons injected by JS -->
        </div>
        <span class="role-error" id="roleError" role="alert"></span>
      </div>

      <!-- Google SSO -->
      <button class="sso-btn" type="button" id="ssoBtn" data-testid="google-login-btn" aria-label="使用 Google 帳號繼續登入">
        <!-- Google G icon -->
        <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span id="ssoText">使用 Google 帳號繼續</span>
      </button>

      <!-- Divider -->
      <div class="divider"><span id="dividerText">或</span></div>

      <!-- Form -->
      <form class="form" id="loginForm" novalidate>

        <!-- Email field -->
        <div class="field">
          <label for="email" id="emailLabel">電子郵件</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              data-testid="email-input"
              placeholder="name@example.com"
              autocomplete="email"
              aria-describedby="emailError"
            />
          </div>
          <span class="field-error" id="emailError" data-testid="email-error" role="alert"></span>
        </div>

        <!-- Password field -->
        <div class="field">
          <div class="field-label-row">
            <label for="password" id="passwordLabel">密碼</label>
            <a href="./forgot-password.html" class="forgot-link" id="forgotLink" data-testid="forgot-password-link">忘記密碼？</a>
          </div>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              data-testid="password-input"
              placeholder="••••••••"
              autocomplete="current-password"
              aria-describedby="passwordError"
            />
            <button type="button" class="eye-toggle" id="eyeToggle" aria-label="顯示密碼">
              <!-- Eye-off icon (default — password hidden) -->
              <svg id="eyeOff" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <!-- Eye icon (shown when password visible) -->
              <svg id="eyeOn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="passwordError" data-testid="password-error" role="alert"></span>
        </div>

        <!-- Login Button -->
        <button type="submit" class="login-btn" id="loginBtn" data-testid="login-btn">
          <span id="loginBtnText">登入</span>
        </button>

        <!-- Register row -->
        <p class="register-row">
          <span id="registerText">還沒有帳號？</span>
          <a href="./register.html" id="registerLink" data-testid="register-link"> 前往註冊</a>
        </p>
      </form>

    </div>
  </main>

  <script>
    /* ── Role Config ───────────────────────────────────────────── */
    const ROLES = [
      { key: 'project_leader', labelZh: '專案負責人', labelEn: 'Project Leader', emoji: '👑' },
      { key: 'annotator',      labelZh: '標記員',     labelEn: 'Annotator',      emoji: '✏️' },
      { key: 'reviewer',       labelZh: '審核員',     labelEn: 'Reviewer',       emoji: '🔍' },
      { key: 'super_admin',    labelZh: '系統管理員', labelEn: 'Super Admin',    emoji: '⚙️' },
    ];

    let selectedRole = null;

    function buildRoleGrid(currentLang) {
      const grid = document.getElementById('roleGrid');
      grid.textContent = ''; // clear existing buttons
      ROLES.forEach(r => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'role-btn' + (r.key === selectedRole ? ' selected' : '');
        btn.dataset.role = r.key;
        btn.setAttribute('aria-pressed', r.key === selectedRole ? 'true' : 'false');

        const emojiSpan = document.createElement('span');
        emojiSpan.className = 'role-emoji';
        emojiSpan.setAttribute('aria-hidden', 'true');
        emojiSpan.textContent = r.emoji;

        const nameSpan = document.createElement('span');
        nameSpan.textContent = currentLang === 'zh' ? r.labelZh : r.labelEn;

        btn.appendChild(emojiSpan);
        btn.appendChild(nameSpan);

        btn.addEventListener('click', () => {
          selectedRole = r.key;
          document.getElementById('roleError').classList.remove('visible');
          grid.querySelectorAll('.role-btn').forEach(b => {
            const isActive = b.dataset.role === selectedRole;
            b.classList.toggle('selected', isActive);
            b.setAttribute('aria-pressed', isActive ? 'true' : 'false');
          });
        });

        grid.appendChild(btn);
      });
    }

    /* ── i18n ──────────────────────────────────────────────────── */
    const i18n = {
      zh: {
        pageTitle:    'Label Suite — 登入',
        langLabel:    'ZH | EN',
        subtitle:     '登入你的帳號',
        ssoText:      '使用 Google 帳號繼續',
        dividerText:  '或',
        emailLabel:   '電子郵件',
        emailPlaceholder: 'name@example.com',
        passwordLabel: '密碼',
        forgotLink:   '忘記密碼？',
        loginBtnText: '登入',
        registerText: '還沒有帳號？',
        registerLink: ' 前往註冊',
        errorMsg:     '帳號或密碼錯誤，請再試一次',
        emailRequired:    '請輸入電子郵件',
        passwordRequired: '請輸入密碼',
        cardRegion:   '登入',
        eyeShow:      '顯示密碼',
        eyeHide:      '隱藏密碼',
        ssoAriaLabel:      '使用 Google 帳號繼續登入',
        navAriaLabel:      'Label Suite 首頁',
        langToggleAria:    '切換語言',
        roleSectionLabel:  'Prototype — 選擇登入角色',
        roleRequired:      '請先選擇要體驗的角色',
      },
      en: {
        pageTitle:    'Label Suite — Sign In',
        langLabel:    'EN | ZH',
        subtitle:     'Sign in to your account',
        ssoText:      'Continue with Google',
        dividerText:  'or',
        emailLabel:   'Email',
        emailPlaceholder: 'name@example.com',
        passwordLabel: 'Password',
        forgotLink:   'Forgot password?',
        loginBtnText: 'Sign In',
        registerText: "Don't have an account?",
        registerLink: ' Register',
        errorMsg:     'Invalid email or password',
        emailRequired:    'Email is required',
        passwordRequired: 'Password is required',
        cardRegion:   'Sign in',
        eyeShow:      'Show password',
        eyeHide:      'Hide password',
        ssoAriaLabel:      'Continue with Google account',
        navAriaLabel:      'Label Suite home',
        langToggleAria:    'Switch language',
        roleSectionLabel:  'Prototype — Select login role',
        roleRequired:      'Please select a role to continue',
      },
    };

    let lang = 'zh';

    function applyLang(l) {
      const t = i18n[l];
      document.title                              = t.pageTitle;
      document.documentElement.lang              = l === 'zh' ? 'zh-TW' : 'en';
      document.getElementById('langLabel').textContent   = t.langLabel;
      document.getElementById('subtitle').textContent    = t.subtitle;
      document.getElementById('ssoText').textContent     = t.ssoText;
      document.getElementById('dividerText').textContent = t.dividerText;
      document.getElementById('emailLabel').textContent  = t.emailLabel;
      document.getElementById('email').placeholder       = t.emailPlaceholder;
      document.getElementById('passwordLabel').textContent = t.passwordLabel;
      document.getElementById('forgotLink').textContent  = t.forgotLink;
      const loginBtnTextEl = document.getElementById('loginBtnText');
      if (loginBtnTextEl) loginBtnTextEl.textContent = t.loginBtnText;
      document.getElementById('registerText').textContent = t.registerText;
      document.getElementById('registerLink').textContent = t.registerLink;
      document.getElementById('errorMsg').textContent    = t.errorMsg;
      document.getElementById('ssoBtn').setAttribute('aria-label', t.ssoAriaLabel);
      document.getElementById('langToggle').setAttribute('aria-label', t.langToggleAria);
      document.querySelector('.navbar-brand').setAttribute('aria-label', t.navAriaLabel);
      document.querySelector('[role="region"]').setAttribute('aria-label', t.cardRegion);
      // update eye toggle aria-label based on current visibility state
      const pwVisible = document.getElementById('password').type === 'text';
      document.getElementById('eyeToggle').setAttribute('aria-label', pwVisible ? t.eyeHide : t.eyeShow);
      // update role section label and rebuild buttons for language
      document.getElementById('roleSectionLabel').textContent = t.roleSectionLabel;
      buildRoleGrid(l);
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLang(lang);
      // clear errors on language switch
      clearErrors();
    });

    /* ── Password Toggle ───────────────────────────────────────── */
    document.getElementById('eyeToggle').addEventListener('click', () => {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      document.getElementById('eyeOff').style.display = isHidden ? 'none' : '';
      document.getElementById('eyeOn').style.display  = isHidden ? '' : 'none';
      document.getElementById('eyeToggle').setAttribute(
        'aria-label',
        isHidden ? i18n[lang].eyeHide : i18n[lang].eyeShow
      );
    });

    /* ── Validation ────────────────────────────────────────────── */
    function setFieldError(fieldId, errorId, msg) {
      const input = document.getElementById(fieldId);
      const err   = document.getElementById(errorId);
      input.classList.add('error');
      err.textContent = msg;
      err.classList.add('visible');
    }
    function clearFieldError(fieldId, errorId) {
      const input = document.getElementById(fieldId);
      const err   = document.getElementById(errorId);
      input.classList.remove('error');
      err.classList.remove('visible');
    }
    function clearErrors() {
      clearFieldError('email', 'emailError');
      clearFieldError('password', 'passwordError');
      document.getElementById('errorBanner').classList.remove('visible');
      const roleErr = document.getElementById('roleError');
      roleErr.textContent = '';
      roleErr.classList.remove('visible');
    }

    document.getElementById('email').addEventListener('input', () => {
      clearFieldError('email', 'emailError');
    });
    document.getElementById('password').addEventListener('input', () => {
      clearFieldError('password', 'passwordError');
    });

    /* ── Form Submit ───────────────────────────────────────────── */
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const t        = i18n[lang];
      let hasError   = false;

      if (!email) {
        setFieldError('email', 'emailError', t.emailRequired);
        hasError = true;
      }
      if (!password) {
        setFieldError('password', 'passwordError', t.passwordRequired);
        hasError = true;
      }
      if (!selectedRole) {
        const roleErr = document.getElementById('roleError');
        roleErr.textContent = t.roleRequired;
        roleErr.classList.add('visible');
        hasError = true;
      }
      if (hasError) return;

      // Loading state — replace entire button content to prevent applyLang()
      // from writing text into a detached #loginBtnText during the async window
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      spinner.setAttribute('aria-label', '載入中');
      btn.textContent = '';
      btn.appendChild(spinner);

      // Simulate async login
      await new Promise(r => setTimeout(r, 800));

      // Prototype: login always succeeds — store role and navigate
      sessionStorage.setItem('proto_role', selectedRole);
      window.location.href = '../dashboard/dashboard.html';
    });

    /* ── SSO Button (prototype feedback) ──────────────────────── */
    document.getElementById('ssoBtn').addEventListener('click', () => {
      // Prototype: no-op with visual press feedback
    });

    /* ── Init ──────────────────────────────────────────────────── */
    applyLang('zh');
  </script>
</body>
</html>
