<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 建立帳號</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --color-primary:        #6366F1;
      --color-primary-light:  #EEF2FF;
      --color-cta:            #10B981;
      --color-cta-hover:      #059669;
      --color-background:     #F5F3FF;
      --color-surface:        #FFFFFF;
      --color-border:         #E2E8F0;
      --color-border-focus:   #6366F1;
      --color-text:           #1E1B4B;
      --color-text-muted:     #94A3B8;
      --color-error:          #B91C1C;
      --color-error-bg:       #FEF2F2;
      --color-error-border:   #FECACA;
      --color-success:        #15803D;
      --color-success-bg:     #F0FDF4;
      --color-success-border: #BBF7D0;
      --color-link:           #6366F1;
      --radius-md:            8px;
      --radius-lg:            12px;
      --shadow-card:          0 4px 24px rgba(99,102,241,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      height: 64px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .navbar-logo svg {
      width: 20px;
      height: 20px;
    }
    .navbar-wordmark {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--color-text);
      line-height: 1;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .lang-toggle svg { flex-shrink: 0; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Card Header ────────────────────────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .card-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      flex-shrink: 0;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-logo svg {
      width: 30px;
      height: 30px;
    }
    .card-title {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-text);
      line-height: 1.2;
    }
    .card-subtitle {
      font-size: 14px;
      color: var(--color-text-muted);
      line-height: 1.5;
      text-align: center;
    }

    /* ── Banner (error / success) ───────────────────────────────── */
    .banner {
      display: none;
      align-items: flex-start;
      gap: 8px;
      border-radius: var(--radius-md);
      padding: 10px 14px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.4;
    }
    .banner.visible { display: flex; }
    .banner svg { flex-shrink: 0; margin-top: 1px; }
    .banner--error {
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      color: var(--color-error);
    }
    .banner--success {
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      color: var(--color-success);
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .form { display: flex; flex-direction: column; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
    }

    /* Input wrapper */
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--color-text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-wrapper input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0 12px 0 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .input-wrapper input.has-eye { padding-right: 40px; }
    .input-wrapper input::placeholder { color: var(--color-text-muted); }
    .input-wrapper input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrapper input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(185,28,28,0.08);
    }
    .field-error {
      font-size: 12px;
      color: var(--color-error);
      display: none;
    }
    .field-error.visible { display: block; }

    /* Eye toggle */
    .eye-toggle {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .eye-toggle:hover { color: var(--color-text); }
    .eye-toggle:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 1px;
    }

    /* Password hint */
    .field-hint {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    /* ── Submit Button ───────────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-cta);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--color-cta-hover);
      box-shadow: 0 2px 8px rgba(16,185,129,0.25);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .submit-btn:focus-visible { outline: 2px solid var(--color-cta); outline-offset: 2px; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Login Link ─────────────────────────────────────────────── */
    .login-row {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }
    .login-row a {
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .login-row a:hover { text-decoration: underline; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar-logo { width: 28px; height: 28px; border-radius: 7px; }
      .navbar-wordmark { font-size: 16px; }
      .main { padding: 24px 16px; align-items: flex-start; }
      .card { padding: 28px 20px 24px; }
      .card-logo { width: 52px; height: 52px; border-radius: 13px; }
    }

    /* ── Accessibility ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar" role="banner">
    <a class="navbar-brand" href="#" aria-label="Label Suite 首頁">
      <div class="navbar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="7" y1="7" x2="7.01" y2="7"
                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="navbar-wordmark">Label Suite</span>
    </a>
    <button class="lang-toggle" id="langToggle" data-testid="lang-toggle" aria-label="切換語言" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="langLabel" data-testid="lang-label">ZH</span>
    </button>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main class="main" role="main">
    <div class="card" role="region" aria-label="建立帳號">

      <!-- Card Header -->
      <div class="card-header">
        <div class="card-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="7" y1="7" x2="7.01" y2="7"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="card-title" id="cardTitle">建立帳號</h1>
        <p class="card-subtitle" id="cardSubtitle">填寫以下資訊以建立您的帳號</p>
      </div>

      <!-- Error Banner -->
      <div class="banner banner--error" id="errorBanner" data-testid="error-banner" role="alert" aria-live="assertive">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorMsg"></span>
      </div>

      <!-- Success Banner -->
      <div class="banner banner--success" id="successBanner" data-testid="success-banner" role="status" aria-live="polite">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="successMsg"></span>
      </div>

      <!-- Register Form -->
      <form class="form" id="registerForm" novalidate>

        <!-- Name -->
        <div class="field">
          <label for="name" id="nameLabel">姓名</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="name"
              name="name"
              data-testid="name-input"
              placeholder="王小明"
              autocomplete="name"
              aria-describedby="nameError"
            />
          </div>
          <span class="field-error" id="nameError" data-testid="name-error" role="alert"></span>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email" id="emailLabel">電子郵件</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="4" width="20" height="16" rx="2"/>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
              </svg>
            </span>
            <input
              type="email"
              id="email"
              name="email"
              data-testid="email-input"
              placeholder="name@example.com"
              autocomplete="email"
              aria-describedby="emailError"
            />
          </div>
          <span class="field-error" id="emailError" data-testid="email-error" role="alert"></span>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password" id="passwordLabel">密碼</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              data-testid="password-input"
              placeholder="••••••••"
              autocomplete="new-password"
              class="has-eye"
              aria-describedby="passwordError passwordHint"
            />
            <button type="button" class="eye-toggle" id="eyeToggle1" aria-label="顯示密碼">
              <svg id="eyeOff1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eyeOn1" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-hint" id="passwordHint"></span>
          <span class="field-error" id="passwordError" data-testid="password-error" role="alert"></span>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <label for="confirmPassword" id="confirmPasswordLabel">確認密碼</label>
          <div class="input-wrapper">
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                <polyline points="9 16 11 18 15 14"/>
              </svg>
            </span>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              data-testid="confirm-password-input"
              placeholder="••••••••"
              autocomplete="new-password"
              class="has-eye"
              aria-describedby="confirmPasswordError"
            />
            <button type="button" class="eye-toggle" id="eyeToggle2" aria-label="顯示確認密碼">
              <svg id="eyeOff2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <svg id="eyeOn2" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="confirmPasswordError" data-testid="confirm-password-error" role="alert"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="submitBtn" data-testid="submit-btn" style="margin-top: 6px;">
          <span id="submitBtnText">建立帳號</span>
        </button>

        <!-- Back to Login -->
        <p class="login-row">
          <span id="loginText">已有帳號？</span>
          <a href="./login.html" id="loginLink" data-testid="login-link">返回登入</a>
        </p>

      </form>
    </div>
  </main>

        passwordMismatch:       'Passwords do not match',
        emailTaken:             'This email is already in use. Please try a different email or sign in.',
        successMsg:             'Account created! Redirecting to dashboard…',
        // aria
        navAriaLabel:           'Label Suite home',
        langToggleAria:         'Switch language',
        cardRegion:             'Create account',
        eyeShow:                'Show password',
        eyeHide:                'Hide password',
        eyeShow2:               'Show confirm password',
        eyeHide2:               'Hide confirm password',
      },
    };

    let lang = window.LabelSuiteSharedSidebar.getStoredLang();
    const getTrackingContext = () => ({ lang });

    function applyLang(l) {
      const nextLang = l === 'en' ? 'en' : 'zh';
      const t = i18n[nextLang];
      lang = window.LabelSuiteSharedSidebar.applyGlobalLanguage(nextLang, {
        langToggleAria: t.langToggleAria,
        labelIds: ['langLabel'],
        toggleIds: ['langToggle'],
      });
      document.title = t.pageTitle;

      document.getElementById('cardTitle').textContent            = t.cardTitle;
      document.getElementById('cardSubtitle').textContent         = t.cardSubtitle;
      document.getElementById('nameLabel').textContent            = t.nameLabel;
      document.getElementById('name').placeholder                 = t.namePlaceholder;
      document.getElementById('emailLabel').textContent           = t.emailLabel;
      document.getElementById('email').placeholder                = t.emailPlaceholder;
      document.getElementById('passwordLabel').textContent        = t.passwordLabel;
      document.getElementById('password').placeholder             = t.passwordPlaceholder;
      document.getElementById('passwordHint').textContent         = t.passwordHint;
      document.getElementById('confirmPasswordLabel').textContent = t.confirmPasswordLabel;
      document.getElementById('confirmPassword').placeholder      = t.confirmPasswordPlaceholder;
      document.getElementById('submitBtnText').textContent        = t.submitBtnText;
      document.getElementById('loginText').textContent            = t.loginText;
      document.getElementById('loginLink').textContent            = t.loginLink;

      document.querySelector('.navbar-brand').setAttribute('aria-label', t.navAriaLabel);
      document.querySelector('[role="region"]').setAttribute('aria-label', t.cardRegion);

      // Eye toggle aria-labels
      const pw1Visible = document.getElementById('password').type === 'text';
      document.getElementById('eyeToggle1').setAttribute('aria-label', pw1Visible ? t.eyeHide : t.eyeShow);
      const pw2Visible = document.getElementById('confirmPassword').type === 'text';
      document.getElementById('eyeToggle2').setAttribute('aria-label', pw2Visible ? t.eyeHide2 : t.eyeShow2);

      // Re-render any visible error messages in new language
      clearAllErrors();
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      const previousLang = lang;
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLang(lang);
      window.LabelSuiteAnalytics.track('prototype_lang_switched', {
        source: 'register_lang_toggle',
        from_lang: previousLang,
        to_lang: lang,
      });
    });

    /* ── Eye Toggles ───────────────────────────────────────────── */
    function setupEyeToggle(toggleId, inputId, eyeOffId, eyeOnId, showKey, hideKey) {
      document.getElementById(toggleId).addEventListener('click', () => {
        const input   = document.getElementById(inputId);
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        document.getElementById(eyeOffId).style.display = isHidden ? 'none' : '';
        document.getElementById(eyeOnId).style.display  = isHidden ? '' : 'none';
        document.getElementById(toggleId).setAttribute(
          'aria-label',
          isHidden ? i18n[lang][hideKey] : i18n[lang][showKey]
        );
      });
    }
    setupEyeToggle('eyeToggle1', 'password',        'eyeOff1', 'eyeOn1', 'eyeShow',  'eyeHide');
    setupEyeToggle('eyeToggle2', 'confirmPassword', 'eyeOff2', 'eyeOn2', 'eyeShow2', 'eyeHide2');

    /* ── Field Helpers ─────────────────────────────────────────── */
    function setFieldError(inputId, errorId, msg) {
      document.getElementById(inputId).classList.add('error');
      const el = document.getElementById(errorId);
      el.textContent = msg;
      el.classList.add('visible');
    }
    function clearFieldError(inputId, errorId) {
      document.getElementById(inputId).classList.remove('error');
      const el = document.getElementById(errorId);
      el.classList.remove('visible');
    }
    function clearAllErrors() {
      [['name','nameError'],['email','emailError'],['password','passwordError'],['confirmPassword','confirmPasswordError']]
        .forEach(([i,e]) => clearFieldError(i, e));
      document.getElementById('errorBanner').classList.remove('visible');
      document.getElementById('successBanner').classList.remove('visible');
    }

    // Clear field error on input
    ['name','email','password','confirmPassword'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        const errId = id + 'Error';
        // capitalise first letter for 'confirmPassword' → 'confirmPasswordError'
        clearFieldError(id, id === 'confirmPassword' ? 'confirmPasswordError' : id + 'Error');
        // also clear error banner when user starts typing
        document.getElementById('errorBanner').classList.remove('visible');
      });
    });

    /* ── Form Submit ───────────────────────────────────────────── */
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAllErrors();

      const t           = i18n[lang];
      const name        = document.getElementById('name').value.trim();
      const email       = document.getElementById('email').value.trim();
      const password    = document.getElementById('password').value;
      const confirmPw   = document.getElementById('confirmPassword').value;
      let   hasError    = false;

      // ── Front-end validation ─────────────────────────────────
      if (!name) {
        setFieldError('name', 'nameError', t.nameRequired);
        hasError = true;
      }

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!email) {
        setFieldError('email', 'emailError', t.emailRequired);
        hasError = true;
      } else if (!emailRegex.test(email)) {
        setFieldError('email', 'emailError', t.emailInvalid);
        hasError = true;
      }

      if (!password) {
        setFieldError('password', 'passwordError', t.passwordRequired);
        hasError = true;
      } else if (password.length < 8) {
        setFieldError('password', 'passwordError', t.passwordTooShort);
        hasError = true;
      }

      if (!confirmPw) {
        setFieldError('confirmPassword', 'confirmPasswordError', t.confirmPasswordRequired);
        hasError = true;
      } else if (password && password !== confirmPw) {
        setFieldError('confirmPassword', 'confirmPasswordError', t.passwordMismatch);
        hasError = true;
      }

      if (hasError) {
        window.LabelSuiteAnalytics.track('prototype_register_failed_validation', {
          ...getTrackingContext(),
        });
        return;
      }

      window.LabelSuiteAnalytics.track('prototype_register_attempted', {
        ...getTrackingContext(),
      });

      // ── Loading state ────────────────────────────────────────
      const btn     = document.getElementById('submitBtn');
      const btnText = document.getElementById('submitBtnText');
      btn.disabled  = true;
      btnText.innerHTML = '';
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      spinner.setAttribute('aria-label', lang === 'zh' ? '載入中' : 'Loading');
      btn.appendChild(spinner);

      await new Promise(r => setTimeout(r, 1500));

      // ── Simulate server response ─────────────────────────────
      // Prototype rule: email "taken@example.com" triggers duplicate error
      if (email === 'taken@example.com') {
        btn.disabled = false;
        btn.innerHTML = `<span id="submitBtnText">${t.submitBtnText}</span>`;

        const errBanner = document.getElementById('errorBanner');
        document.getElementById('errorMsg').textContent = t.emailTaken;
        errBanner.classList.add('visible');
        document.getElementById('email').classList.add('error');
        document.getElementById('email').focus();
        window.LabelSuiteAnalytics.track('prototype_register_failed_duplicate_email', {
          ...getTrackingContext(),
        });
        return;
      }

      // ── Success ──────────────────────────────────────────────
      btn.disabled = false;
      btn.innerHTML = `<span id="submitBtnText">${t.submitBtnText}</span>`;

      document.getElementById('successBanner').classList.add('visible');
      document.getElementById('successMsg').textContent = t.successMsg;

      // Disable form during redirect countdown
      ['name','email','password','confirmPassword'].forEach(id => {
        document.getElementById(id).disabled = true;
      });
      btn.disabled = true;

      // Prototype: redirect to dashboard after 2s
      setTimeout(() => {
        window.LabelSuiteAnalytics.track('prototype_register_succeeded', {
          ...getTrackingContext(),
        });
        window.location.href = '../dashboard/dashboard.html';
      }, 2000);
    });

    /* ── Init ──────────────────────────────────────────────────── */
    window.LabelSuiteAnalytics.bindClickTracks(
      [{ id: 'loginLink', eventName: 'prototype_navigate_login_clicked' }],
      getTrackingContext
    );
    applyLang(window.LabelSuiteSharedSidebar.getStoredLang());
    window.LabelSuiteAnalytics.trackPageView('register', getTrackingContext);
  </script>
</body>
</html>
