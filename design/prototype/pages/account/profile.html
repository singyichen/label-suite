<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 個人設定</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --color-primary:         #6366F1;
      --color-primary-light:   #EEF2FF;
      --color-primary-soft-bg: #EEF2FF;
      --color-cta:             #10B981;
      --color-cta-hover:       #059669;
      --color-surface:         #F5F3FF;
      --color-white:           #FFFFFF;
      --color-border:          #E2E8F0;
      --color-ink:             #1E1B4B;
      --color-ink-muted:       #94A3B8;
      --color-text-muted:      #94A3B8;
      --color-error:           #B91C1C;
      --color-error-bg:        #FEF2F2;
      --color-error-border:    #FECACA;
      --color-success:         #15803D;
      --color-success-bg:      #F0FDF4;
      --color-success-border:  #BBF7D0;
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --radius-xl:   16px;
      --radius-full: 9999px;
      --shadow-md:   0 4px 6px rgba(0,0,0,0.1);
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --navbar-mobile-height:     84px;
      --navbar-mobile-top-height: 64px;
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: var(--color-surface);
      color: var(--color-ink);
      min-height: 100vh;
      line-height: 1.8;
      display: flex;
      flex-direction: row;
    }

    .hidden { display: none !important; }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      width: 240px;
      height: 100vh;
      background: var(--color-white);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: var(--space-lg) var(--space-md);
      position: sticky;
      top: 0;
      z-index: 200;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .brand-section {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
      padding-bottom: var(--space-lg);
      border-bottom: 1px solid var(--color-border);
    }

    .navbar-brand {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      text-decoration: none;
    }

    .navbar-logo {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      background: var(--color-primary);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .navbar-logo svg { width: 20px; height: 20px; }

    .navbar-wordmark {
      font-family: 'Crimson Pro', 'Noto Serif TC', serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--color-ink);
      line-height: 1;
    }

    .brand-section .lang-toggle { margin-left: auto; }

    .mobile-top-logout {
      display: none;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-white);
      color: var(--color-ink-muted);
      transition: color 150ms, border-color 150ms, background 150ms;
    }

    .mobile-top-logout:hover {
      color: var(--color-error);
      border-color: var(--color-error-border);
      background: var(--color-error-bg);
    }

    .mobile-user-name {
      display: none;
      margin-left: auto;
      max-width: 110px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 13px;
      font-weight: 600;
      color: var(--color-ink);
      line-height: 1.2;
    }

    .mobile-lang-toggle {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 10px;
      background: var(--color-white);
      color: var(--color-ink);
      font-size: 12px;
      font-weight: 600;
      transition: border-color 150ms, background 150ms;
    }

    .mobile-lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-soft-bg);
    }

    .navbar-center {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      margin-bottom: var(--space-xl);
      flex: 1;
    }

    .nav-link {
      padding: 10px 12px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      color: var(--color-ink-muted);
      transition: color 150ms, background 150ms;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      text-decoration: none;
    }

    .nav-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: currentColor;
    }

    .nav-link:hover { color: var(--color-ink); background: #F8FAFC; }

    .nav-link.active {
      color: var(--color-primary);
      background: var(--color-surface);
      font-weight: 600;
    }

    .nav-link.active .nav-icon { color: var(--color-primary); }

    .nav-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
      border-top: 1px solid var(--color-border);
      padding-top: var(--space-lg);
      margin-top: auto;
    }

    .lang-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-white);
      color: var(--color-ink);
      font-size: 13px;
      font-weight: 500;
      transition: border-color 150ms, background 150ms;
      white-space: nowrap;
    }

    .lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-soft-bg);
    }

    .user-chip {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 12px;
      width: 100%;
      border-radius: var(--radius-md);
    }

    .user-chip-profile {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
      text-decoration: none;
      color: inherit;
      border-radius: var(--radius-sm);
      transition: opacity 150ms;
    }

    .user-chip-profile:hover { opacity: 0.75; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      color: var(--color-primary);
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
      border: 2px solid rgba(99, 102, 241, 0.16);
    }

    .user-info { flex: 1; min-width: 0; }

    .user-name {
      display: block;
      font-weight: 600;
      font-size: 13px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-role {
      display: block;
      font-size: 11px;
      color: var(--color-ink-muted);
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--color-ink-muted);
      cursor: pointer;
      flex-shrink: 0;
      transition: color 150ms, background 150ms;
    }

    .logout-btn:hover { color: var(--color-error); background: var(--color-error-bg); }

    /* ── Main Content ────────────────────────────────────────────── */
    .main-content {
      flex: 1;
      padding: 32px 24px 80px;
      overflow-x: hidden;
    }

    .content-inner { max-width: 672px; }

    @media (min-width: 768px) { .main-content { padding: 32px 40px 64px; } }

    /* ── Page Header ─────────────────────────────────────────────── */
    .page-heading {
      font-family: 'Crimson Pro', 'Noto Serif TC', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--color-ink);
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .page-subheading { font-size: 14px; color: #64748B; margin-bottom: 24px; }

    /* ── Section Card ────────────────────────────────────────────── */
    .section-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
    }

    .section-title { font-size: 16px; font-weight: 600; color: var(--color-ink); margin-bottom: 4px; }
    .section-desc  { font-size: 13px; color: #64748B; margin-bottom: 20px; }

    /* ── Avatar ──────────────────────────────────────────────────── */
    .avatar-area { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 24px; }

    .avatar-wrap {
      position: relative;
      cursor: pointer;
      border-radius: var(--radius-full);
    }

    .avatar-wrap:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 3px;
      border-radius: var(--radius-full);
    }

    .avatar-preview {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-full);
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-full);
      background: rgba(0,0,0,0.48);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .avatar-wrap:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay svg { width: 20px; height: 20px; color: #fff; }
    .avatar-hint { font-size: 12px; color: #64748B; }

    /* ── Form Group ──────────────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      margin-bottom: 6px;
    }

    .required-star { color: var(--color-error); margin-left: 2px; }

    .input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      color: var(--color-ink);
      background: var(--color-white);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(185,28,28,0.1);
    }

    .field-error { margin-top: 5px; font-size: 12px; color: var(--color-error); }
    .field-hint  { margin-top: 5px; font-size: 12px; color: #64748B; }

    /* ── Email Row (masked display + change link) ─────────────────── */
    .email-row {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: #F8FAFC;
      gap: 8px;
    }

    .email-masked {
      flex: 1;
      font-size: 15px;
      color: var(--color-text-muted);
      font-family: 'Inter', 'Noto Sans TC', sans-serif;
    }

    .email-change-btn {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-primary);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      transition: background 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .email-change-btn:hover { background: var(--color-primary-light); }

    .email-change-btn:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    /* ── Password Input ──────────────────────────────────────────── */
    .input-pw-wrap { position: relative; }
    .input-pw-wrap .input { padding-right: 42px; }

    .eye-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      color: #64748B;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: color 0.15s;
    }

    .eye-toggle:hover { color: #334155; }
    .eye-toggle svg { width: 16px; height: 16px; }

    /* ── Info Banner ─────────────────────────────────────────────── */
    .info-banner {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 16px;
      font-size: 13px;
      color: #1D4ED8;
      line-height: 1.5;
    }

    .info-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }

    .btn-primary {
      background: var(--color-cta);
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:focus { outline: 2px solid var(--color-cta); outline-offset: 3px; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    #saveProfileBtn, #savePwBtn { margin-left: auto; }

    .btn-secondary {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      padding: 10px 22px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }

    .btn-secondary:hover { background: var(--color-primary-light); }
    .btn-secondary:focus { outline: 2px solid var(--color-primary); outline-offset: 3px; }

    /* ── Back Navigation ─────────────────────────────────────────── */
    .page-back {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #64748B;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      transition: color 0.15s, background 0.15s;
    }

    .back-link:hover { color: var(--color-ink); background: #F8FAFC; }
    .back-link svg { width: 14px; height: 14px; }

    /* ── Email Sent Success Card ─────────────────────────────────── */
    .sent-card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      text-align: center;
      margin-bottom: 24px;
    }

    .sent-icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: var(--radius-full);
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .sent-icon-wrap svg { width: 28px; height: 28px; color: var(--color-success); }

    .sent-title {
      font-family: 'Crimson Pro', 'Noto Serif TC', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--color-ink);
      margin-bottom: 8px;
    }

    .sent-desc {
      font-size: 14px;
      color: #64748B;
      margin-bottom: 4px;
      line-height: 1.6;
    }

    .sent-email-highlight {
      font-weight: 600;
      color: var(--color-ink);
    }

    .sent-hint {
      font-size: 13px;
      color: var(--color-text-muted);
      margin-bottom: 28px;
      margin-top: 4px;
    }

    .sent-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .resend-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--color-primary);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      text-decoration-color: transparent;
      transition: text-decoration-color 0.15s;
    }

    .resend-link:hover { text-decoration-color: var(--color-primary); }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 400;
      max-width: 360px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      font-size: 13px;
      animation: toast-in 0.15s ease;
    }

    .toast.success {
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      color: var(--color-success);
    }

    .toast.error {
      background: var(--color-error-bg);
      border: 1px solid var(--color-error-border);
      color: var(--color-error);
    }

    .toast-icon { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }
    .toast-body { flex: 1; }
    .toast-title { font-weight: 600; }
    .toast-desc { font-size: 12px; margin-top: 2px; opacity: 0.8; }

    .toast-close {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      opacity: 0.6;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .toast-close:hover { opacity: 1; }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Skeleton ────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skel-avatar { width: 72px; height: 72px; border-radius: var(--radius-full); }
    .skel-line   { height: 14px; }
    .skel-input  { height: 42px; width: 100%; margin-top: 6px; }
    .skel-btn    { height: 40px; width: 90px; }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 767px) {
      body {
        padding-top: var(--navbar-mobile-top-height);
        padding-bottom: var(--navbar-mobile-height);
      }

      .navbar {
        width: 100%;
        height: var(--navbar-mobile-height);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        border-right: none;
        border-top: 1px solid var(--color-border);
        padding: 0;
        overflow: visible;
        flex-direction: row;
      }

      .brand-section {
        position: fixed;
        left: 0;
        right: 0;
        top: 0;
        height: var(--navbar-mobile-top-height);
        margin: 0;
        padding: 0 var(--space-md);
        border-bottom: 1px solid var(--color-border);
        background: var(--color-white);
        display: flex;
        align-items: center;
        z-index: 210;
      }

      .navbar-brand {
        width: 100%;
      }

      .navbar-wordmark { font-size: 14px; }
      .mobile-user-name { display: inline-block; }
      .brand-section .lang-toggle { display: none; }
      .mobile-lang-toggle { display: inline-flex; }
      .mobile-top-logout { display: inline-flex; }

      .navbar-center {
        flex: 1;
        flex-direction: row;
        align-items: stretch;
        justify-content: space-around;
        gap: 0;
        margin: 0;
      }

      .navbar-center .nav-link {
        min-height: var(--navbar-mobile-top-height);
        flex: 1;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        border-radius: 0;
        padding: 8px 2px;
        gap: 4px;
      }

      .navbar-center .nav-link span {
        font-size: 10px;
        line-height: 1.2;
      }

      .nav-actions { display: none; }

      .main-content { width: 100%; padding: 20px 16px 80px; }

      .section-card { padding: 16px; }
      .sent-card    { padding: 32px 16px; }
      .btn-row { flex-direction: column; }
      .btn-primary, .btn-secondary { width: 100%; text-align: center; }
      #saveProfileBtn, #savePwBtn { margin-left: 0; }
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- NAVBAR                                                     -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <div id="sharedSidebarMount"></div>
  <script src="../shared/sidebar.js"></script>
  <script>
    window.LabelSuiteSharedSidebar.mountSidebar({
      mountId: 'sharedSidebarMount',
      activeNav: 'profile',

      const activeBtn = document.getElementById(STATE_BTN_IDS[state]);
      if (activeBtn) activeBtn.classList.add('active');

      const isSkeleton    = state === 'skeleton';
      const isEmailChange = state === 'emailChange';
      const isEmailSent   = state === 'emailSent';
      const isLive        = !isSkeleton && !isEmailChange && !isEmailSent;

      document.getElementById('skeletonState').style.display   = isSkeleton    ? '' : 'none';
      document.getElementById('liveState').style.display        = isLive        ? '' : 'none';
      document.getElementById('emailChangeState').style.display = isEmailChange ? '' : 'none';
      document.getElementById('emailSentState').style.display   = isEmailSent   ? '' : 'none';

      if (isLive) {
        clearAllErrors();
        document.getElementById('fieldCurrentPw').value = '';
        document.getElementById('fieldNewPw').value     = '';
        document.getElementById('fieldConfirmPw').value = '';

        const isSSO   = state === 'sso';
        const isError = state === 'error';

        document.getElementById('ssoBanner').style.display      = isSSO ? '' : 'none';
        document.getElementById('currentPwGroup').style.display = isSSO ? 'none' : '';

        if (isError) {
          document.getElementById('fieldCurrentPw').classList.add('error');
          document.getElementById('currentPwError').style.display = '';
          document.getElementById('currentPwError').textContent   = t('errCurrentPwWrong');
        }

        document.getElementById('savePwLabel').textContent = isSSO ? t('savePwLabelSSO') : t('savePwLabel');
      }

      if (isEmailChange) {
        clearEmailChangeErrors();
        const emailInput = document.getElementById('fieldNewEmail');
        if (emailInput) emailInput.value = '';
        const submitBtn = document.getElementById('emailChangeSubmitBtn');
        if (submitBtn) submitBtn.disabled = true;
      }
    }

    function clearAllErrors() {
      ['fieldCurrentPw', 'fieldNewPw', 'fieldConfirmPw', 'fieldName'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.remove('error');
      });
      ['nameError', 'contactError', 'currentPwError', 'newPwError', 'confirmPwError'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.textContent = ''; }
      });
    }

    function clearEmailChangeErrors() {
      const input = document.getElementById('fieldNewEmail');
      if (input) input.classList.remove('error');
      const err = document.getElementById('newEmailError');
      if (err) { err.style.display = 'none'; err.textContent = ''; }
    }

    /* ── Profile save ───────────────────────────────────────────── */
    function handleSaveProfile() {
      clearAllErrors();
      const name    = document.getElementById('fieldName').value.trim();
      const contact = document.getElementById('fieldContact').value;
      let valid = true;

      if (!name) {
        showFieldError('fieldName', 'nameError', t('errNameRequired'));
        valid = false;
      }
      if (contact.length > 255) {
        showFieldError('fieldContact', 'contactError', t('errContactTooLong'));
        valid = false;
      }
      if (!valid) {
        window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_profile_info_failed_validation');
        return;
      }

      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_profile_info_attempted');
      document.getElementById('userName').textContent       = name;
      document.getElementById('mobileUserName').textContent = name;
      showToast('success', t('toastSaveSuccess'), t('toastSaveSuccessDesc'));
      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_profile_info_saved');
    }

    /* ── Password save ──────────────────────────────────────────── */
    function handleSavePassword() {
      clearAllErrors();
      const isSSO     = currentState === 'sso';
      const isError   = currentState === 'error';
      const newPw     = document.getElementById('fieldNewPw').value;
      const confirm   = document.getElementById('fieldConfirmPw').value;
      const currentPw = document.getElementById('fieldCurrentPw').value;
      let valid = true;

      if (!isSSO && !currentPw) {
        showFieldError('fieldCurrentPw', 'currentPwError', t('errCurrentPwWrong'));
        valid = false;
      }
      if (!newPw || !/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(newPw)) {
        showFieldError('fieldNewPw', 'newPwError', t('errNewPwWeak'));
        valid = false;
      }
      if (newPw !== confirm) {
        showFieldError('fieldConfirmPw', 'confirmPwError', t('errPwMismatch'));
        valid = false;
      }
      if (!valid) {
        window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_password_failed_validation');
        return;
      }

      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_password_attempted');

      if (isError) {
        showFieldError('fieldCurrentPw', 'currentPwError', t('errCurrentPwWrong'));
        window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_password_failed_validation', { reason: 'wrong_current_password' });
        return;
      }

      const titleKey = isSSO ? 'toastPwSetSuccess'     : 'toastPwSuccess';
      const descKey  = isSSO ? 'toastPwSetSuccessDesc' : 'toastPwSuccessDesc';
      showToast('success', t(titleKey), t(descKey));
      document.getElementById('fieldCurrentPw').value = '';
      document.getElementById('fieldNewPw').value     = '';
      document.getElementById('fieldConfirmPw').value = '';
      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_password_succeeded');
    }

    /* ── Email change handlers ──────────────────────────────────── */
    function handleNewEmailInput() {
      const val       = document.getElementById('fieldNewEmail').value.trim();
      const emailRe   = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const submitBtn = document.getElementById('emailChangeSubmitBtn');
      submitBtn.disabled = !emailRe.test(val);
      clearEmailChangeErrors();
    }

    function handleEmailChangeSubmit() {
      const newEmail = document.getElementById('fieldNewEmail').value.trim();
      const emailRe  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!emailRe.test(newEmail)) {
        showFieldError('fieldNewEmail', 'newEmailError', t('errEmailInvalid'));
        window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_email_change_failed_validation');
        return;
      }

      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_email_change_attempted');
      document.getElementById('sentEmailDisplay').textContent = newEmail;
      setState('emailSent');
      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_email_change_succeeded');
    }

    function handleResendVerification() {
      showToast('success', t('toastResendSuccess'), t('toastResendSuccessDesc'));
      window.LabelSuiteAnalytics && LabelSuiteAnalytics.track('prototype_email_change_resent');
    }

    /* ── Helpers ────────────────────────────────────────────────── */
    function showFieldError(inputId, errorId, msg) {
      const input = document.getElementById(inputId);
      if (input) input.classList.add('error');
      if (errorId) {
        const err = document.getElementById(errorId);
        if (err) { err.textContent = msg; err.style.display = ''; }
      }
    }

    function showToast(type, title, desc) {
      const container = document.getElementById('toast-container');

      const toast = document.createElement('div');
      toast.className = 'toast ' + type;

      const iconSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      iconSvg.setAttribute('viewBox', '0 0 24 24');
      iconSvg.setAttribute('fill', 'none');
      iconSvg.setAttribute('stroke', 'currentColor');
      iconSvg.setAttribute('stroke-width', '2');
      iconSvg.setAttribute('aria-hidden', 'true');
      iconSvg.setAttribute('width', '16');
      iconSvg.setAttribute('height', '16');
      iconSvg.classList.add('toast-icon');

      if (type === 'success') {
        const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        poly.setAttribute('points', '20 6 9 17 4 12');
        iconSvg.appendChild(poly);
      } else {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', '12'); circle.setAttribute('cy', '12'); circle.setAttribute('r', '10');
        const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        l1.setAttribute('x1', '15'); l1.setAttribute('y1', '9'); l1.setAttribute('x2', '9');  l1.setAttribute('y2', '15');
        const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        l2.setAttribute('x1', '9');  l2.setAttribute('y1', '9'); l2.setAttribute('x2', '15'); l2.setAttribute('y2', '15');
        iconSvg.appendChild(circle); iconSvg.appendChild(l1); iconSvg.appendChild(l2);
      }
      toast.appendChild(iconSvg);

      const body = document.createElement('div');
      body.className = 'toast-body';
      const titleEl = document.createElement('p');
      titleEl.className = 'toast-title';
      titleEl.textContent = title;
      body.appendChild(titleEl);
      if (desc) {
        const descEl = document.createElement('p');
        descEl.className = 'toast-desc';
        descEl.textContent = desc;
        body.appendChild(descEl);
      }
      toast.appendChild(body);

      const closeBtn = document.createElement('button');
      closeBtn.className = 'toast-close';
      closeBtn.setAttribute('aria-label', t('closeNotif'));
      closeBtn.addEventListener('click', () => toast.remove());
      const closeSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      closeSvg.setAttribute('width', '14'); closeSvg.setAttribute('height', '14');
      closeSvg.setAttribute('viewBox', '0 0 24 24'); closeSvg.setAttribute('fill', 'none');
      closeSvg.setAttribute('stroke', 'currentColor'); closeSvg.setAttribute('stroke-width', '2');
      const cl1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      cl1.setAttribute('x1', '18'); cl1.setAttribute('y1', '6'); cl1.setAttribute('x2', '6'); cl1.setAttribute('y2', '18');
      const cl2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      cl2.setAttribute('x1', '6'); cl2.setAttribute('y1', '6'); cl2.setAttribute('x2', '18'); cl2.setAttribute('y2', '18');
      closeSvg.appendChild(cl1); closeSvg.appendChild(cl2);
      closeBtn.appendChild(closeSvg);
      toast.appendChild(closeBtn);

      container.appendChild(toast);
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, 4000);
    }

    function toggleEye(inputId, btn) {
      const input = document.getElementById(inputId);
      const isText = input.type === 'text';
      input.type = isText ? 'password' : 'text';
      btn.setAttribute('aria-label', isText ? t('showPw') : t('hidePw'));
    }

    function updateCharCount() {
      const val = document.getElementById('fieldContact').value;
      document.getElementById('contactCount').textContent = val.length + ' / 255';
    }

    /* ── Avatar upload ──────────────────────────────────────────── */
    document.getElementById('avatarInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const allowed = ['image/jpeg', 'image/png', 'image/webp'];
      if (!allowed.includes(file.type) || file.size > 5 * 1024 * 1024) return;
      const url = URL.createObjectURL(file);
      const preview = document.getElementById('avatarPreview');
      const img = document.createElement('img');
      img.alt = lang === 'zh' ? '大頭照' : 'Avatar';
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
      img.addEventListener('load', () => URL.revokeObjectURL(url));
      img.src = url;
      while (preview.firstChild) preview.removeChild(preview.firstChild);
      preview.appendChild(img);
    });

    /* ── Init ───────────────────────────────────────────────────── */
    applyLang(window.LabelSuiteSharedSidebar.getStoredLang());
    setState('email');
  </script>

  <!-- ── Analytics ─────────────────────────────────────────────── -->
  <script src="../../assets/analytics.js"></script>
  <script>
    if (window.LabelSuiteAnalytics) {
      LabelSuiteAnalytics.init({ page: 'profile' });
      LabelSuiteAnalytics.trackPageView('profile', () => ({
        account_type: currentState === 'sso' ? 'google_sso' : 'email_password',
        proto_state:  currentState,
      }));
    }
  </script>

</body>
</html>
