<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 忘記密碼</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --color-primary:        #6366F1;
      --color-primary-light:  #EEF2FF;
      --color-cta:            #10B981;
      --color-cta-hover:      #059669;
      --color-background:     #F5F3FF;
      --color-surface:        #FFFFFF;
      --color-border:         #E2E8F0;
      --color-border-focus:   #6366F1;
      --color-text:           #1E1B4B;
      --color-text-muted:     #94A3B8;
      --color-error:          #B91C1C;
      --color-error-bg:       #FEF2F2;
      --color-error-border:   #FECACA;
      --color-success:        #15803D;
      --color-success-bg:     #F0FDF4;
      --color-success-border: #BBF7D0;
      --color-link:           #6366F1;
      --radius-md:            8px;
      --radius-lg:            12px;
      --shadow-card:          0 4px 24px rgba(99,102,241,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }

    /* ── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-background);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ─────────────────────────────────────────────────── */
    .navbar {
      height: 64px;
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .navbar-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .navbar-logo svg {
      width: 20px;
      height: 20px;
    }
    .navbar-wordmark {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 18px;
      color: var(--color-text);
      line-height: 1;
    }
    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 6px 12px;
      background: var(--color-surface);
      color: var(--color-text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .lang-toggle:hover {
      border-color: var(--color-primary);
      background: var(--color-primary-light);
    }
    .lang-toggle svg { flex-shrink: 0; }

    /* ── Main ───────────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    /* ── Card ───────────────────────────────────────────────────── */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      padding: 40px 40px 36px;
      width: 100%;
      max-width: 480px;
    }

    /* ── Card Header ────────────────────────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .card-logo {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      flex-shrink: 0;
      background: var(--color-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-logo svg {
      width: 30px;
      height: 30px;
    }
    .card-title {
      font-family: 'Crimson Pro', serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--color-text);
      line-height: 1.2;
    }
    .card-subtitle {
      font-size: 15px;
      color: var(--color-text-muted);
      line-height: 1.5;
      text-align: center;
    }

    /* ── Success Banner ─────────────────────────────────────────── */
    .success-panel {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: var(--color-success-bg);
      border: 1px solid var(--color-success-border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      text-align: center;
    }
    .success-panel.visible { display: flex; }
    .success-panel-icon {
      width: 40px;
      height: 40px;
      background: #D1FAE5;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .success-panel-msg {
      font-size: 14px;
      color: var(--color-success);
      line-height: 1.6;
    }
    .success-panel-back {
      font-size: 13px;
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .success-panel-back:hover { text-decoration: underline; }

    /* ── Form ───────────────────────────────────────────────────── */
    .form-section { display: flex; flex-direction: column; gap: 0; }
    .form { display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    label {
      font-size: 14px;
      font-weight: 500;
      color: var(--color-text);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      color: var(--color-text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-wrapper input {
      width: 100%;
      height: 42px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0 16px 0 40px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .input-wrapper input::placeholder { color: var(--color-text-muted); }
    .input-wrapper input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }
    .input-wrapper input.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(185,28,28,0.08);
    }
    .field-error {
      font-size: 12px;
      color: var(--color-error);
      display: none;
    }
    .field-error.visible { display: block; }

    /* ── Submit Button ──────────────────────────────────────────── */
    .submit-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: var(--radius-md);
      background: var(--color-cta);
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--color-cta-hover); box-shadow: 0 2px 8px rgba(16,185,129,0.25); }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
    .submit-btn:focus-visible { outline: 2px solid var(--color-cta); outline-offset: 2px; }

    /* Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Back to Login link ─────────────────────────────────────── */
    .back-row {
      text-align: center;
      font-size: 13px;
      color: var(--color-text-muted);
      margin-top: 4px;
    }
    .back-row a {
      color: var(--color-link);
      text-decoration: none;
      font-weight: 500;
    }
    .back-row a:hover { text-decoration: underline; }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 767px) {
      .navbar { height: 56px; padding: 0 16px; }
      .navbar-logo { width: 28px; height: 28px; border-radius: 7px; }
      .navbar-wordmark { font-size: 16px; }
      .main { padding: 24px 16px; align-items: flex-start; }
      .card { padding: 28px 20px 24px; border-radius: var(--radius-lg); }
      .card-logo { width: 52px; height: 52px; border-radius: 13px; }
    }

    /* ── Accessibility ──────────────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────────── -->
  <nav class="navbar" role="banner">
    <a class="navbar-brand" href="#" aria-label="Label Suite 首頁">
      <div class="navbar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="7" y1="7" x2="7.01" y2="7"
                stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="navbar-wordmark">Label Suite</span>
    </a>
    <button class="lang-toggle" id="langToggle" data-testid="lang-toggle" aria-label="切換語言" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="langLabel" data-testid="lang-label">ZH</span>
    </button>
  </nav>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main class="main" role="main">
    <div class="card" role="region" aria-label="忘記密碼">

      <!-- Card Header -->
      <div class="card-header">
        <div class="card-logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="7" y1="7" x2="7.01" y2="7"
                  stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="card-title" id="cardTitle">忘記密碼</h1>
        <p class="card-subtitle" id="cardSubtitle">輸入你的電子郵件，我們將寄送重設連結</p>
      </div>

      <!-- Form Section (hidden when success) -->
      <div class="form-section" id="formSection">
        <form class="form" id="forgotForm" novalidate>

          <!-- Email field -->
          <div class="field">
            <label for="email" id="emailLabel">電子郵件</label>
            <div class="input-wrapper">
              <span class="input-icon" aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
                </svg>
              </span>
              <input
                type="email"
                id="email"
                name="email"
                data-testid="email-input"
                placeholder="name@example.com"
                autocomplete="email"
                aria-describedby="emailError"
              />
            </div>
            <span class="field-error" id="emailError" data-testid="email-error" role="alert"></span>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="submit-btn" id="submitBtn" data-testid="send-reset-btn">
            <span id="submitBtnText">寄送重設連結</span>
          </button>

          <!-- Back row -->
          <p class="back-row">
            <a href="./login.html" id="backLink" data-testid="back-to-login-link">← 返回登入</a>
          </p>
        </form>
      </div>

      <!-- Success Panel (shown after submit) -->
      <div class="success-panel" id="successPanel" role="alert" aria-live="polite">
        <div class="success-panel-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#15803D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <p class="success-panel-msg" id="successMsg">
          若此 Email 已註冊，重設連結已寄出，請查收信箱。
        </p>
        <a href="./login.html" class="success-panel-back" id="successBackLink">← 返回登入</a>
      </div>

    </div>
  </main>

  <script>
    /* ── i18n ──────────────────────────────────────────────────── */
    const i18n = {
      zh: {
        pageTitle:        'Label Suite — 忘記密碼',
        langLabel:        'ZH',
        cardTitle:        '忘記密碼',
        cardSubtitle:     '輸入你的電子郵件，我們將寄送重設連結',
        emailLabel:       '電子郵件',
        emailPlaceholder: 'name@example.com',
        submitBtnText:    '寄送重設連結',
        backLink:         '← 返回登入',
        emailRequired:    '請輸入電子郵件',
        successMsg:       '若此 Email 已註冊，重設連結已寄出，請查收信箱。',
        successBackLink:  '← 返回登入',
        cardRegion:       '忘記密碼',
        navAriaLabel:     'Label Suite 首頁',
        langToggleAria:   '切換語言',
      },
      en: {
        pageTitle:        'Label Suite — Forgot Password',
        langLabel:        'EN',
        cardTitle:        'Forgot Password',
        cardSubtitle:     'Enter your email and we\'ll send you a reset link',
        emailLabel:       'Email',
        emailPlaceholder: 'name@example.com',
        submitBtnText:    'Send Reset Link',
        backLink:         '← Back to Login',
        emailRequired:    'Email is required',
        successMsg:       'If this email is registered, a reset link has been sent. Please check your inbox.',
        successBackLink:  '← Back to Login',
        cardRegion:       'Forgot Password',
        navAriaLabel:     'Label Suite home',
        langToggleAria:   'Switch language',
      },
    };

    let lang = 'zh';

    function applyLang(l) {
      const t = i18n[l];
      document.title = t.pageTitle;
      document.documentElement.lang = l === 'zh' ? 'zh-TW' : 'en';
      document.getElementById('langLabel').textContent    = t.langLabel;
      document.getElementById('cardTitle').textContent    = t.cardTitle;
      document.getElementById('cardSubtitle').textContent = t.cardSubtitle;
      document.getElementById('emailLabel').textContent   = t.emailLabel;
      document.getElementById('email').placeholder        = t.emailPlaceholder;
      const btnText = document.getElementById('submitBtnText');
      if (btnText) btnText.textContent = t.submitBtnText;
      document.getElementById('backLink').textContent     = t.backLink;
      document.getElementById('successMsg').textContent   = t.successMsg;
      document.getElementById('successBackLink').textContent = t.successBackLink;
      document.getElementById('langToggle').setAttribute('aria-label', t.langToggleAria);
      document.querySelector('.navbar-brand').setAttribute('aria-label', t.navAriaLabel);
      document.querySelector('[role="region"]').setAttribute('aria-label', t.cardRegion);
    }

    document.getElementById('langToggle').addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      applyLang(lang);
      clearErrors();
    });

    /* ── Validation ────────────────────────────────────────────── */
    function setFieldError(fieldId, errorId, msg) {
      document.getElementById(fieldId).classList.add('error');
      const err = document.getElementById(errorId);
      err.textContent = msg;
      err.classList.add('visible');
    }
    function clearFieldError(fieldId, errorId) {
      document.getElementById(fieldId).classList.remove('error');
      document.getElementById(errorId).classList.remove('visible');
    }
    function clearErrors() {
      clearFieldError('email', 'emailError');
    }

    document.getElementById('email').addEventListener('input', () => {
      clearFieldError('email', 'emailError');
    });

    /* ── Form Submit ───────────────────────────────────────────── */
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const email = document.getElementById('email').value.trim();
      const t     = i18n[lang];

      if (!email) {
        setFieldError('email', 'emailError', t.emailRequired);
        return;
      }

      // Loading state
      const btn = document.getElementById('submitBtn');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner" aria-label="載入中"></span>';

      // Simulate API call (prototype always succeeds)
      await new Promise(r => setTimeout(r, 1200));

      // Show success panel regardless of whether email exists
      document.getElementById('formSection').style.display = 'none';
      document.getElementById('successPanel').classList.add('visible');
      applyLang(lang);
    });

    /* ── Init ──────────────────────────────────────────────────── */
    applyLang('zh');
  </script>
</body>
</html>
