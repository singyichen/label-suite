<div id="vaAnnotatorPanel" class="hidden">
  <div class="va-grid">
    <div class="va-axis-card">
      <div class="va-axis-head">
        <span class="va-axis-title" id="vaValenceLabel">Valence（情緒正負）</span>
        <span class="va-axis-value" id="vaValenceValue">-</span>
      </div>
      <p class="va-axis-hint" id="vaValenceHint">1 = 非常負向，9 = 非常正向</p>
      <div class="va-scale-row" id="vaValenceScale"></div>
      <div class="va-scale-divider"></div>
      <div class="va-range-labels">
        <span id="vaValenceMin">負向</span>
        <span id="vaValenceMax">正向</span>
      </div>
    </div>
    <div class="va-axis-card">
      <div class="va-axis-head">
        <span class="va-axis-title" id="vaArousalLabel">Arousal（情緒強度）</span>
        <span class="va-axis-value" id="vaArousalValue">-</span>
      </div>
      <p class="va-axis-hint" id="vaArousalHint">1 = 非常平靜，9 = 非常激動</p>
      <div class="va-scale-row" id="vaArousalScale"></div>
      <div class="va-scale-divider"></div>
      <div class="va-range-labels">
        <span id="vaArousalMin">平靜</span>
        <span id="vaArousalMax">激動</span>
      </div>
    </div>
  </div>
</div>
