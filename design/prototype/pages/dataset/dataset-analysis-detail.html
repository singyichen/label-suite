<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Label Suite — 資料集分析詳情</title>
  <link rel="stylesheet" href="../../assets/tokens.css" />
  <link rel="stylesheet" href="../shared/sidebar.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary:             #6366F1;
      --color-cta:                 #10B981;
      --color-surface:             #F5F3FF;
      --color-white:               #FFFFFF;
      --color-ink:                 #1E1B4B;
      --color-ink-muted:           #94A3B8;
      --color-text-soft:           #64748B;
      --color-border:              #E2E8F0;
      --color-border-muted:        #F1F5F9;
      --color-primary-soft-bg:     #EEF2FF;
      --color-primary-soft-border: #C7D2FE;
      --color-slate-50:            #F8FAFC;
      --color-error:               #B91C1C;
      --color-error-bg:            #FEF2F2;
      --color-error-border:        #FECACA;
      --color-success:             #15803D;
      --color-success-bg:          #F0FDF4;
      --color-success-border:      #BBF7D0;
      --color-warning:             #A16207;
      --color-warning-bg:          #FEFCE8;
      --color-warning-border:      #FEF08A;
      --color-info:                #1D4ED8;
      --color-info-bg:             #EFF6FF;
      --color-info-border:         #BFDBFE;
      --font-serif-display: 'Crimson Pro', 'Noto Serif TC', Georgia, serif;
      --font-sans:  'Inter', 'Noto Sans TC', -apple-system, sans-serif;
      --font-mono:  'JetBrains Mono', ui-monospace, Menlo, monospace;
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
      --radius-xl: 16px; --radius-full: 9999px;
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1);
      --space-xs: 4px; --space-sm: 8px; --space-md: 16px;
      --space-lg: 24px; --space-xl: 32px;
      --dur-fast: 150ms; --dur-normal: 200ms;
      --ease-standard: cubic-bezier(.4,0,.2,1);
      --z-toast: 300;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{font-size:16px}
    body{font-family:var(--font-sans);background:var(--color-surface);color:var(--color-ink);line-height:1.8;min-height:100vh;display:flex;flex-direction:row}
    html[lang="en"] body{line-height:1.6}
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit;cursor:pointer}
    .hidden{display:none !important}

    main{flex:1;display:flex;flex-direction:column;overflow-y:auto}
    .layout{max-width:1200px;width:100%;margin:0 auto;padding:var(--space-lg)}

    /* Breadcrumb */
    .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--color-text-soft);margin-bottom:12px}
    .breadcrumb a{color:var(--color-primary)}
    .breadcrumb a:hover{text-decoration:underline}
    .breadcrumb-sep{color:var(--color-ink-muted);font-size:11px}

    /* Page header */
    .page-header{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-md);margin-bottom:var(--space-lg);flex-wrap:wrap}
    .page-main-title{font-family:var(--font-serif-display);font-size:26px;line-height:1.3;font-weight:700;color:var(--color-ink);margin:0 0 6px}
    .task-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .task-type-badge{display:inline-flex;align-items:center;padding:2px 10px;border:1px solid var(--color-primary-soft-border);border-radius:var(--radius-full);background:var(--color-primary-soft-bg);color:var(--color-primary);font-size:12px;font-weight:600}
    .task-id-chip{font-size:12px;color:var(--color-ink-muted);font-family:var(--font-mono)}

    /* Tabs */
    .admin-tabs{display:flex;border-bottom:2px solid var(--color-border);margin-bottom:var(--space-lg)}
    .admin-tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--color-text-soft);border-bottom:2px solid transparent;margin-bottom:-2px;background:transparent;border-left:none;border-right:none;border-top:none;transition:color var(--dur-fast),border-color var(--dur-fast)}
    .admin-tab:hover{color:var(--color-primary)}
    .admin-tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600}

    /* Panel */
    .panel{border:1px solid var(--color-border);border-radius:var(--radius-lg);background:var(--color-white);padding:var(--space-lg);margin-bottom:var(--space-md)}
    .panel-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:var(--space-sm);margin-bottom:var(--space-md);flex-wrap:wrap}
    .panel-title{font-size:16px;font-weight:700;color:var(--color-ink)}
    .panel-subtitle{font-size:13px;color:var(--color-text-soft);margin-top:2px}
    .panel-divider{border:none;border-top:1px solid var(--color-border-muted);margin:var(--space-md) 0}

    /* Badges */
    .badge{display:inline-flex;align-items:center;border-radius:var(--radius-sm);border:1px solid transparent;padding:2px 8px;font-size:12px;font-weight:600;line-height:1.4;white-space:nowrap}
    .badge-pass{color:var(--color-success);background:var(--color-success-bg);border-color:var(--color-success-border)}
    .badge-fail{color:var(--color-error);background:var(--color-error-bg);border-color:var(--color-error-border)}
    .badge-warn{color:var(--color-warning);background:var(--color-warning-bg);border-color:var(--color-warning-border)}
    .badge-neutral{color:var(--color-text-soft);background:var(--color-slate-50);border-color:var(--color-border)}
    .iaa-summary-badge{font-size:13px;padding:4px 12px;border-radius:var(--radius-full)}

    /* IAA method row */
    .iaa-method-row{display:flex;align-items:center;gap:8px;margin-bottom:var(--space-md);font-size:13px;color:var(--color-text-soft)}
    .iaa-method-name{font-weight:700;color:var(--color-ink)}
    .iaa-primary-star{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;font-size:11px;background:var(--color-warning-bg);border:1px solid var(--color-warning-border);border-radius:var(--radius-sm);color:var(--color-warning);font-weight:700;flex-shrink:0}

    /* IAA score cards */
    .iaa-score-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:var(--space-md)}
    .iaa-score-grid-1{grid-template-columns:1fr;max-width:320px}
    .iaa-score-card{border:1px solid var(--color-border);border-radius:var(--radius-md);padding:14px 16px;background:var(--color-slate-50)}
    .iaa-score-card.card-pass{border-color:var(--color-success-border);background:var(--color-success-bg)}
    .iaa-score-card.card-warn{border-color:var(--color-warning-border);background:var(--color-warning-bg)}
    .iaa-score-card.card-fail{border-color:var(--color-error-border);background:var(--color-error-bg)}
    .iaa-card-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--color-ink-muted);margin-bottom:6px}
    .iaa-card-value{font-size:32px;font-weight:700;line-height:1.1;font-family:var(--font-mono);margin-bottom:2px}
    .iaa-card-value.pass{color:var(--color-success)}
    .iaa-card-value.warn{color:var(--color-warning)}
    .iaa-card-value.fail{color:var(--color-error)}
    .iaa-card-calc{font-size:11px;color:var(--color-ink-muted);margin-bottom:10px}
    .iaa-bar-wrap{height:8px;background:var(--color-border);border-radius:var(--radius-full);overflow:hidden;margin-bottom:8px}
    .iaa-bar-fill{height:100%;border-radius:var(--radius-full);transition:width .5s var(--ease-standard)}
    .iaa-bar-fill.pass{background:var(--color-success)}
    .iaa-bar-fill.warn{background:var(--color-warning)}
    .iaa-bar-fill.fail{background:var(--color-error)}
    .iaa-threshold-row{display:flex;flex-wrap:wrap;gap:8px;font-size:11px}
    .iaa-threshold-item{display:flex;align-items:center;gap:4px}
    .t-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .t-dot-pass{background:var(--color-success)}
    .t-dot-fail{background:var(--color-error)}
    .t-dot-warn{background:var(--color-warning)}
    .t-pass{color:var(--color-success);font-weight:600}
    .t-fail{color:var(--color-error);font-weight:600}
    .t-warn{color:var(--color-warning);font-weight:600}

    /* Match toggle (sequence labeling) */
    .match-toggle{display:inline-flex;border:1px solid var(--color-border);border-radius:var(--radius-md);padding:2px;background:var(--color-slate-50);gap:2px;margin-bottom:var(--space-sm)}
    .match-btn{border:1px solid transparent;border-radius:6px;background:transparent;color:var(--color-text-soft);font-size:12px;font-weight:600;padding:5px 10px}
    .match-btn.active{background:var(--color-white);color:var(--color-primary);border-color:var(--color-primary-soft-border)}
    .match-btn:hover{color:var(--color-primary)}

    /* Collapsible alt metrics */
    .alt-toggle-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--color-primary);background:transparent;border:none;padding:6px 0;margin-top:4px}
    .alt-toggle-btn:hover{text-decoration:underline}
    .alt-toggle-icon{transition:transform var(--dur-fast)}
    .alt-toggle-btn.open .alt-toggle-icon{transform:rotate(180deg)}
    .alt-metrics-body{display:none;margin-top:var(--space-sm);border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden}
    .alt-metrics-body.open{display:block}
    .alt-table{width:100%;border-collapse:collapse;font-size:13px}
    .alt-table th{background:var(--color-slate-50);border-bottom:1px solid var(--color-border);padding:8px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--color-ink-muted);text-align:left}
    .alt-table td{padding:9px 14px;border-bottom:1px solid var(--color-border-muted);color:var(--color-ink);vertical-align:middle}
    .alt-table tbody tr:last-child td{border-bottom:none}
    .alt-metric-name{font-weight:600}
    .alt-metric-note{font-size:11px;color:var(--color-ink-muted)}

    /* Anomaly */
    .anomaly-group-title{font-size:13px;font-weight:700;color:var(--color-ink);margin:var(--space-md) 0 8px}
    .anomaly-group-title:first-child{margin-top:0}
    .anomaly-list{list-style:none;display:grid;gap:8px}
    .anomaly-item{border:1px solid var(--color-warning-border);background:var(--color-warning-bg);border-radius:var(--radius-md);color:var(--color-warning);padding:10px 12px;font-size:13px;line-height:1.6;display:flex;align-items:flex-start;gap:8px}
    .anomaly-icon{width:16px;height:16px;flex-shrink:0;margin-top:2px;opacity:.9}
    .anomaly-body{flex:1}
    .anomaly-title{font-weight:600}
    .anomaly-detail{color:var(--color-ink-muted);font-size:12px;margin-top:2px}
    .anomaly-empty{border:1px dashed var(--color-border);border-radius:var(--radius-md);background:var(--color-slate-50);padding:14px;font-size:13px;color:var(--color-text-soft);text-align:center}

    /* Annotator table */
    .table-wrap{border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden;background:var(--color-white)}
    .table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
    .annotator-table{width:100%;border-collapse:collapse;text-align:left}
    .annotator-table thead tr{background:var(--color-slate-50);border-bottom:1px solid var(--color-border)}
    .annotator-table th{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--color-ink-muted);font-weight:600;padding:12px 14px;white-space:nowrap}
    .annotator-table td{padding:12px 14px;border-bottom:1px solid var(--color-border-muted);font-size:13px;color:var(--color-ink);vertical-align:middle;white-space:nowrap}
    .annotator-table tbody tr:last-child td{border-bottom:none}
    .annotator-name{font-weight:700}
    .delta-pos{color:var(--color-success);font-weight:600}
    .delta-neg{color:var(--color-error);font-weight:600}
    .speed-flag{color:var(--color-warning);font-size:12px;margin-left:4px}
    .speed-warn{color:var(--color-warning)}
    .group-avg-note{font-size:12px;color:var(--color-text-soft);margin-top:10px}
    .risk-level-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:var(--radius-full);border:1px solid transparent;font-size:12px;font-weight:700;white-space:nowrap}
    .risk-level-badge.normal{color:var(--color-success);background:var(--color-success-bg);border-color:var(--color-success-border)}
    .risk-level-badge.watch{color:var(--color-warning);background:var(--color-warning-bg);border-color:var(--color-warning-border)}
    .risk-level-badge.high{color:var(--color-error);background:var(--color-error-bg);border-color:var(--color-error-border)}
    .risk-level-badge.insufficient{color:var(--color-text-soft);background:var(--color-slate-50);border-color:var(--color-border)}
    .cause-stack{display:flex;flex-wrap:wrap;gap:6px;min-width:180px}
    .cause-chip{display:inline-flex;align-items:center;padding:3px 8px;border-radius:var(--radius-full);background:var(--color-primary-soft-bg);border:1px solid var(--color-primary-soft-border);color:var(--color-primary);font-size:11px;font-weight:600}
    .cause-text-block{display:grid;gap:4px;min-width:180px}
    .cause-line{font-size:12px;color:var(--color-ink)}
    .cause-line strong{color:var(--color-ink-muted);font-weight:700}
    .cause-muted{font-size:12px;color:var(--color-text-soft);white-space:normal}
    .action-stack{display:grid;gap:8px;min-width:140px}
    .risk-action-btn[disabled]{opacity:.5;cursor:not-allowed;transform:none}
    .risk-readonly-note{font-size:11px;color:var(--color-text-soft);line-height:1.5;white-space:normal}

    /* Quality empty state */
    .quality-empty{border:1px dashed var(--color-border);border-radius:var(--radius-lg);background:var(--color-white);padding:48px var(--space-lg);text-align:center}
    .quality-empty-icon{width:40px;height:40px;margin:0 auto 14px;color:var(--color-ink-muted);opacity:.6}
    .quality-empty-title{font-size:15px;font-weight:700;color:var(--color-ink);margin-bottom:8px}
    .quality-empty-desc{font-size:13px;color:var(--color-text-soft);max-width:400px;margin:0 auto 18px;line-height:1.7}

    /* Stats placeholder */
    .stats-placeholder{border:1px dashed var(--color-border);border-radius:var(--radius-lg);background:var(--color-white);padding:48px var(--space-lg);text-align:center;color:var(--color-text-soft);font-size:14px}

    /* Buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 16px;border-radius:var(--radius-md);border:1px solid transparent;font-size:14px;font-weight:600;transition:background var(--dur-fast),color var(--dur-fast),opacity var(--dur-fast),border-color var(--dur-fast),transform var(--dur-fast)}
    .btn:hover{transform:translateY(-1px)}
    .btn-secondary{color:var(--color-ink);background:var(--color-white);border-color:var(--color-border)}
    .btn-secondary:hover{border-color:var(--color-primary);color:var(--color-primary)}
    .btn-sm{padding:6px 12px;font-size:13px}

    /* Toast */
    .toast-container{position:fixed;right:24px;bottom:24px;z-index:var(--z-toast);pointer-events:none}
    .toast{display:inline-flex;align-items:center;gap:8px;border-radius:var(--radius-lg);padding:11px 14px;background:var(--color-ink);color:var(--color-white);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(8px);transition:opacity var(--dur-normal),transform var(--dur-normal);min-width:200px;max-width:340px}
    .toast.show{opacity:1;transform:translateY(0)}

    /* Responsive */
    @media(max-width:767px){
      .layout{padding:var(--space-md) var(--space-md) var(--space-xl)}
      .admin-tabs{overflow-x:auto}
      .iaa-score-grid{grid-template-columns:1fr}
      .toast-container{right:12px;left:12px;bottom:90px}
      .toast{width:100%}
    }
    @media(prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
    }
  </style>
</head>

<main id="detailMain">
<div class="layout">

  <!-- Breadcrumb -->

    <!-- Ready state -->
    <div id="qualityReady">
      <div id="qualityPanelMount" aria-live="polite"></div>

    </div><!-- /qualityReady -->

  </div><!-- /qualityPanel -->

</div><!-- /layout -->

    var labels = S.lang === 'en'
      ? { normal: 'Normal', watch: 'Watch', high: 'High Risk', insufficient: 'Insufficient Data' }
      : { normal: '正常', watch: '觀察', high: '高風險', insufficient: '資料不足' };

  var key = S.type;

function wireAltToggle(btnId, bodyId) {
  var btn = document.getElementById(btnId);
  var body = document.getElementById(bodyId);
  if (!btn || !body) return;
  btn.addEventListener('click', function() {
    var open = body.classList.toggle('open');
    btn.classList.toggle('open', open);
    btn.setAttribute('aria-expanded', open);
    body.setAttribute('aria-hidden', !open);
  });
}

function closeAllAltToggles() {
  ['altBtnVA','altBtnCls','altBtnSeq','altBtnRel','altBtnSp'].forEach(function(id) {
    var btn = document.getElementById(id);
    var bodyId = id.replace('altBtn', 'altBody');
    var body = document.getElementById(bodyId);
    if (btn) {
      btn.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
    if (body) {
      body.classList.remove('open');
      body.setAttribute('aria-hidden', 'true');
    }
  });
}

  var isStrict = S.seqMode !== 'partial';
  strictBtn.classList.toggle('active', isStrict);
  partialBtn.classList.toggle('active', !isStrict);
  strictCard.classList.toggle('hidden', !isStrict);
  partialCard.classList.toggle('hidden', isStrict);
}

    updateSummaryBadge();
  });
}

function wireQualityPanelInteractions() {
  wireAltToggle('altBtnVA', 'altBodyVA');
  wireAltToggle('altBtnCls', 'altBodyCls');
  wireAltToggle('altBtnSeq', 'altBodySeq');
  wireAltToggle('altBtnRel', 'altBodyRel');
  wireAltToggle('altBtnSp', 'altBodySp');
  wireSequenceToggle();
}

function loadQualityPanel() {
  var mount = document.getElementById('qualityPanelMount');
  var path = QUALITY_PANEL_PATHS[S.type] || QUALITY_PANEL_PATHS.va;
  if (!mount || !path) return Promise.resolve();
  mount.innerHTML = '';
  return fetch(path, { cache: 'no-store' })
    .then(function(response) {
      if (!response.ok) throw new Error('Failed to load panel partial: ' + path);
      return response.text();
    })
    .then(function(html) {
      mount.innerHTML = html.trim();
      SIMPLE_IDS.forEach(function(id) { setText(id, id); });
      closeAllAltToggles();
      syncSequenceUi();
      updateMethodName();
      updateSummaryBadge();
      syncRoleUi();
      wireQualityPanelInteractions();
    })
    .catch(function() {
      renderPanelLoadError();
    });
}

/* ── Header texts per type ──────────────────────────────────────── */
function applyTypeContent() {
  var pageTitles = t('pageTitle');
  var typeLabels = t('taskTypeBadge');
  var taskIds = t('taskId');
  var taskMeta = TASK_META[S_ROUTE.taskId] || TASK_META[DEFAULT_TASK_ID];
  var localizedTitle = taskMeta && taskMeta.title ? (taskMeta.title[S.lang] || taskMeta.title.zh || taskMeta.title.en) : '';

  document.getElementById('pageTitle').textContent = localizedTitle || (typeof pageTitles === 'object' ? (pageTitles[S.type] || pageTitles.va) : '');
  if (typeof typeLabels === 'object') document.getElementById('taskTypeBadge').textContent = typeLabels[S.type] || typeLabels.va;
  document.getElementById('taskIdChip').textContent = taskMeta && taskMeta.chipId ? taskMeta.chipId : (typeof taskIds === 'object' ? (taskIds[S.type] || taskIds.va) : '');
  updateTaskDetailHref();
  syncRoleUi();
  return loadQualityPanel();
}

/* ── Quality state ──────────────────────────────────────────────── */
function applyQualityState() {
  var isEmpty = S.qState !== 'ready';
  document.getElementById('qualityEmpty').classList.toggle('hidden', !isEmpty);
  document.getElementById('qualityReady').classList.toggle('hidden', isEmpty);
  if (isEmpty) {
    var msgs = (t('emptyStateMsgs') || I18N.zh.emptyStateMsgs)[S.qState];
    if (msgs) {
      document.getElementById('emptyTitle').textContent = msgs[0];
      document.getElementById('emptyDesc').textContent  = msgs[1];
    }
  }
}

/* ── Tabs ────────────────────────────────────────────────────────── */
function syncUrlState() {
  var params = new URLSearchParams(window.location.search);
  params.set('task_id', S_ROUTE.taskId);
  params.set('tab', S.tab);
  if (S.qState !== 'ready') params.set('q_state', S.qState);
  else params.delete('q_state');
  window.history.replaceState({}, '', window.location.pathname + '?' + params.toString());
}

function switchTab(nextTab) {
  var main = document.getElementById('detailMain');
  if (main && S.tab) S.scrollTopByTab[S.tab] = main.scrollTop;
  S.tab = nextTab;
  var isStats = nextTab === 'stats';
  var statsTab = document.getElementById('tabStats');
  var qualityTab = document.getElementById('tabQuality');
  statsTab.classList.toggle('active', isStats);
  statsTab.setAttribute('aria-selected', isStats ? 'true' : 'false');
  qualityTab.classList.toggle('active', !isStats);
  qualityTab.setAttribute('aria-selected', isStats ? 'false' : 'true');
  document.getElementById('statsPanel').classList.toggle('hidden', !isStats);
  document.getElementById('qualityPanel').classList.toggle('hidden', isStats);
  syncUrlState();
  if (main) main.scrollTop = S.scrollTopByTab[nextTab] || 0;
}

document.getElementById('tabStats').addEventListener('click', function() {
  switchTab('stats');
});
document.getElementById('tabQuality').addEventListener('click', function() {
  switchTab('quality');
});

function resetSequenceAndAltViews() {
  S.seqMode = 'strict';
}

function applyRouteTask(taskId) {
  var taskMeta = TASK_META[taskId] || TASK_META[DEFAULT_TASK_ID];
  S_ROUTE.taskId = TASK_META[taskId] ? taskId : DEFAULT_TASK_ID;
  S.type = taskMeta.type;
  resetSequenceAndAltViews();
  return applyTypeContent();
}

/* ── Init ────────────────────────────────────────────────────────── */
(function() {
  var params;
  try {
    params = new URLSearchParams(window.location.search);
    applyRouteTask(params.get('task_id'));
    var qState = params.get('q_state');
    if (qState === 'dry_run_in_progress' || qState === 'report_pending' || qState === 'report_generating' || qState === 'ready') {
      S.qState = qState;
    }
  } catch(e) {
    applyRouteTask(DEFAULT_TASK_ID);
  }

  try {
    var stored = window.LabelSuiteSharedSidebar.getStoredLang();
    applyLang(stored || 'zh');
  } catch(e) { applyLang('zh'); }

  /* Read ?tab= from URL */
  try {
    var tab = (params || new URLSearchParams(window.location.search)).get('tab');
    switchTab(tab === 'quality' ? 'quality' : 'stats');
  } catch(e) {}

  if (window.LabelSuiteAnalytics) {
    window.LabelSuiteAnalytics.init({ page: 'dataset-analysis-detail' });
    window.LabelSuiteAnalytics.trackPageView('dataset-analysis-detail', function() {
      return { taskId: S_ROUTE.taskId, taskType: S.type, tab: S.tab };
    });
  }

  document.addEventListener('labelSuiteLangChanged', function(e) {
    applyLang(e.detail && e.detail.lang ? e.detail.lang : 'zh');
  });
})();
</script>
</body>
</html>
