<!-- Sequence Labeling Statistics -->
<section class="panel" aria-labelledby="statsSeqEntityDistTitle">
  <div class="panel-head-row">
    <div>
      <h2 class="panel-title" id="statsSeqEntityDistTitle">實體類型分佈</h2>
      <p class="panel-subtitle" id="statsSeqEntityDistDesc">各實體類型在所有提交標記中的出現次數（共 3,994 個已標記實體）</p>
    </div>
  </div>
  <div class="stats-hbar-chart" style="margin-top:var(--space-sm)">
    <div class="stats-hbar-row">
      <div class="stats-hbar-label">PER（人名）</div>
      <div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:72%"></div></div>
      <div class="stats-hbar-value">42% · 1,677</div>
    </div>
    <div class="stats-hbar-row">
      <div class="stats-hbar-label">ORG（組織）</div>
      <div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:53%;opacity:.85"></div></div>
      <div class="stats-hbar-value">28% · 1,118</div>
    </div>
    <div class="stats-hbar-row">
      <div class="stats-hbar-label">LOC（地點）</div>
      <div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:34%;opacity:.7"></div></div>
      <div class="stats-hbar-value">18% · 719</div>
    </div>
    <div class="stats-hbar-row">
      <div class="stats-hbar-label">MISC（其他）</div>
      <div class="stats-hbar-track"><div class="stats-hbar-fill" style="width:23%;opacity:.6"></div></div>
      <div class="stats-hbar-value">12% · 479</div>
    </div>
  </div>
</section>

<section class="panel" aria-labelledby="statsSeqAvgEntityTitle">
  <h2 class="panel-title" id="statsSeqAvgEntityTitle">每句平均實體數</h2>
  <div style="margin-top:var(--space-md);display:flex;align-items:center;gap:var(--space-xl);flex-wrap:wrap">
    <div class="stats-inline-card">
      <div>
        <div class="stats-metric-label" id="statsSeqAvgLabel">平均實體數 / 句</div>
        <div class="stats-metric-value" style="font-size:40px">3.2</div>
      </div>
    </div>
    <div style="display:grid;gap:10px;font-size:13px;color:var(--color-ink)">
      <div style="display:flex;gap:var(--space-md)">
        <span style="color:var(--color-text-soft);min-width:120px" id="statsSeqTotalSentLabel">總句子數</span>
        <span style="font-family:var(--font-mono);font-weight:600">1,248</span>
      </div>
      <div style="display:flex;gap:var(--space-md)">
        <span style="color:var(--color-text-soft);min-width:120px" id="statsSeqTotalEntityLabel">總實體標記數</span>
        <span style="font-family:var(--font-mono);font-weight:600">3,994</span>
      </div>
      <div style="display:flex;gap:var(--space-md)">
        <span style="color:var(--color-text-soft);min-width:120px" id="statsSeqZeroEntityLabel">無實體句子比例</span>
        <span style="font-family:var(--font-mono);font-weight:600">8.2%</span>
      </div>
      <div style="display:flex;gap:var(--space-md)">
        <span style="color:var(--color-text-soft);min-width:120px" id="statsSeqMaxEntityLabel">單句最多實體數</span>
        <span style="font-family:var(--font-mono);font-weight:600">14</span>
      </div>
    </div>
  </div>
</section>

<section class="panel" aria-labelledby="statsSeqSpanLenTitle">
  <div class="panel-head-row">
    <div>
      <h2 class="panel-title" id="statsSeqSpanLenTitle">Entity Span 長度分佈</h2>
      <p class="panel-subtitle" id="statsSeqSpanLenDesc">以 token 數計算的 span 長度分佈（長度 ≥ 6 合併為「6+」）</p>
    </div>
  </div>
  <!-- Span length data: [1,2,3,4,5,6+] → [1798,1198,598,239,96,65], max=1798 -->
  <!-- Bar heights (of 100px): [100,67,33,13,5,4] -->
  <svg viewBox="0 0 340 155" style="width:100%;max-width:500px;height:auto;display:block;overflow:visible;margin-top:var(--space-sm)" role="img" aria-label="Span 長度分佈直方圖">
    <g transform="translate(10,5)">
      <line x1="0" y1="0" x2="0" y2="115" stroke="var(--color-border)" stroke-width="1"/>
      <!-- bar width=38, gap=10 → 6 bars = 6*38+5*10 = 278px -->
      <rect x="0"   y="15"  width="38" height="100" fill="var(--color-primary)"                rx="2"/>
      <rect x="48"  y="48"  width="38" height="67"  fill="var(--color-primary)" opacity="0.8"  rx="2"/>
      <rect x="96"  y="82"  width="38" height="33"  fill="var(--color-primary)" opacity="0.65" rx="2"/>
      <rect x="144" y="102" width="38" height="13"  fill="var(--color-primary)" opacity="0.5"  rx="2"/>
      <rect x="192" y="110" width="38" height="5"   fill="var(--color-primary)" opacity="0.4"  rx="2"/>
      <rect x="240" y="111" width="38" height="4"   fill="var(--color-primary)" opacity="0.35" rx="2"/>
      <!-- Counts on top of bars -->
      <text x="19"  y="12"  text-anchor="middle" font-size="9"  fill="var(--color-primary)" font-weight="600">1,798</text>
      <text x="67"  y="45"  text-anchor="middle" font-size="9"  fill="var(--color-primary)" font-weight="600">1,198</text>
      <text x="115" y="79"  text-anchor="middle" font-size="9"  fill="var(--color-text-soft)">598</text>
      <line x1="0" y1="115" x2="280" y2="115" stroke="var(--color-border)" stroke-width="1"/>
      <text x="19"  y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">1</text>
      <text x="67"  y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">2</text>
      <text x="115" y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">3</text>
      <text x="163" y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">4</text>
      <text x="211" y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">5</text>
      <text x="259" y="130" text-anchor="middle" font-size="11" fill="var(--color-ink-muted)">6+</text>
      <text x="140" y="148" text-anchor="middle" font-size="11" fill="var(--color-text-soft)" font-weight="600" id="statsSeqSpanLenXLabel">Span 長度（token 數）</text>
    </g>
  </svg>
</section>
