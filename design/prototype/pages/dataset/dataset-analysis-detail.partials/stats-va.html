<section class="panel" aria-labelledby="statsVAScatterTitle">
  <div class="panel-head-row">
    <div>
      <h2 class="panel-title" id="statsVAScatterTitle">V-A 二維分佈</h2>
      <p class="panel-subtitle" id="statsVAScatterDesc">每筆標記在 Valence × Arousal 空間的分佈，紅點為 high_divergence 旗標樣本</p>
    </div>
  </div>
  <div class="stats-scatter-wrap">
    <!-- Chart area translate(45,15), width=240px, height=200px -->
    <!-- Scale: V 1→7 → x=(V-1)/6*240; A 1→7 → y=200-(A-1)/6*200 -->
    <svg viewBox="0 0 320 280" style="width:100%;max-width:440px;height:auto;display:block" role="img" aria-label="V-A 二維分佈 scatter plot">
      <defs>
        <pattern id="vaGrid" width="40" height="33.3" patternUnits="userSpaceOnUse" patternTransform="translate(45,15)">
          <path d="M 40 0 L 0 0 0 33.3" fill="none" stroke="var(--color-border)" stroke-width="0.5"/>
        </pattern>
      </defs>
      <g transform="translate(45,15)">
        <rect x="0" y="0" width="240" height="200" fill="url(#vaGrid)"/>
        <line x1="-1" y1="200" x2="241" y2="200" stroke="var(--color-ink-muted)" stroke-width="1.5"/>
        <line x1="0"  y1="-1"  x2="0"  y2="201" stroke="var(--color-ink-muted)" stroke-width="1.5"/>
        <!-- X tick marks & labels: V=1→7, x=(V-1)/6*240 -->
        <text x="0"   y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">1</text>
        <text x="40"  y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">2</text>
        <text x="80"  y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">3</text>
        <text x="120" y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">4</text>
        <text x="160" y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">5</text>
        <text x="200" y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">6</text>
        <text x="240" y="215" text-anchor="middle" font-size="10" fill="var(--color-ink-muted)">7</text>
        <text x="120" y="230" text-anchor="middle" font-size="11" fill="var(--color-text-soft)" font-weight="600">Valence</text>
        <!-- Y tick marks & labels: A=1→7, y=200-(A-1)/6*200 -->
        <text x="-10" y="203" text-anchor="end" font-size="10" fill="var(--color-ink-muted)">1</text>
        <text x="-10" y="170" text-anchor="end" font-size="10" fill="var(--color-ink-muted)">2</text>
        <text x="-10" y="137" text-anchor="end" font-size="10" fill="var(--color-ink-muted)">3</text>
        <text x="-10" y="103" text-anchor="end" font-size="10" fill="var(--color-ink-muted)">4</text>

        <text x="-10" y="3"   text-anchor="end" font-size="10" fill="var(--color-ink-muted)">7</text>
        <text x="-30" y="100" text-anchor="middle" font-size="11" fill="var(--color-text-soft)" font-weight="600" transform="rotate(-90,-30,100)">Arousal</text>

        <!-- Main cluster V≈5, A≈5 → (160, 67) ±jitter -->
        <circle cx="160" cy="67"  r="3.5" fill="var(--color-primary)" opacity="0.75"/>
        <circle cx="170" cy="58"  r="3"   fill="var(--color-primary)" opacity="0.65"/>

        <circle cx="178" cy="75"  r="2"   fill="var(--color-primary)" opacity="0.5"/>
        <!-- V≈6, A≈5-6 cluster → (200,67) (200,33) -->
