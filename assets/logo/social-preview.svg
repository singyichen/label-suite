<!-- GitHub Social Preview (1280x640) - Horizontal Layout -->
<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1280" height="640" fill="#F5F3FF"/>

  <!-- Icon (left side) -->
  <g transform="translate(320, 240)">
    <rect width="160" height="160" rx="40" fill="#6366F1"/>
    <g transform="translate(40, 40)">
      <path d="M68.64 44.7l-23.9 23.9a6.67 6.67 0 0 1-9.43 0L6.67 40V6.67h33.33l28.64 28.64a6.67 6.67 0 0 1 0 9.4z"
