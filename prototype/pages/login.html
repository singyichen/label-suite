<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 — LabelSuite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Crimson+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary:   '#6366F1',
            secondary: '#818CF8',
            cta:       '#10B981',
            surface:   '#F5F3FF',
            ink:       '#1E1B4B',
          },
          fontFamily: {
            heading: ['"Crimson Pro"', 'serif'],
            body:    ['"Atkinson Hyperlegible"', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Atkinson Hyperlegible', sans-serif; }
    h1, h2, h3 { font-family: 'Crimson Pro', serif; }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  </style>
</head>

<body class="bg-surface min-h-screen flex flex-col px-4">

  <!-- Language Toggle — top right -->
  <div class="w-full flex justify-end pt-4 max-w-sm mx-auto">
    <button id="lang-toggle"
            onclick="toggleLang()"
            class="flex items-center gap-1.5 text-xs font-medium text-slate-500 hover:text-primary border border-slate-200 bg-white rounded-full px-3 py-1.5 cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
            aria-label="Switch language / 切換語言">
      <!-- Globe icon -->
      <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      <span id="lang-label">EN</span>
    </button>
  </div>

  <!-- Main content — vertically centred -->
  <main class="flex-1 flex items-center justify-center w-full" role="main">
    <div class="w-full max-w-sm">

      <!-- Logo & Title -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-xl mb-4">
          <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
        </div>
        <h1 class="text-3xl font-bold text-ink">LabelSuite</h1>
        <p class="text-slate-500 mt-1 text-sm" data-i18n="subtitle">NLP 標注平台</p>
      </div>

      <!-- Card -->
      <div class="bg-white border border-slate-200 rounded-2xl p-8">
        <h2 class="text-xl font-semibold text-ink mb-1" data-i18n="card-title">登入</h2>
        <p class="text-sm text-slate-500 mb-6" data-i18n="card-desc">使用機構或開發者帳號繼續。</p>

        <!-- Error Banner (hidden by default) -->
        <div id="error-banner" role="alert" aria-live="assertive"
             class="hidden mb-4 flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3">
          <svg class="w-4 h-4 mt-0.5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="error-text" data-i18n="error-msg">登入失敗，請重試或聯絡管理員。</span>
        </div>

        <!-- Google Button -->
        <a href="dashboard.html"
           class="flex items-center justify-center gap-3 w-full border border-slate-200 bg-white hover:bg-slate-50 text-ink text-sm font-medium rounded-lg px-4 py-3 cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
           aria-label="以 Google 登入">
          <!-- Official Google G -->
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span data-i18n="btn-google">以 Google 登入</span>
        </a>

        <!-- GitHub Button -->
        <a href="dashboard.html"
           class="mt-3 flex items-center justify-center gap-3 w-full border border-slate-200 bg-white hover:bg-slate-50 text-ink text-sm font-medium rounded-lg px-4 py-3 cursor-pointer transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2"
           aria-label="以 GitHub 登入">
          <!-- GitHub Mark (Simple Icons) -->
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
          </svg>
          <span data-i18n="btn-github">以 GitHub 登入</span>
        </a>

        <!-- Divider -->
        <div class="flex items-center gap-3 my-5">
          <div class="flex-1 h-px bg-slate-200"></div>
          <span class="text-xs text-slate-400" data-i18n="divider-or">或</span>
          <div class="flex-1 h-px bg-slate-200"></div>
        </div>

        <!-- Demo: error state trigger -->
        <button onclick="showError()"
                class="w-full text-sm text-slate-400 hover:text-slate-600 cursor-pointer transition-colors duration-200 focus:outline-none focus:underline"
                aria-label="模擬登入錯誤（原型展示用）">
          <span data-i18n="demo-btn">模擬錯誤狀態（展示用）</span>
        </button>
      </div>

      <!-- Footer -->
      <p class="text-center text-xs text-slate-400 mt-6">
        <span data-i18n="footer-pre">繼續即表示您同意本研究平台的</span>
        <a href="#" class="underline hover:text-primary transition-colors duration-200" data-i18n="footer-link">使用條款</a>
        <span data-i18n="footer-post">。</span>
      </p>

    </div>
  </main>

  <!-- i18n strings -->
  <script>
    const STRINGS = {
      'zh-TW': {
        'subtitle':    'NLP 標注平台',
        'card-title':  '登入',
        'card-desc':   '使用機構或開發者帳號繼續。',
        'error-msg':   '登入失敗，請重試或聯絡管理員。',
        'btn-google':  '以 Google 登入',
        'btn-github':  '以 GitHub 登入',
        'divider-or':  '或',
        'demo-btn':    '模擬錯誤狀態（展示用）',
        'footer-pre':  '繼續即表示您同意本研究平台的',
        'footer-link': '使用條款',
        'footer-post': '。',
        'lang-label':  'EN',
        'page-title':  '登入 — LabelSuite',
      },
      'en': {
        'subtitle':    'NLP Annotation Portal',
        'card-title':  'Sign in',
        'card-desc':   'Use your institutional or developer account to continue.',
        'error-msg':   'Sign-in failed. Please try again or contact your administrator.',
        'btn-google':  'Continue with Google',
        'btn-github':  'Continue with GitHub',
        'divider-or':  'or',
        'demo-btn':    'Simulate error state (demo only)',
        'footer-pre':  'By signing in, you agree to the ',
        'footer-link': 'Terms of Use',
        'footer-post': ' of this research portal.',
        'lang-label':  'ZH',
        'page-title':  'Sign In — LabelSuite',
      },
    };

    const STORAGE_KEY = 'labelsuite-lang';
    let currentLang = localStorage.getItem(STORAGE_KEY) || 'zh-TW';

    function applyLang(lang) {
      const strings = STRINGS[lang];
      // Update all data-i18n elements
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (strings[key] !== undefined) el.textContent = strings[key];
      });
      // Update lang-label separately (inside toggle button)
      document.getElementById('lang-label').textContent = strings['lang-label'];
      // Update html lang attribute and page title
      document.documentElement.lang = lang;
      document.title = strings['page-title'];
    }

    function toggleLang() {
      currentLang = currentLang === 'zh-TW' ? 'en' : 'zh-TW';
      localStorage.setItem(STORAGE_KEY, currentLang);
      applyLang(currentLang);
    }

    function showError() {
      const banner = document.getElementById('error-banner');
      banner.classList.remove('hidden');
      banner.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // Init with zh-TW on load
    applyLang('zh-TW');
  </script>
</body>
</html>
